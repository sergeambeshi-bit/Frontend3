<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artiste – JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
</head>

<body>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">
  <div class="menu-header">
    <img src="/assets/logo.png" class="menu-logo">
  </div>

  <a href="/index.html">Accueil</a>
  <a href="/browse.html">Parcourir</a>
  <a href="/genres.html">Genres</a>
  <a href="/charts.html">Top Charts</a>
  <a href="/new-releases.html">Nouveautés</a>

  <a href="/user/library.html">Ma Bibliothèque</a>
  <a href="/user/purchases.html">Mes Achats</a>
  <a href="/user/settings.html">Paramètres</a>
</div>

<!-- HERO -->
<section class="hero" style="height:50vh;">
  <div class="hero-bg" id="artistBg"></div>
  <div class="hero-patterns"></div>

  <div class="topbar">
    <span class="menu" id="menuBtn">☰</span>
    <img src="/assets/logo.png" class="logo">
    <span></span>
  </div>

  <div class="hero-content">
    <h1 id="artistName">Nom de l'artiste</h1>
  </div>
</section>

<!-- ARTIST INFO -->
<section class="section">
  <p id="artistBio" class="sub" style="text-align:center;">
    Biographie de l'artiste...
  </p>
</section>

<!-- TRACKS -->
<section class="section">
  <h3>Morceaux</h3>
  <div id="artistTracks"></div>
</section>

<script type="module">
import { initLang } from "/js/lang.js";

initLang();
import { fetchBrowseResults } from "/js/api.js";

/* MENU */
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");

menuBtn.addEventListener("click", () => {
  sideMenu.classList.toggle("open");
});

document.addEventListener("click", (e) => {
  if (!sideMenu.contains(e.target) && !menuBtn.contains(e.target)) {
    sideMenu.classList.remove("open");
  }
});

/* GET ARTIST FROM URL */
const params = new URLSearchParams(window.location.search);
const artistName = params.get("artist");

/* CREATE TRACK ROW */
function createTrack(item, index){
  return `
    <div class="chart-item">
      <span>${String(index+1).padStart(2,'0')}</span>
      <img src="${item.cover}">
      <div class="info">
        <b>${item.name}</b>
        <p>${item.artist}</p>
      </div>
      <div class="price">${Math.floor(Math.random()*300)} XAF</div>
    </div>
  `;
}

/* LOAD ARTIST */
async function loadArtist(){
  const data = await fetchBrowseResults();

  const tracks = data.filter(item =>
    (item.artist || "").toLowerCase() === (artistName || "").toLowerCase()
  );

  if(tracks.length === 0) return;

  const artist = tracks[0];

  document.getElementById("artistName").textContent = artist.artist;
  document.getElementById("artistBg").style.backgroundImage = `url(${artist.cover})`;

  const container = document.getElementById("artistTracks");
  container.innerHTML = "";

  tracks.forEach((track, i)=>{
    container.innerHTML += createTrack(track, i);
  });
}

/* PREVIEW */
document.addEventListener("click", e=>{
  if(e.target.classList.contains("play")){
    const audio = new Audio("/assets/sample.mp3");
    audio.play();
    setTimeout(()=>audio.pause(),30000);
  }
});

/* BUY */
document.addEventListener("click", e=>{
  if(e.target.classList.contains("price")){
    alert("Paiement bientôt disponible");
  }
});

loadArtist();

</script>

</body>
</html>

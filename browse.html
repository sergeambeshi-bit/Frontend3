<script type="module">
import { fetchBrowseResults } from "/js/api.js";
import { savePurchase } from "/js/store.js";

/* MENU */
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");

menuBtn.addEventListener("click", () => {
  sideMenu.classList.toggle("open");
});

document.addEventListener("click", (e) => {
  if (!sideMenu.contains(e.target) && !menuBtn.contains(e.target)) {
    sideMenu.classList.remove("open");
  }
});

/* =========================
   GET GENRE FROM URL
========================= */
const params = new URLSearchParams(window.location.search);
const selectedGenre = params.get("genre");

/* =========================
   DATA
========================= */
let allData = [];

/* =========================
   CHECK OWNERSHIP
========================= */
function isOwned(name){
  const purchases = JSON.parse(localStorage.getItem("purchases")) || [];
  return purchases.some(p => p.name === name);
}

/* =========================
   CARD
========================= */
function createCard(item){

  const owned = isOwned(item.name);

  return `
    <div class="card">
      <div class="cover">
        <img src="${item.cover}">
        <button class="play">▶</button>
      </div>

      <div class="title">${item.name}</div>

      <div class="card-bottom">

        ${
          owned
          ? `<span class="owned-badge">✓ Owned</span>`
          : `<span class="price">${item.price || 300} XAF</span>`
        }

        <button class="buy ${owned ? 'disabled' : ''}" ${owned ? 'disabled' : ''}>
          ${owned ? 'Owned' : 'Buy'}
        </button>

      </div>
    </div>
  `;
}

/* =========================
   RENDER
========================= */
function render(data){
  const container = document.getElementById("browseGrid");
  container.innerHTML = "";

  data.forEach(item => {
    container.innerHTML += createCard(item);
  });
}

/* =========================
   LOAD + FILTER
========================= */
async function loadBrowse(){
  allData = await fetchBrowseResults();

  let filtered = allData;

  if(selectedGenre){
    filtered = allData.filter(item =>
      (item.genre || "").toLowerCase() === selectedGenre.toLowerCase()
    );

    document.querySelector("h3").textContent =
      selectedGenre.charAt(0).toUpperCase() + selectedGenre.slice(1);
  }

  render(filtered);
}

/* =========================
   SEARCH
========================= */
document.getElementById("searchInput").addEventListener("input", (e) => {
  const query = e.target.value.toLowerCase();

  let base = allData;

  if(selectedGenre){
    base = allData.filter(item =>
      (item.genre || "").toLowerCase() === selectedGenre.toLowerCase()
    );
  }

  const filtered = base.filter(item =>
    item.name.toLowerCase().includes(query)
  );

  render(filtered);
});

/* =========================
   EVENTS
========================= */
let currentItem = null;

document.addEventListener("click", e=>{

  /* PLAY */
  if(e.target.classList.contains("play")){
    const audio = new Audio("/assets/sample.mp3");
    audio.play();
    setTimeout(()=>audio.pause(),30000);
  }

  /* BUY */
  if(e.target.classList.contains("buy")){

    if(e.target.classList.contains("disabled")) return;

    const card = e.target.closest(".card");

    currentItem = {
      name: card.querySelector(".title").innerText,
      artist: "Artist",
      cover: card.querySelector("img").src,
      price: 300
    };

    savePurchase(currentItem);

    alert("Achat réussi 🎉");

    loadBrowse(); // refresh UI
  }

});

/* INIT */
loadBrowse();

</script>

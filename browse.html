<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse – JENGU</title>
<link rel="stylesheet" href="/styles/app.css">
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <span class="menu" id="menuBtn">☰</span>

  <a href="/index.html">
    <img src="/assets/logo.png" class="logo">
  </a>

  <span id="langBtn">FR ▾</span>
</div>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">
  <a href="/">Accueil</a>
  <a href="/browse.html">Parcourir</a>
  <a href="/genres.html">Genres</a>
  <a href="/charts.html">Charts</a>
  <a href="/new-releases.html">New</a>
</div>

<!-- 🔥 FIXED SEARCH (BOTTOM FLOATING) -->
<div class="search-fixed">
  <div class="search-box">
    <input 
      type="search"
      id="searchInput"
      placeholder="Search..."
    >
    <button id="searchBtn">🔍</button>
  </div>

  <div id="suggestions" class="suggestions"></div>
</div>

<!-- RESULTS -->
<section class="section">
  <div id="browseGrid"></div>
</section>

<script type="module">
import { initLang } from "/js/lang.js";
import { supabase } from "/js/supabase.js";
import { getCurrentUser } from "/js/auth.js";

initLang();

window.addEventListener("DOMContentLoaded", async () => {

  const user = getCurrentUser();

  const searchInput = document.getElementById("searchInput");
  const searchBtn = document.getElementById("searchBtn");
  const suggestionsBox = document.getElementById("suggestions");
  const grid = document.getElementById("browseGrid");

  let allData = [];

  /* LOAD DATA */
  async function load(){
    const { data } = await supabase.from("tracks").select("*");
    allData = data || [];
    render(allData);
  }

  /* CARD */
  function createCard(item){
    const link = item.type === "album"
      ? `/album.html?album=${encodeURIComponent(item.album || item.name)}`
      : `/track.html?id=${item.id}`;

    return `
      <a href="${link}" class="card" data-id="${item.id}">
        <img src="${item.cover || '/assets/covers/cover1.png'}">
        <div>${item.name}</div>
        <div>${item.price} XAF</div>
        <button class="buy">Buy</button>
      </a>
    `;
  }

  /* RENDER */
  function render(data){
    grid.innerHTML = data.map(createCard).join("");
  }

  /* =========================
     SEARCH + SUGGESTIONS
  ========================= */

  function showSuggestions(query){
  if(!query){
    suggestionsBox.innerHTML = "";
    return;
  }

  const matches = allData
    .filter(item =>
      (item.name || "").toLowerCase().includes(query) ||
      (item.artist || "").toLowerCase().includes(query)
    )
    .slice(0,5);

  suggestionsBox.innerHTML = matches.map(item => `
    <div class="suggestion-item" data-name="${item.name}">
      
      <img src="${item.cover || '/assets/covers/cover1.png'}">

      <div class="suggestion-text">
        <div class="suggestion-title">${item.name}</div>
        <div class="suggestion-artist">${item.artist || ""}</div>
      </div>

    </div>
  `).join("");
}

  function runSearch(){
    const q = searchInput.value.trim().toLowerCase();

    if(!q){
      render(allData);
      return;
    }

    const filtered = allData.filter(item =>
      (item.name || "").toLowerCase().includes(q) ||
      (item.artist || "").toLowerCase().includes(q) ||
      (item.album || "").toLowerCase().includes(q)
    );

    render(filtered);
  }
searchInput.addEventListener("input", (e)=>{
  const q = e.target.value.toLowerCase();

  if(!q){
    suggestionsBox.innerHTML = "";
    render(allData); // restore full list
    return;
  }

  showSuggestions(q);
  runSearch();
});

  /* CLICK SUGGESTION */
  suggestionsBox.addEventListener("click", (e)=>{
    const item = e.target.closest(".suggestion-item");
    if(!item) return;

    const name = item.dataset.name;

    searchInput.value = name;
    suggestionsBox.innerHTML = "";

    runSearch();
  });

  /* BUTTON */
  searchBtn.onclick = runSearch;

  /* ENTER */
  searchInput.addEventListener("keypress", (e)=>{
    if(e.key === "Enter"){
      runSearch();
    }
  });

  /* PURCHASE */
  document.addEventListener("click", async e=>{
    if(e.target.classList.contains("buy")){

      e.preventDefault();

      if(!user){
        window.location.href = "/user/login.html";
        return;
      }

      const card = e.target.closest(".card");
      const id = card.dataset.id;
      const item = allData.find(i => i.id == id);

      const { data: existing } = await supabase
        .from("purchases")
        .select("*")
        .eq("user_id", user.id)
        .eq("track_id", item.id);

      if(existing.length){
        alert("Already purchased");
        return;
      }

      await supabase.from("purchases").insert([{
        user_id: user.id,
        track_id: item.id,
        price: item.price
      }]);

      alert("Purchased 🎉");
    }
  });

  /* MENU */
  const menuBtn = document.getElementById("menuBtn");
  const sideMenu = document.getElementById("sideMenu");

  menuBtn.onclick = ()=> sideMenu.classList.toggle("open");

  document.addEventListener("click",(e)=>{
    if(!sideMenu.contains(e.target) && !menuBtn.contains(e.target)){
      sideMenu.classList.remove("open");
    }
  });

  /* INIT */
  await load();

});
</script>

</body>
</html>

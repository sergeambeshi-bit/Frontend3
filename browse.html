<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse – JENGU</title>

  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/theme-afro.css">
</head>

<body>

<!-- PATTERN BACKGROUND -->
<div class="toghu"></div>
<div class="kuba"></div>

<!-- HEADER -->
<header class="header container flex" style="justify-content: space-between;">
  <img src="/assets/logo.svg" class="logo" style="height:40px;">
</header>

<!-- SEARCH -->
<section class="section container">
  <input 
    type="text" 
    id="searchInput" 
    placeholder="Search music, artists..."
    style="width:100%; padding:1rem; border-radius:10px; border:none; background:#1a1a1a; color:white;"
  >
</section>

<!-- RESULTS -->
<section class="section container">
  <h2>Browse</h2>
  <div id="browseGrid" class="grid grid-4"></div>
</section>

<script src="/js/api.js"></script>
<script>
async function loadBrowse() {
  const container = document.getElementById("browseGrid");
  const data = await fetchBrowseResults();

  container.innerHTML = "";

  data.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${item.cover || '/assets/placeholders/album.svg'}" class="card-cover">
      <div class="card-title">${item.name}</div>
      <div class="card-meta">${item.type}</div>
    `;

    container.appendChild(card);
  });
}

document.getElementById("searchInput").addEventListener("input", async (e) => {
  const query = e.target.value.toLowerCase();
  const data = await fetchBrowseResults();

  const filtered = data.filter(item =>
    item.name.toLowerCase().includes(query)
  );

  const container = document.getElementById("browseGrid");
  container.innerHTML = "";

  filtered.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${item.cover || '/assets/placeholders/album.svg'}" class="card-cover">
      <div class="card-title">${item.name}</div>
      <div class="card-meta">${item.type}</div>
    `;

    container.appendChild(card);
  });
});

document.addEventListener("DOMContentLoaded", loadBrowse);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse – JENGU</title>
<link rel="stylesheet" href="/styles/app.css">
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <span class="menu" id="menuBtn">☰</span>

  <!-- ✅ HOME LOGO -->
  <a href="/index.html">
    <img src="/assets/logo.png" class="logo">
  </a>

  <span id="langBtn">FR ▾</span>
</div>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">
  <a href="/">Accueil</a>
  <a href="/browse.html">Parcourir</a>
  <a href="/genres.html">Genres</a>
  <a href="/charts.html">Charts</a>
  <a href="/new-releases.html">New</a>
</div>

<!-- SEARCH -->
<section class="section">
  <input 
    type="text" 
    id="searchInput" 
    placeholder="Search songs or albums..." 
    style="width:100%"
  >
</section>

<!-- RESULTS -->
<section class="section">
  <div id="browseGrid"></div>
</section>

<script type="module">
import { initLang } from "/js/lang.js";
import { supabase } from "/js/supabase.js";
import { getCurrentUser } from "/js/auth.js";

initLang();

/* =========================
   WAIT FOR DOM (CRITICAL FIX)
========================= */
window.addEventListener("DOMContentLoaded", async () => {

  const user = getCurrentUser();

  const searchInput = document.getElementById("searchInput");
  const grid = document.getElementById("browseGrid");

  let allData = [];

  /* =========================
     LOAD DATA
  ========================= */
  async function load(){
    const { data } = await supabase.from("tracks").select("*");
    allData = data || [];
    render(allData);
  }

  /* =========================
     CARD
  ========================= */
  function createCard(item){
    const link = item.type === "album"
      ? `/album.html?album=${encodeURIComponent(item.album || item.name)}`
      : `/track.html?id=${item.id}`;

    return `
      <a href="${link}" class="card" data-id="${item.id}">
        <img src="${item.cover || '/assets/covers/cover1.png'}">
        <div>${item.name}</div>
        <div>${item.price} XAF</div>
        <button class="buy">Buy</button>
      </a>
    `;
  }

  /* =========================
     RENDER
  ========================= */
  function render(data){
    grid.innerHTML = data.map(createCard).join("");
  }

  /* =========================
     SEARCH (FIXED)
  ========================= */
  searchInput.addEventListener("input", (e)=>{
    const q = e.target.value.toLowerCase();

    const filtered = allData.filter(item =>
      (item.name || "").toLowerCase().includes(q) ||
      (item.artist || "").toLowerCase().includes(q) ||
      (item.album || "").toLowerCase().includes(q)
    );

    render(filtered);
  });

  /* =========================
     PURCHASE (UNCHANGED)
  ========================= */
  document.addEventListener("click", async e=>{
    if(e.target.classList.contains("buy")){

      e.preventDefault();

      if(!user){
        window.location.href = "/user/login.html";
        return;
      }

      const card = e.target.closest(".card");
      const id = card.dataset.id;
      const item = allData.find(i => i.id == id);

      const { data: existing } = await supabase
        .from("purchases")
        .select("*")
        .eq("user_id", user.id)
        .eq("track_id", item.id);

      if(existing.length){
        alert("Already purchased");
        return;
      }

      await supabase.from("purchases").insert([{
        user_id: user.id,
        track_id: item.id,
        price: item.price
      }]);

      alert("Purchased 🎉");
    }
  });

  /* =========================
     MENU
  ========================= */
  const menuBtn = document.getElementById("menuBtn");
  const sideMenu = document.getElementById("sideMenu");

  menuBtn.onclick = ()=> sideMenu.classList.toggle("open");

  document.addEventListener("click",(e)=>{
    if(!sideMenu.contains(e.target) && !menuBtn.contains(e.target)){
      sideMenu.classList.remove("open");
    }
  });

  /* INIT */
  load();

});
</script>

</body>
</html>

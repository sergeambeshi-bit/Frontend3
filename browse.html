<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse – JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <span class="menu" id="menuBtn">☰</span>
  <h3 id="pageTitle">Browse</h3>
  <span id="langBtn">FR ▾</span>
</div>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">
  <a href="/">Accueil</a>
  <a href="/browse.html">Parcourir</a>
  <a href="/genres.html">Genres</a>
  <a href="/charts.html">Charts</a>
  <a href="/new-releases.html">New</a>
  <a href="/user/library.html">Library</a>
</div>

<!-- SEARCH -->
<section class="section">
  <input 
    type="text" 
    id="searchInput" 
    placeholder="Search music..."
    class="admin-search"
    style="width:100%; padding:10px; border-radius:8px; border:none; background:#222; color:white;"
  >
</section>

<!-- RESULTS -->
<section class="section">
  <div id="browseGrid" class="scroll-row" style="flex-wrap:wrap;"></div>
</section>

<script type="module">
import { supabase } from "/js/supabase.js";
import { getCurrentUser } from "/js/auth.js";

/* =========================
   AUTH
========================= */
const user = getCurrentUser();

/* =========================
   STATE
========================= */
let allData = [];
let currentData = [];

/* =========================
   LANGUAGE
========================= */
const translations = {
  fr: { browse:"Parcourir", search:"Rechercher..." },
  en: { browse:"Browse", search:"Search music..." }
};

let lang = localStorage.getItem("lang") || "fr";

function applyLang(){
  document.getElementById("pageTitle").textContent = translations[lang].browse;
  document.getElementById("searchInput").placeholder = translations[lang].search;
  document.getElementById("langBtn").textContent = lang.toUpperCase()+" ▾";
}

document.getElementById("langBtn").onclick = ()=>{
  lang = lang === "fr" ? "en" : "fr";
  localStorage.setItem("lang", lang);
  applyLang();
};

applyLang();

/* =========================
   MENU
========================= */
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");

menuBtn.onclick = ()=> sideMenu.classList.toggle("open");

document.addEventListener("click",(e)=>{
  if(!sideMenu.contains(e.target) && !menuBtn.contains(e.target)){
    sideMenu.classList.remove("open");
  }
});

/* =========================
   URL PARAMS
========================= */
const params = new URLSearchParams(window.location.search);
const selectedGenre = params.get("genre");

/* =========================
   CARD
========================= */
function createCard(item){

  return `
    <div class="card" data-id="${item.id}">
      <div class="cover">
        <img src="${item.cover}" loading="lazy">
        <button class="play">▶</button>
      </div>

      <div class="title">${item.name}</div>

      <div class="card-bottom">
        <span class="price">${item.price} XAF</span>
        <button class="buy">Buy</button>
      </div>
    </div>
  `;
}

/* =========================
   RENDER
========================= */
function render(data){
  const grid = document.getElementById("browseGrid");

  if(!data.length){
    grid.innerHTML = `<p class="empty-state">No results</p>`;
    return;
  }

  let html = "";
  data.forEach(item=>{
    html += createCard(item);
  });

  grid.innerHTML = html;
  currentData = data;
}

/* =========================
   LOAD DATA
========================= */
async function load(){

  try {

    const { data, error } = await supabase
      .from("tracks")
      .select("*");

    if(error){
      console.error(error);
      return;
    }

    allData = data || [];

  } catch(e){
    console.error("Failed to load tracks:", e);
    return;
  }

  let filtered = allData;

  if(selectedGenre){
    filtered = allData.filter(item =>
      item.genre?.toLowerCase() === selectedGenre.toLowerCase()
    );

    document.getElementById("pageTitle").textContent =
      selectedGenre.toUpperCase();
  }

  render(filtered);
}

/* =========================
   SEARCH
========================= */
document.getElementById("searchInput").addEventListener("input", (e)=>{

  const q = e.target.value.toLowerCase();

  const filtered = currentData.filter(item =>
    item.name.toLowerCase().includes(q)
  );

  render(filtered);
});

/* =========================
   EVENTS
========================= */
document.addEventListener("click", async e=>{

  /* PLAY */
  if(e.target.classList.contains("play")){
    const audio = new Audio("/assets/sample.mp3");
    audio.play();
    setTimeout(()=>audio.pause(),30000);
  }

  /* BUY */
  if(e.target.classList.contains("buy")){

    if(!user){
      window.location.href = "/user/login.html";
      return;
    }

    const btn = e.target;
    btn.innerText = "Processing...";
    btn.disabled = true;

    const card = btn.closest(".card");
    const id = card.dataset.id;

    const item = allData.find(i => i.id == id);
    if(!item) return;

    try {

      // 🔥 check if already purchased
      const { data: existing } = await supabase
        .from("purchases")
        .select("*")
        .eq("user_id", user.id)
        .eq("track_id", item.id);

      if(existing.length){
        alert("You already own this track");
        btn.innerText = "Owned";
        return;
      }

      // 🔥 insert purchase
      const { error } = await supabase
        .from("purchases")
        .insert([
          {
            user_id: user.id,
            track_id: item.id,
            price: item.price
          }
        ]);

      if(error){
        console.error(error);
        alert("Purchase failed ❌");
        btn.innerText = "Buy";
        btn.disabled = false;
        return;
      }

      alert("Purchase successful 🎉");

      btn.innerText = "Owned";
      btn.classList.add("disabled");

    } catch(err){
      console.error(err);
      alert("Error occurred ❌");
      btn.innerText = "Buy";
      btn.disabled = false;
    }
  }

});

/* INIT */
load();

</script>

</body>
</html>

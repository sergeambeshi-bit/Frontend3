<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse – JENGU</title>
<link rel="stylesheet" href="/styles/app.css">
</head>

<body>

<div class="topbar">
  <span class="menu" id="menuBtn">☰</span>
  <h3 id="pageTitle">Browse</h3>
  <span id="langBtn">FR ▾</span>
</div>

<div id="sideMenu" class="side-menu">
  <a href="/">Accueil</a>
  <a href="/browse.html">Parcourir</a>
  <a href="/genres.html">Genres</a>
  <a href="/charts.html">Charts</a>
  <a href="/new-releases.html">New</a>
</div>

<section class="section">
  <input type="text" id="searchInput" placeholder="Search..." style="width:100%">
</section>

<section class="section">
  <div id="browseGrid"></div>
</section>

<script type="module">
import { initLang } from "/js/lang.js";
import { supabase } from "/js/supabase.js";
import { getCurrentUser } from "/js/auth.js";

initLang();

/* =========================
   STATE
========================= */
const user = getCurrentUser();

let allData = [];
let currentData = [];

/* =========================
   HELPERS
========================= */
function normalize(str){
  return (str || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/\s+/g, "-");
}

/* =========================
   CARD
========================= */
function createCard(item){
  return `
    <div class="card" data-id="${item.id}">
      <img src="${item.cover || '/assets/covers/cover1.png'}">
      <div>${item.name}</div>
      <div>${item.price} XAF</div>
      <button class="buy">Buy</button>
    </div>
  `;
}

/* =========================
   RENDER
========================= */
function render(data){
  const grid = document.getElementById("browseGrid");
  grid.innerHTML = data.map(createCard).join("");
  currentData = data;
}

/* =========================
   LOAD DATA (SUPABASE)
========================= */
const params = new URLSearchParams(window.location.search);
const genreParam = params.get("genre");

async function load(){
  const { data } = await supabase.from("tracks").select("*");

  allData = data || [];

  let filtered = [...allData];

  /* 🔥 GENRE FILTER */
  if(genreParam){
    filtered = filtered.filter(item =>
      normalize(item.genre) === genreParam
    );
  }

  render(filtered);
}

/* =========================
   SEARCH
========================= */
document.getElementById("searchInput").addEventListener("input", e=>{
  const q = e.target.value.toLowerCase();

  const filtered = allData.filter(item =>
    item.name.toLowerCase().includes(q) ||
    item.artist.toLowerCase().includes(q)
  );

  render(filtered);
});

/* =========================
   PURCHASE SYSTEM (UNCHANGED)
========================= */
document.addEventListener("click", async e=>{
  if(e.target.classList.contains("buy")){

    if(!user){
      window.location.href = "/user/login.html";
      return;
    }

    const card = e.target.closest(".card");
    const id = card.dataset.id;
    const item = allData.find(i => i.id == id);

    const { data: existing } = await supabase
      .from("purchases")
      .select("*")
      .eq("user_id", user.id)
      .eq("track_id", item.id);

    if(existing.length){
      alert("Already purchased");
      return;
    }

    await supabase.from("purchases").insert([{
      user_id: user.id,
      track_id: item.id,
      price: item.price
    }]);

    alert("Purchased 🎉");
  }
});

/* =========================
   MENU
========================= */
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");

menuBtn.onclick = ()=> sideMenu.classList.toggle("open");

document.addEventListener("click",(e)=>{
  if(!sideMenu.contains(e.target) && !menuBtn.contains(e.target)){
    sideMenu.classList.remove("open");
  }
});

/* INIT */
load();
</script>

</body>
</html>

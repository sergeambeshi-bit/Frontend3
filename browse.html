<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse – JENGU</title>
<link rel="stylesheet" href="/styles/app.css">
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <span class="menu" id="menuBtn">☰</span>

  <a href="/index.html">
    <img src="/assets/logo.png" class="logo">
  </a>

  <span id="langBtn"></span>
</div>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">
  <a href="/" data-i18n="browse"></a>
  <a href="/browse.html" data-i18n="browse"></a>
  <a href="/genres.html" data-i18n="genres"></a>
  <a href="/charts.html" data-i18n="charts"></a>
  <a href="/new-releases.html" data-i18n="new"></a>
</div>

<!-- SEARCH -->
<div class="search-fixed">
  <div class="search-box">
    <input 
      type="search"
      id="searchInput"
      data-i18n="search"
    >
    <button id="searchBtn">🔍</button>
  </div>

  <div id="suggestions" class="suggestions"></div>
</div>

<!-- RESULTS -->
<section class="section">
  <div id="browseGrid"></div>
</section>

<script type="module">
import { initLang, applyLang } from "/js/lang.js";
import { supabase } from "/js/supabase.js";
import { getCurrentUser } from "/js/auth.js";

/* INIT LANGUAGE */
initLang();

window.addEventListener("DOMContentLoaded", async () => {

  const user = getCurrentUser();

  const searchInput = document.getElementById("searchInput");
  const searchBtn = document.getElementById("searchBtn");
  const suggestionsBox = document.getElementById("suggestions");
  const grid = document.getElementById("browseGrid");

  let allData = [];

  /* LOAD DATA */
  async function load(){
    const { data } = await supabase.from("tracks").select("*");
    allData = normalizeData(data || []);
    render(allData);
  }

  /* GET RANDOM COVER */
  function getRandomCover(){
    const covers = [
      "/assets/covers/album1.png",
      "/assets/covers/album2.png", 
      "/assets/covers/album3.png",
      "/assets/covers/cover.png",
      "/assets/covers/cover02.png",
      "/assets/covers/cover03.png",
      "/assets/covers/cover1.png",
      "/assets/covers/cover2.png",
      "/assets/covers/cover3.png",
      "/assets/covers/cover5.png",
      "/assets/covers/cover6.png",
      "/assets/covers/cover7.png"
    ];
    return covers[Math.floor(Math.random() * covers.length)];
  }

  /* NORMALIZE DATA */
  function normalizeData(data) {
    if (!Array.isArray(data)) return [];

    return data.map(item => ({
      id: item.id || Date.now(),
      name: item.name || item.title || "Unknown",
      artist: item.artist || item.artist_name || "Unknown Artist",
      album: item.album || "",
      genre: (item.genre || "").toLowerCase(),
      price: item.price || 300,
      cover: item.cover || getRandomCover(),
      type: item.type || "track",
      createdAt: item.createdAt || new Date().toISOString()
    }));
  }

  /* CARD */
  function createCard(item){
    const link = item.type === "album"
      ? `/album.html?album=${encodeURIComponent(item.album || item.name)}`
      : `/track.html?id=${item.id}`;

    return `
      <a href="${link}" class="card" data-id="${item.id}">
        <img src="${item.cover || getRandomCover()}">
        <div>${item.name}</div>
        <div>${item.price} XAF</div>
        <button class="buy" data-i18n="buy"></button>
      </a>
    `;
  }

  /* RENDER */
  function render(data){
    grid.innerHTML = data.map(createCard).join("");

    /* 🔥 apply translations after render */
    applyLang();
  }

  /* SUGGESTIONS */
  function showSuggestions(query){
    if(!query){
      suggestionsBox.innerHTML = "";
      return;
    }

    const matches = allData
      .filter(item =>
        (item.name || "").toLowerCase().includes(query) ||
        (item.artist || "").toLowerCase().includes(query)
      )
      .slice(0,5);

    suggestionsBox.innerHTML = matches.map(item => `
      <div class="suggestion-item" data-name="${item.name}">
        <img src="${item.cover || getRandomCover()}">
        <div>
          <div>${item.name}</div>
          <small>${item.artist || ""}</small>
        </div>
      </div>
    `).join("");
  }

  /* SEARCH */
  function runSearch(){
    const q = searchInput.value.trim().toLowerCase();

    if(!q){
      render(allData);
      return;
    }

    const filtered = allData.filter(item =>
      (item.name || "").toLowerCase().includes(q) ||
      (item.artist || "").toLowerCase().includes(q) ||
      (item.album || "").toLowerCase().includes(q)
    );

    render(filtered);
  }

  /* EVENTS */

  searchInput.addEventListener("input", (e)=>{
    const q = e.target.value.toLowerCase();

    if(!q){
      suggestionsBox.innerHTML = "";
      render(allData);
      return;
    }

    showSuggestions(q);
  });

  searchBtn.onclick = runSearch;

  searchInput.addEventListener("keypress", (e)=>{
    if(e.key === "Enter"){
      runSearch();
    }
  });

  suggestionsBox.addEventListener("click", (e)=>{
    const item = e.target.closest(".suggestion-item");
    if(!item) return;

    const name = item.dataset.name;

    searchInput.value = name;
    suggestionsBox.innerHTML = "";

    runSearch();
  });

  /* PURCHASE */
  document.addEventListener("click", async e=>{
    if(e.target.classList.contains("buy")){

      e.preventDefault();

      if(!user){
        window.location.href = "/user/login.html";
        return;
      }

      const card = e.target.closest(".card");
      const id = card.dataset.id;
      const item = allData.find(i => i.id == id);

      const { data: existing } = await supabase
        .from("purchases")
        .select("*")
        .eq("user_id", user.id)
        .eq("track_id", item.id);

      if(existing.length){
        alert("Already purchased");
        return;
      }

      await supabase.from("purchases").insert([{
        user_id: user.id,
        track_id: item.id,
        price: item.price
      }]);

      alert("Purchased 🎉");
    }
  });

  /* MENU */
  const menuBtn = document.getElementById("menuBtn");
  const sideMenu = document.getElementById("sideMenu");

  menuBtn.onclick = ()=> sideMenu.classList.toggle("open");

  document.addEventListener("click",(e)=>{
    if(!sideMenu.contains(e.target) && !menuBtn.contains(e.target)){
      sideMenu.classList.remove("open");
    }
  });

  await load();

});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evenements - JENGU</title>
<link rel="stylesheet" href="/styles/app.css">
<link rel="stylesheet" href="/styles/components.css">
<script src="/js/performance-lite.js" defer></script>
</head>
<body class="has-topbar-clearance fan-premium-page" data-i18n-title="eventsPageTitle">
<a href="/checkout.html" class="cart-btn" aria-label="Voir le panier" data-i18n-aria="viewCartAria"><span class="cart-icon">🛒</span><span class="cart-count">0</span></a>

<div class="topbar">
  <span class="menu" id="menuBtn">☰</span>
  <a href="/index.html"><img loading="lazy" decoding="async" src="/assets/logo.png" class="logo" alt="JENGU"></a>
</div>

<div id="sideMenu" class="side-menu">
  <a href="/discover.html" data-i18n="discoverNav">Decouvrir</a>
  <a href="/browse.html" data-i18n="musicNav">Musique</a>
  <a href="/movies.html" data-i18n="moviesNav">Films</a>
  <a href="/events.html" data-i18n="eventsNav">Evenements</a>
  <a href="/merch.html" data-i18n="merchNav">Merch</a>
  <a href="/creators.html" data-i18n="creatorsNav">Createurs</a>
  <a href="/artist-pricing.html" data-i18n="artistPricingNav">Tarifs</a>
  <a href="/artist/signup.html" data-i18n="sellOnJenguNav">Vendre</a>
</div>

<section class="section">
  <h2 data-i18n="eventsHeading">Marketplace Evenements</h2>
  <div id="eventsTicketGrid" class="regional-pulse-grid"></div>
</section>

<section class="section discovery-access">
  <div class="discovery-access-head">
    <div>
      <h3 style="margin:0 0 4px;" data-i18n="exploreMoreHeading">Explorer</h3>
      <p data-i18n="exploreMoreEventsBody">Parcourez les evenements ici, puis ouvrez le flux global pour decouvrir plus.</p>
    </div>
    <a href="/discover.html" class="btn-ghost" data-i18n="discoverNav">Discover</a>
  </div>
  <div class="explore-strip">
    <a href="/browse.html" class="explore-chip" data-i18n="musicNav">Musique</a>
    <a href="/movies.html" class="explore-chip" data-i18n="moviesNav">Films</a>
    <a href="/events.html" class="explore-chip active" data-i18n="eventsNav">Evenements</a>
    <a href="/merch.html" class="explore-chip" data-i18n="merchNav">Merch</a>
  </div>
</section>

<nav class="bottom-nav" aria-label="Primary">
  <a href="/index.html" data-i18n="home">Home</a>
  <a class="active" href="/discover.html" data-i18n="discoverNav">Discover</a>
  <a href="/artist/signup.html" data-i18n="sellOnJenguNav">Sell</a>
  <a href="/user/login.html" data-i18n="profile">Profile</a>
</nav>

<script type="module">
import { initLang, getLang, translate } from "/js/lang.js";
import { marketplaceItems, getLocalizedValue } from "/js/marketplace-catalog.js";
import { cart } from "/js/cart.js";
import { getCurrentUser } from "/js/auth.js";

initLang();

const ticketGrid = document.getElementById("eventsTicketGrid");
const tickets = marketplaceItems.filter((item) => item.category === "events");
const kindLabelMap = {
  live: "kindLive",
  screening: "kindScreening"
};

function renderTickets() {
  if (!ticketGrid) return;

  if (!tickets.length) {
    ticketGrid.innerHTML = `<article class="pulse-card"><p>${translate("discoverNoItems")}</p></article>`;
    return;
  }

  ticketGrid.innerHTML = tickets.map((item) => `
    <a class="mc-card" href="/event.html?id=${item.id}" data-cat="events" data-id="${item.id}">
      <div class="mc-card-img">
        <img loading="lazy" decoding="async" src="${item.cover}" alt="${getLocalizedValue(item.title, getLang())}">
        <span class="mc-card-badge badge-live">${translate(kindLabelMap[item.kind] || "kindLive")}</span>
      </div>
      <div class="mc-card-body">
        <p class="mc-card-title">${getLocalizedValue(item.title, getLang())}</p>
        <p class="mc-card-creator">${item.creator}</p>
        <p class="mc-card-meta">${item.city || ""} • ${item.releaseDate || ""}</p>
        <div class="mc-card-foot">
          <span class="mc-card-price">${item.price} XAF</span>
          <button type="button" class="mc-card-cta event-buy" data-id="${item.id}">${translate("buy")}</button>
        </div>
      </div>
    </a>
  `).join("");
}

renderTickets();

document.addEventListener("click", (e) => {
  const buyBtn = e.target.closest(".event-buy");
  if (!buyBtn) return;

  const currentUser = getCurrentUser();
  if (!currentUser) {
    window.location.href = "/user/login.html";
    return;
  }

  const item = tickets.find((entry) => String(entry.id) === String(buyBtn.dataset.id));
  if (!item) return;

  const added = cart.add({
    id: String(item.id),
    name: getLocalizedValue(item.title, getLang()),
    artist: item.creator,
    cover: item.cover,
    price: Number(item.price || 0),
    type: "event-ticket"
  });

  if (added) {
    window.location.href = "/checkout.html";
  }
});

const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");
menuBtn.onclick = () => sideMenu.classList.toggle("open");
document.addEventListener("click", (e) => {
  if (!sideMenu.contains(e.target) && !menuBtn.contains(e.target)) {
    sideMenu.classList.remove("open");
  }
});
</script>
</body>
</html>

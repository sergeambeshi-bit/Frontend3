<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nouveautés – JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
</head>

<body>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">
  <div class="menu-header">
    <img src="/assets/logo.png" class="menu-logo">
  </div>

  <a href="/index.html">Accueil</a>
  <a href="/browse.html">Parcourir</a>
  <a href="/genres.html">Genres</a>
  <a href="/charts.html">Top Charts</a>
  <a href="/new-releases.html">Nouveautés</a>

  <a href="/user/library.html">Ma Bibliothèque</a>
  <a href="/user/purchases.html">Mes Achats</a>
  <a href="/user/settings.html">Paramètres</a>
</div>

<!-- HEADER -->
<div class="topbar">
  <span class="menu" id="menuBtn">☰</span>
  <a href="/index.html">
  <img src="/assets/logo.png" class="logo">
</a>
  <span></span>
</div>

<!-- NEW RELEASES -->
<section class="section">
  <h3>Nouvelles Sorties</h3>
  <div class="scroll-row" id="releases"></div>
</section>

<script type="module">
import { fetchNewReleases } from "/js/api.js";
import { initLang } from "/js/lang.js";

initLang();

/* MENU */
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");

menuBtn.addEventListener("click", () => {
  sideMenu.classList.toggle("open");
});

document.addEventListener("click", (e) => {
  if (!sideMenu.contains(e.target) && !menuBtn.contains(e.target)) {
    sideMenu.classList.remove("open");
  }
});

/* CARD */
function createCard(item){
  return `
    <div class="card">
      <div class="cover">
        <img src="${item.cover}">
        <button class="play">▶</button>
      </div>

      <div class="title">${item.title || item.name}</div>

      <div class="card-bottom">
        <span class="price">${Math.floor(Math.random()*1500)} XAF</span>
        <button class="buy">Buy</button>
      </div>
    </div>
  `;
}

/* LOAD */
async function loadReleases(){
  const container = document.getElementById("releases");

  try {
    const data = await fetchNewReleases();

    container.innerHTML = "";

    data.forEach(item => {
      container.innerHTML += createCard(item);
    });

  } catch (err) {
    container.innerHTML = "<p>Erreur de chargement</p>";
  }
}

/* PREVIEW */
document.addEventListener("click", e=>{
  if(e.target.classList.contains("play")){
    const audio = new Audio("/assets/sample.mp3");
    audio.play();
    setTimeout(()=>audio.pause(),30000);
  }
});

/* BUY */
document.addEventListener("click", e=>{
  if(e.target.classList.contains("buy")){
    alert("Paiement bientôt disponible");
  }
});

loadReleases();

</script>

</body>
</html>

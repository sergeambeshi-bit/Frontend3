<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nouveautés – JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
<script src="/js/performance-lite.js" defer></script>
</head>

<body class="has-topbar-clearance new-releases-page">

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">
  <div class="menu-header">
    <img loading="lazy" decoding="async" src="/assets/logo.png" class="menu-logo">
  </div>

  <a href="/index.html">Accueil</a>
  <a href="/browse.html">Parcourir</a>
  <a href="/genres.html">Genres</a>
  <a href="/charts.html">Top Charts</a>
  <a href="/new-releases.html">Nouveautés</a>

  <a href="/user/library.html">Ma Bibliothèque</a>
  <a href="/user/purchases.html">Mes Achats</a>
  <a href="/settings.html">Paramètres</a>
</div>

<!-- HEADER -->
<div class="topbar">
  <span class="menu" id="menuBtn">☰</span>
  <a href="/index.html"><img loading="lazy" decoding="async" src="/assets/logo.png" class="logo"></a>
  <a href="/checkout.html" class="cart-btn" aria-label="Voir le panier" data-i18n-aria="viewCartAria"><span class="cart-icon">🛒</span><span class="cart-count">0</span></a>
</div>

<!-- NEW RELEASES -->
<section class="section">
  <h3 data-i18n="newReleases">Nouvelles Sorties</h3>
  <div class="scroll-row" id="releases"></div>
</section>

<script type="module">
import { fetchNewReleases } from "/js/api.js";
import { initLang, translate } from "/js/lang.js";
import { getCurrentUser } from "/js/auth.js";
import { cart } from "/js/cart.js";

initLang();

let releasesData = [];

function safeCover(path){
  if(!path || typeof path !== "string") return "/assets/covers/cover1.png";
  if(path.startsWith("http") || path.startsWith("/assets/")) return path;
  if(path.startsWith("assets/")) return `/${path}`;
  return `/assets/covers/${path}`;
}

/* MENU */
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");

menuBtn.addEventListener("click", () => {
  sideMenu.classList.toggle("open");
});

document.addEventListener("click", (e) => {
  if (!sideMenu.contains(e.target) && !menuBtn.contains(e.target)) {
    sideMenu.classList.remove("open");
  }
});

/* CARD */
function createCard(item){
  const price = Number(item.price || item.amount || 300);
  const itemId = String(item.id || item.name || Math.random());

  return `
    <div class="card" data-id="${itemId}">
      <div class="cover">
        <img loading="lazy" decoding="async" src="${safeCover(item.cover)}" alt="${item.title || item.name || "release"}">
        <button class="play">▶</button>
      </div>

      <div class="title">${item.title || item.name}</div>

      <div class="card-bottom">
        <span class="price">${price} XAF</span>
        <button class="buy" data-id="${itemId}">${translate("buy")}</button>
      </div>
    </div>
  `;
}

/* LOAD */
async function loadReleases(){
  const container = document.getElementById("releases");
  container.innerHTML = `<p class="sub">${translate("loading") || "Loading..."}</p>`;

  try {
    const data = await fetchNewReleases();

    if(!Array.isArray(data) || data.length === 0){
      container.innerHTML = `<p class="sub">${translate("noData") || "No releases available for now."}</p>`;
      return;
    }

    releasesData = [...data].sort((a, b) => {
      const aDate = Date.parse(a.createdAt || a.releaseDate || "") || 0;
      const bDate = Date.parse(b.createdAt || b.releaseDate || "") || 0;
      return bDate - aDate;
    });

    container.innerHTML = "";

    releasesData.forEach(item => {
      container.innerHTML += createCard(item);
    });

  } catch (err) {
    container.innerHTML = `<p>${translate("loadingError")}</p>`;
  }
}

/* PREVIEW */
document.addEventListener("click", e=>{
  if(e.target.classList.contains("play")){
    const audio = new Audio("/assets/sample.wav");
    audio.play();
    setTimeout(()=>audio.pause(),30000);
  }
});

/* BUY */
document.addEventListener("click", e=>{
  if(e.target.classList.contains("buy")){
    const user = getCurrentUser();

    if(!user){
      window.location.href = "/user/login.html";
      return;
    }

    const itemId = String(e.target.dataset.id || "");
    const item = releasesData.find(r => String(r.id || r.name) === itemId);

    if(!item){
      alert(translate("loadingError"));
      return;
    }

    const added = cart.add({
      id: String(item.id || item.name || Math.random()),
      name: item.name || item.title || "Release",
      artist: item.artist || "Unknown Artist",
      cover: safeCover(item.cover),
      price: Number(item.price || item.amount || 300)
    });

    if (added) {
      e.target.textContent = "✓ In Cart";
      e.target.style.background = "rgba(1,212,171,0.22)";
      e.target.style.color = "#6dfae0";
      e.target.style.border = "1px solid rgba(1,212,171,0.45)";
    }
  }
});

loadReleases();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Album – JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
</head>

<body>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">
  <div class="menu-header">
    <img src="/assets/logo.png" class="menu-logo">
  </div>

  <a href="/pages/index.html">Accueil</a>
  <a href="/pages/browse.html">Parcourir</a>
  <a href="/pages/genres.html">Genres</a>
  <a href="/pages/charts.html">Top Charts</a>
  <a href="/pages/new-releases.html">Nouveautés</a>

  <a href="/user/library.html">Ma Bibliothèque</a>
  <a href="/user/purchases.html">Mes Achats</a>
  <a href="/user/settings.html">Paramètres</a>
</div>

<!-- HERO -->
<section class="hero" style="height:60vh;">
  <div class="hero-bg" id="albumBg"></div>
  <div class="hero-patterns"></div>

  <div class="topbar">
    <span class="menu" id="menuBtn">☰</span>
    <img src="/assets/logo.png" class="logo">
    <span></span>
  </div>

  <div class="hero-content">
    <h1 id="albumTitle">Album</h1>
    <p id="albumArtist" class="sub">Artiste</p>
  </div>
</section>

<!-- ALBUM INFO -->
<section class="section">

  <div class="cover" style="max-width:200px; margin:auto;">
    <img id="albumCover" src="/assets/covers/cover1.png">
  </div>

  <h3 id="albumName" style="text-align:center;">Nom de l'album</h3>
  <p id="albumArtist2" class="sub" style="text-align:center;">Artiste</p>

  <p class="price" style="text-align:center; margin-top:10px;">
    1500 XAF
  </p>

  <div class="cta" style="justify-content:center;">
    <button class="btn-primary buy-album">Acheter l'album</button>
  </div>

</section>

<!-- TRACKLIST -->
<section class="section">
  <h3>Tracklist</h3>
  <div id="albumTracks"></div>
</section>

<!-- PAYMENT MODAL -->
<div id="paymentModal" class="modal hidden">
  <div class="modal-content">
    <h3>Paiement</h3>

    <div class="pay-section">
      <p class="label">🇨🇲 Mobile Money</p>
      <button class="pay-btn momo" data-method="mtn">MTN MoMo</button>
      <button class="pay-btn momo" data-method="orange">Orange Money</button>
    </div>

    <div class="pay-section">
      <p class="label">💳 Carte</p>
      <button class="pay-btn card" data-method="card">Visa / Mastercard</button>
    </div>

    <input type="text" id="phone" placeholder="6XXXXXXXX">
    <button class="confirm">Confirmer</button>
  </div>
</div>

<script type="module">
import { fetchBrowseResults } from "/js/api.js";

/* MENU */
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");

menuBtn.addEventListener("click", () => {
  sideMenu.classList.toggle("open");
});

document.addEventListener("click", (e) => {
  if (!sideMenu.contains(e.target) && !menuBtn.contains(e.target)) {
    sideMenu.classList.remove("open");
  }
});

/* GET ALBUM FROM URL */
const params = new URLSearchParams(window.location.search);
const albumName = params.get("album");

/* CREATE TRACK */
function createTrack(item, index){
  return `
    <div class="chart-item">
      <span>${String(index+1).padStart(2,'0')}</span>
      <img src="${item.cover}">
      <div class="info">
        <b>${item.name}</b>
        <p>${item.artist}</p>
      </div>
      <button class="play">▶</button>
      <div class="price">${Math.floor(Math.random()*300)} XAF</div>
    </div>
  `;
}

/* LOAD ALBUM */
async function loadAlbum(){
  const data = await fetchBrowseResults();

  const tracks = data.filter(item =>
    (item.album || "").toLowerCase() === (albumName || "").toLowerCase()
  );

  if(tracks.length === 0) return;

  const album = tracks[0];

  document.getElementById("albumTitle").textContent = album.album;
  document.getElementById("albumName").textContent = album.album;
  document.getElementById("albumArtist").textContent = album.artist;
  document.getElementById("albumArtist2").textContent = album.artist;

  document.getElementById("albumCover").src = album.cover;
  document.getElementById("albumBg").style.backgroundImage = `url(${album.cover})`;

  const container = document.getElementById("albumTracks");
  container.innerHTML = "";

  tracks.forEach((track, i)=>{
    container.innerHTML += createTrack(track, i);
  });
}

/* PREVIEW */
document.addEventListener("click", e=>{
  if(e.target.classList.contains("play")){
    const audio = new Audio("/assets/sample.mp3");
    audio.play();
    setTimeout(()=>audio.pause(),30000);
  }
});

/* PAYMENT */
let selectedMethod = null;

document.addEventListener("click", e => {

  if(e.target.classList.contains("buy-album")){
    document.getElementById("paymentModal").classList.remove("hidden");
  }

  if(e.target.classList.contains("pay-btn")){
    selectedMethod = e.target.dataset.method;

    document.querySelectorAll(".pay-btn").forEach(btn=>{
      btn.style.background = "#222";
      btn.style.color = "white";
    });

    e.target.style.background = "#01d4ab";
    e.target.style.color = "black";
  }

  if(e.target.classList.contains("confirm")){
    if(!selectedMethod){
      alert("Choisissez un moyen de paiement");
      return;
    }

    document.getElementById("paymentModal").classList.add("hidden");

    showDownloadModal();
  }

});

/* DOWNLOAD */
function showDownloadModal(){
  const modal = document.createElement("div");

  modal.className = "modal";

  modal.innerHTML = `
    <div class="modal-content">
      <h3>Album prêt</h3>
      <p>Téléchargement disponible.</p>

      <a href="/assets/sample.mp3" download class="download-btn">
        Télécharger ZIP
      </a>

      <button class="close-download">Fermer</button>
    </div>
  `;

  document.body.appendChild(modal);

  modal.addEventListener("click", e=>{
    if(e.target.classList.contains("close-download")){
      modal.remove();
    }
  });
}

loadAlbum();

</script>

</body>
</html>

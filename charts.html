<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Charts – JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
</head>

<body>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">
  <div class="menu-header">
    <img src="/assets/logo.png" class="menu-logo">
  </div>

  <a href="/index.html">Accueil</a>
  <a href="/browse.html">Parcourir</a>
  <a href="/genres.html">Genres</a>
  <a href="/charts.html">Top Charts</a>
  <a href="/new-releases.html">Nouveautés</a>

  <a href="/user/library.html">Ma Bibliothèque</a>
  <a href="/user/purchases.html">Mes Achats</a>
  <a href="/user/settings.html">Paramètres</a>
</div>

<!-- HEADER -->
<div class="topbar">
  <span class="menu" id="menuBtn">☰</span>
  <a href="/index.html"><img src="/assets/logo.png" class="logo"></a>
  <span></span>
</div>

<!-- TOP TRACKS -->
<section class="section">
  <h3>Top Tracks</h3>
  <div id="topTracks"></div>
</section>

<!-- TRENDING -->
<section class="section">
  <h3>Tendance</h3>
  <div id="trendingTracks"></div>
</section>

<script type="module">
import { initLang } from "/js/lang.js";

initLang();
import { fetchBrowseResults } from "/js/api.js";

/* MENU */
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");

menuBtn.addEventListener("click", () => {
  sideMenu.classList.toggle("open");
});

document.addEventListener("click", (e) => {
  if (!sideMenu.contains(e.target) && !menuBtn.contains(e.target)) {
    sideMenu.classList.remove("open");
  }
});

/* CREATE ROW */
function createChartItem(item, index){
  return `
    <div class="chart-item">
      <span>${String(index+1).padStart(2,'0')}</span>
      <img src="${item.cover}">
      <div class="info">
        <b>${item.name}</b>
        <p>${item.artist || "Artist"}</p>
      </div>
      <div class="price">${Math.floor(Math.random()*300)} XAF</div>
    </div>
  `;
}

/* LOAD DATA */
async function loadCharts(){
  const data = await fetchBrowseResults();

  const top = document.getElementById("topTracks");
  const trending = document.getElementById("trendingTracks");

  top.innerHTML = "";
  trending.innerHTML = "";

  /* TOP TRACKS */
  data.slice(0,10).forEach((item,i)=>{
    top.innerHTML += createChartItem(item, i);
  });

  /* TRENDING */
  data.slice(10,20).forEach((item,i)=>{
    trending.innerHTML += createChartItem(item, i);
  });
}

/* PREVIEW */
document.addEventListener("click", e=>{
  if(e.target.classList.contains("play")){
    const audio = new Audio("/assets/sample.mp3");
    audio.play();
    setTimeout(()=>audio.pause(),30000);
  }
});

/* BUY */
document.addEventListener("click", e=>{
  if(e.target.classList.contains("price")){
    alert("Paiement bientôt disponible");
  }
});

loadCharts();

</script>

</body>
</html>

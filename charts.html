<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JENGU – Charts</title>
  <!-- CSS System -->
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/theme-afro.css">
</head>
<body class="dark-theme">

  <!-- HEADER -->
  <header class="site-header">
    <img src="/assets/logo.svg" class="logo" alt="JENGU Logo">
    <nav>
      <a href="/index.html">Home</a>
      <a href="/browse.html">Browse</a>
      <a href="/genres.html">Genres</a>
      <a href="/charts.html" class="active">Charts</a>
      <a href="/new-releases.html">New Releases</a>
      <a href="/blog.html">Blog</a>
    </nav>
    <div class="user-actions">
      <a href="/user/login.html" class="btn btn-neon-outline">Login</a>
      <a href="/user/signup.html" class="btn btn-neon">Sign Up</a>
    </div>
  </header>

  <!-- TOP TRACKS -->
  <section class="charts-section">
    <h1 class="section-title">Top Tracks</h1>
    <div class="charts-grid" id="top-tracks">
      <!-- JS dynamically populates top tracks -->
    </div>
  </section>

  <!-- TOP ALBUMS -->
  <section class="charts-section">
    <h1 class="section-title">Top Albums</h1>
    <div class="charts-grid" id="top-albums">
      <!-- JS dynamically populates top albums -->
    </div>
  </section>

  <!-- TRENDING ARTISTS -->
  <section class="charts-section">
    <h1 class="section-title">Trending Artists</h1>
    <div class="charts-grid" id="trending-artists">
      <!-- JS dynamically populates trending artists -->
    </div>
  </section>

  <!-- JS System -->
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script>
    // Sample data placeholders
    const topTracks = [
      { title: "Afrobeat Anthem", artist: "DJ Afro", cover: "/assets/patterns/toghu.svg" },
      { title: "Highlife Vibes", artist: "Kofi Star", cover: "/assets/patterns/kuba.svg" },
      { title: "Mudcloth Groove", artist: "Mali Beats", cover: "/assets/patterns/mudcloth.svg" },
    ];

    const topAlbums = [
      { title: "Neo Africa", artist: "AfroNova", cover: "/assets/patterns/toghu.svg" },
      { title: "Vibrations", artist: "Kuba Sounds", cover: "/assets/patterns/kuba.svg" },
      { title: "Mali Nights", artist: "Mudcloth Collective", cover: "/assets/patterns/mudcloth.svg" },
    ];

    const trendingArtists = [
      { name: "DJ Afro", cover: "/assets/patterns/toghu.svg" },
      { name: "Kofi Star", cover: "/assets/patterns/kuba.svg" },
      { name: "Mali Beats", cover: "/assets/patterns/mudcloth.svg" },
    ];

    function renderCharts(data, containerId, type) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';

      data.forEach(item => {
        const card = document.createElement('div');
        card.className = 'chart-card';
        card.innerHTML = `
          <div class="pattern-overlay" style="background-image: url('${item.cover}')"></div>
          <h2>${type === 'artist' ? item.name : item.title}</h2>
          ${type !== 'artist' ? `<p>${item.artist}</p>` : ''}
        `;
        container.appendChild(card);
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderCharts(topTracks, 'top-tracks', 'track');
      renderCharts(topAlbums, 'top-albums', 'album');
      renderCharts(trendingArtists, 'trending-artists', 'artist');
    });
  </script>

</body>
</html>

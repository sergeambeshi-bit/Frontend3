<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n-title="genrePageTitle">Genre - JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
</head>

<body class="has-topbar-clearance" data-i18n-title="genrePageTitle">

<div id="sideMenu" class="side-menu">
  <div class="menu-header">
    <img src="/assets/logo.png" class="menu-logo" alt="JENGU logo">
  </div>

  <a href="/index.html">Accueil</a>
  <a href="/browse.html">Parcourir</a>
  <a href="/genres.html">Genres</a>
  <a href="/charts.html">Top Charts</a>
  <a href="/new-releases.html">Nouveautes</a>
  <a href="/user/library.html">Ma Bibliotheque</a>
  <a href="/user/purchases.html">Mes Achats</a>
</div>

<div class="topbar">
  <span class="menu" id="menuBtn">☰</span>
  <h3 id="genreHeading" data-i18n="genreDefaultHeading">Genre</h3>
  <span></span>
</div>

<section class="section">
  <p id="genreSub" class="sub" style="margin-bottom:12px;" data-i18n="loading">Chargement des sorties...</p>
  <div id="genreTracks"></div>
</section>

<script type="module">
import { initLang, translate } from "/js/lang.js";
import { fetchBrowseResults } from "/js/api.js";

initLang();

const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");

menuBtn.addEventListener("click", () => {
  sideMenu.classList.toggle("open");
});

document.addEventListener("click", (event) => {
  if (!sideMenu.contains(event.target) && !menuBtn.contains(event.target)) {
    sideMenu.classList.remove("open");
  }
});

function normalizeGenre(value) {
  return String(value || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/\s+/g, "-")
    .trim();
}

function prettyGenre(value) {
  const normalized = String(value || "").replace(/-/g, " ").trim();
  if (!normalized) return translate("genreDefaultHeading");
  return normalized
    .split(" ")
    .filter(Boolean)
    .map(part => part[0].toUpperCase() + part.slice(1))
    .join(" ");
}

function getCoverUrl(item) {
  if (!item.cover) return "/assets/covers/cover1.png";
  if (item.cover.startsWith("http") || item.cover.startsWith("/assets/")) return item.cover;
  if (item.cover.startsWith("assets/")) return `/${item.cover}`;
  return `/assets/covers/${item.cover}`;
}

function getItemLink(item) {
  return item.type === "album"
    ? `/album.html?album=${encodeURIComponent(item.album || item.name)}`
    : `/track.html?id=${item.id}`;
}

function renderTrackRow(item) {
  return `
    <a href="${getItemLink(item)}" class="chart-item">
      <img src="${getCoverUrl(item)}" loading="lazy" alt="${item.name}">
      <div class="info">
        <b>${item.name || "Untitled"}</b>
        <p>${item.artist || "Unknown Artist"} • ${(item.price || 300)} XAF</p>
      </div>
    </a>
  `;
}

async function loadGenrePage() {
  const params = new URLSearchParams(window.location.search);
  const genreQuery = params.get("genre") || "";
  const normalizedQuery = normalizeGenre(genreQuery);

  const heading = document.getElementById("genreHeading");
  const sub = document.getElementById("genreSub");
  const container = document.getElementById("genreTracks");

  heading.textContent = genreQuery ? prettyGenre(normalizedQuery || genreQuery) : translate("genreDefaultHeading");

  const items = await fetchBrowseResults();
  const genreItems = (Array.isArray(items) ? items : []).filter(item => {
    const itemGenre = normalizeGenre(item.genre || "");
    return itemGenre === normalizedQuery;
  });

  if (!genreItems.length) {
    sub.textContent = translate("genreNoResults");
    container.innerHTML = "";
    return;
  }

  sub.textContent = `${genreItems.length} ${translate("genreResultsAvailable")}`;
  container.innerHTML = genreItems.map(renderTrackRow).join("");
}

loadGenrePage();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promotions admin - JENGU</title>

  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/layout.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/theme-afro.css">
</head>

<body class="dark-theme admin-panel" data-i18n-title="promotionsPageTitle">

  <!-- HEADER -->
  <header class="admin-header">
    <a href="/index.html"><img src="../assets/logo.png" class="logo"></a>

    <nav>
      <a href="dashboard.html" data-i18n="dashboard">Dashboard</a>
      <a href="users.html" data-i18n="users">Utilisateurs</a>
      <a href="artists.html" data-i18n="artists">Artistes</a>
      <a href="catalog.html" data-i18n="catalogShort">Catalogue</a>
      <a href="transactions.html" data-i18n="transactions">Transactions</a>
      <a href="payouts.html" data-i18n="payouts">Paiements</a>
      <a href="promotions.html" class="active" data-i18n="promotions">Promotions</a>
      <a href="fraud.html" data-i18n="fraudShort">Fraude</a>
    </nav>
  </header>

  <!-- MAIN -->
  <main class="admin-main">

    <h1 data-i18n="promotions">Promotions</h1>

    <!-- SEARCH -->
    <input 
      type="text"
      id="searchPromo"
      placeholder="Rechercher des campagnes..."
      class="admin-search"
    >

    <!-- TABLE -->
    <table class="neon-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Titre</th>
          <th>Type</th>
          <th>Debut</th>
          <th>Fin</th>
          <th>Statut</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody id="promo-list"></tbody>
    </table>

  </main>

  <script src="../js/admin.js"></script>

  <script type="module">
    import { initLang } from "/js/lang.js";

initLang();
    let promotions = [
      {id: 1, title: 'Afrobeat Launch', type: 'Banner', start: '2026-03-01', end: '2026-03-10'},
      {id: 2, title: 'Top Artists Promo', type: 'Carousel', start: '2026-04-05', end: '2026-04-15'},
      {id: 3, title: 'New Releases Spotlight', type: 'Popup', start: '2026-03-08', end: '2026-03-20'},
    ];

    const tbody = document.getElementById('promo-list');

    function getStatus(start, end){
      const today = new Date();
      const s = new Date(start);
      const e = new Date(end);

      if(today < s) return "A venir";
      if(today > e) return "Terminee";
      return "Active";
    }

    function render(data){
      tbody.innerHTML = "";

      data.forEach(p => {
        const status = getStatus(p.start, p.end);

        const row = document.createElement('tr');

        row.innerHTML = `
          <td>${p.id}</td>
          <td>${p.title}</td>
          <td>${p.type}</td>
          <td>${p.start}</td>
          <td>${p.end}</td>

          <td>
            <span class="status status-${status.toLowerCase()}">
              ${status}
            </span>
          </td>

          <td>
            <button class="btn btn-neon-outline edit">Modifier</button>
            <button class="btn btn-neon delete">Supprimer</button>
          </td>
        `;

        /* EDIT */
        row.querySelector('.edit').addEventListener('click', () => {
          alert(`Modification : ${p.title}`);
        });

        /* DELETE */
        row.querySelector('.delete').addEventListener('click', () => {
          promotions = promotions.filter(item => item.id !== p.id);
          render(promotions);
        });

        tbody.appendChild(row);
      });
    }

    render(promotions);

    /* SEARCH */
    document.getElementById("searchPromo").addEventListener("input", e => {
      const q = e.target.value.toLowerCase();

      const filtered = promotions.filter(p =>
        p.title.toLowerCase().includes(q)
      );

      render(filtered);
    });

  </script>

</body>
</html>

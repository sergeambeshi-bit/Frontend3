<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JENGU Admin – Users</title>

  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/theme-afro.css">
</head>

<body class="dark-theme admin-panel">

  <!-- HEADER -->
  <header class="admin-header">
    <img src="../assets/logo.png" class="logo">

    <nav>
      <a href="dashboard.html" data-i18n="dashboard"></a>
      <a href="users.html" class="active" data-i18n="users"></a>
      <a href="artists.html" data-i18n="artists"></a>
      <a href="catalog.html" data-i18n="catalog"></a>
      <a href="transactions.html" data-i18n="transactions"></a>
      <a href="payouts.html" data-i18n="payouts"></a>
      <a href="promotions.html" data-i18n="promotions"></a>
      <a href="fraud.html" data-i18n="fraud"></a>
    </nav>
  </header>

  <!-- MAIN -->
  <main class="admin-main">

    <h1 data-i18n="manageUsers"></h1>

    <!-- SEARCH -->
    <input 
      type="text"
      id="searchUser"
      data-i18n="searchUsers"
      class="admin-search"
    >

    <!-- TABLE -->
    <table class="neon-table">
      <thead>
        <tr>
          <th>ID</th>
          <th data-i18n="username"></th>
          <th data-i18n="email"></th>
          <th data-i18n="joined"></th>
          <th data-i18n="status"></th>
          <th data-i18n="actions"></th>
        </tr>
      </thead>

      <tbody id="user-list"></tbody>
    </table>

  </main>

  <script src="../js/admin.js"></script>

  <script type="module">
    import { initLang, getLang } from "/js/lang.js";

    initLang();

    let users = [
      {id: 1, username: 'afrofan', email: 'afrofan@example.com', joined: '2026-01-01', status: 'Active'},
      {id: 2, username: 'beatking', email: 'beatking@example.com', joined: '2026-02-15', status: 'Inactive'},
      {id: 3, username: 'songbird', email: 'songbird@example.com', joined: '2026-03-10', status: 'Active'},
    ];

    const tbody = document.getElementById('user-list');

    function t(key){
      const lang = getLang();

      const dict = {
        fr: {
          active: "Actif",
          inactive: "Inactif",
          deactivate: "Désactiver",
          activate: "Activer",
          delete: "Supprimer"
        },
        en: {
          active: "Active",
          inactive: "Inactive",
          deactivate: "Deactivate",
          activate: "Activate",
          delete: "Delete"
        }
      };

      return dict[lang][key] || key;
    }

    function render(data){
      tbody.innerHTML = "";

      data.forEach(user => {
        const row = document.createElement('tr');

        const isActive = user.status === 'Active';

        row.innerHTML = `
          <td>${user.id}</td>
          <td>${user.username}</td>
          <td>${user.email}</td>
          <td>${user.joined}</td>

          <td>
            <span class="status status-${user.status.toLowerCase()}">
              ${isActive ? t("active") : t("inactive")}
            </span>
          </td>

          <td>
            <button class="btn btn-neon-outline toggle">
              ${isActive ? t("deactivate") : t("activate")}
            </button>

            <button class="btn btn-neon delete">
              ${t("delete")}
            </button>
          </td>
        `;

        row.querySelector('.toggle').addEventListener('click', () => {
          user.status = isActive ? 'Inactive' : 'Active';
          render(users);
        });

        row.querySelector('.delete').addEventListener('click', () => {
          users = users.filter(u => u.id !== user.id);
          render(users);
        });

        tbody.appendChild(row);
      });
    }

    render(users);

    document.getElementById("searchUser").addEventListener("input", e => {
      const q = e.target.value.toLowerCase();

      const filtered = users.filter(u =>
        u.username.toLowerCase().includes(q) ||
        u.email.toLowerCase().includes(q)
      );

      render(filtered);
    });

  </script>

</body>
</html>

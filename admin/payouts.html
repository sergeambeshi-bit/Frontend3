<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JENGU Admin – Payouts</title>

  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/theme-afro.css">
</head>

<body class="dark-theme admin-panel">

  <!-- HEADER -->
  <header class="admin-header">
    <a href="/index.html"><img src="../assets/logo.png" class="logo"></a>

    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="users.html">Users</a>
      <a href="artists.html">Artists</a>
      <a href="catalog.html">Catalog</a>
      <a href="transactions.html">Transactions</a>
      <a href="payouts.html" class="active">Payouts</a>
      <a href="promotions.html">Promotions</a>
      <a href="fraud.html">Fraud</a>
    </nav>
  </header>

  <!-- MAIN -->
  <main class="admin-main">

    <h1>Artist Payouts</h1>

    <!-- SEARCH -->
    <input 
      type="text"
      id="searchPayout"
      placeholder="Search artist..."
      class="admin-search"
    >

    <!-- TABLE -->
    <table class="neon-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Artist</th>
          <th>Amount</th>
          <th>Date</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody id="payout-list"></tbody>
    </table>

  </main>

<script type="module">
import { initLang } from "/js/lang.js";

initLang();
import { supabase } from "/js/supabase.js";

let payouts = [];

async function load(){

  const { data } = await supabase
    .from("payouts")
    .select("*")
    .order("created_at",{ascending:false});

  payouts = data || [];
  render(payouts);
}

function render(data){
  const tbody = document.getElementById("payout-list");

  tbody.innerHTML = data.map(p=>`
    <tr>
      <td>${p.id}</td>
      <td>${p.artist}</td>
      <td>${p.amount}</td>
      <td>${p.status}</td>
      <td>
        ${
          p.status==="requested"
          ? `<button class="pay" data-id="${p.id}">Mark Paid</button>`
          : "Done"
        }
      </td>
    </tr>
  `).join("");
}

document.addEventListener("click", async e=>{
  if(e.target.classList.contains("pay")){
    const id = e.target.dataset.id;

    await supabase
      .from("payouts")
      .update({status:"paid"})
      .eq("id",id);

    load();
  }
});

load();
</script>

</body>
</html>

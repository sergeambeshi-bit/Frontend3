<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JENGU Admin – Payouts</title>

  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/theme-afro.css">
</head>

<body class="dark-theme admin-panel">

  <!-- HEADER -->
  <header class="admin-header">
    <img src="../assets/logo.svg" class="logo">

    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="users.html">Users</a>
      <a href="artists.html">Artists</a>
      <a href="catalog.html">Catalog</a>
      <a href="transactions.html">Transactions</a>
      <a href="payouts.html" class="active">Payouts</a>
      <a href="promotions.html">Promotions</a>
      <a href="fraud.html">Fraud</a>
    </nav>
  </header>

  <!-- MAIN -->
  <main class="admin-main">

    <h1>Artist Payouts</h1>

    <!-- SEARCH -->
    <input 
      type="text"
      id="searchPayout"
      placeholder="Search artist..."
      class="admin-search"
    >

    <!-- TABLE -->
    <table class="neon-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Artist</th>
          <th>Amount</th>
          <th>Date</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody id="payout-list"></tbody>
    </table>

  </main>

<script type="module">

const API = "http://localhost:5001";

let payouts = [];

/* =========================
   LOAD PAYOUTS
========================= */
async function loadPayouts(){

  try {
    const res = await fetch(`${API}/api/payouts`);
    payouts = await res.json();

    render(payouts);

  } catch(err){
    console.error("Failed to load payouts:", err);
  }
}

/* =========================
   RENDER
========================= */
function render(data){

  const tbody = document.getElementById('payout-list');
  tbody.innerHTML = "";

  if(!data.length){
    tbody.innerHTML = `<tr><td colspan="6">No payouts</td></tr>`;
    return;
  }

  data.forEach(p => {

    const row = document.createElement('tr');

    row.innerHTML = `
      <td>${p.id}</td>
      <td>${p.artist}</td>
      <td>${p.amount} XAF</td>
      <td>${new Date(p.createdAt).toLocaleDateString()}</td>

      <td>
        <span class="status status-${p.status}">
          ${p.status}
        </span>
      </td>

      <td>
        ${p.status === 'requested' ? `
          <button class="btn btn-neon-outline mark-paid">
            Mark Paid
          </button>
        ` : '<span style="color:#aaa; font-size:12px;">Completed</span>'}
      </td>
    `;

    /* ACTION */
    const btn = row.querySelector('.mark-paid');

    if(btn){
      btn.addEventListener('click', async () => {

        btn.innerText = "Processing...";
        btn.disabled = true;

        try {

          await fetch(`${API}/api/payouts/approve/${p.id}`, {
            method: "PATCH"
          });

          loadPayouts();

        } catch(err){
          console.error(err);
          alert("Failed to update payout ❌");
          btn.innerText = "Mark Paid";
          btn.disabled = false;
        }
      });
    }

    tbody.appendChild(row);
  });
}

/* =========================
   SEARCH
========================= */
document.getElementById("searchPayout").addEventListener("input", e => {

  const q = e.target.value.toLowerCase();

  const filtered = payouts.filter(p =>
    p.artist.toLowerCase().includes(q)
  );

  render(filtered);
});

/* INIT */
loadPayouts();

</script>

</body>
</html>

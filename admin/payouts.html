<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JENGU Admin – Payouts</title>

  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/theme-afro.css">
</head>

<body class="dark-theme admin-panel">

  <!-- HEADER -->
  <header class="admin-header">
    <img src="../assets/logo.svg" class="logo">

    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="users.html">Users</a>
      <a href="artists.html">Artists</a>
      <a href="catalog.html">Catalog</a>
      <a href="transactions.html">Transactions</a>
      <a href="payouts.html" class="active">Payouts</a>
      <a href="promotions.html">Promotions</a>
      <a href="fraud.html">Fraud</a>
    </nav>
  </header>

  <!-- MAIN -->
  <main class="admin-main">

    <h1>Artist Payouts</h1>

    <!-- SEARCH -->
    <input 
      type="text"
      id="searchPayout"
      placeholder="Search artist..."
      class="admin-search"
    >

    <!-- TABLE -->
    <table class="neon-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Artist</th>
          <th>Amount</th>
          <th>Date</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody id="payout-list"></tbody>
    </table>

  </main>

  <script src="../js/admin.js"></script>

  <script>
    let payouts = [
      {id: 1, artist: 'AfroBeatz', amount: '15000 XAF', date: '2026-03-01', status: 'Paid'},
      {id: 2, artist: 'King Kora', amount: '20000 XAF', date: '2026-03-03', status: 'Pending'},
      {id: 3, artist: 'Mali Groove', amount: '12000 XAF', date: '2026-03-05', status: 'Paid'},
    ];

    const tbody = document.getElementById('payout-list');

    function render(data){
      tbody.innerHTML = "";

      data.forEach(p => {
        const row = document.createElement('tr');

        row.innerHTML = `
          <td>${p.id}</td>
          <td>${p.artist}</td>
          <td>${p.amount}</td>
          <td>${p.date}</td>

          <td>
            <span class="status status-${p.status.toLowerCase()}">
              ${p.status}
            </span>
          </td>

          <td>
            ${p.status === 'Pending' ? `
              <button class="btn btn-neon-outline mark-paid">
                Mark Paid
              </button>
            ` : '<span style="color:#aaa; font-size:12px;">Completed</span>'}
          </td>
        `;

        /* ACTION */
        const btn = row.querySelector('.mark-paid');
        if(btn){
          btn.addEventListener('click', () => {
            p.status = 'Paid';
            render(payouts);
          });
        }

        tbody.appendChild(row);
      });
    }

    render(payouts);

    /* SEARCH */
    document.getElementById("searchPayout").addEventListener("input", e => {
      const q = e.target.value.toLowerCase();

      const filtered = payouts.filter(p =>
        p.artist.toLowerCase().includes(q)
      );

      render(filtered);
    });

  </script>

</body>
</html>

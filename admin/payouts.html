<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n-title="adminPayoutsPageTitle">JENGU Admin – Payouts</title>

  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/layout.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/theme-afro.css">
<script src="/js/performance-lite.js" defer></script>
</head>

<body class="dark-theme admin-panel" data-i18n-title="adminPayoutsPageTitle">

  <!-- HEADER -->
  <header class="admin-header">
    <a href="/index.html"><img loading="lazy" decoding="async" src="../assets/logo.png" class="logo"></a>

    <nav>
      <a href="dashboard.html" data-i18n="dashboard">Dashboard</a>
      <a href="users.html" data-i18n="users">Utilisateurs</a>
      <a href="artists.html" data-i18n="artists">Artistes</a>
      <a href="catalog.html" data-i18n="catalogShort">Catalogue</a>
      <a href="transactions.html" data-i18n="transactions">Transactions</a>
      <a href="payouts.html" class="active" data-i18n="payouts">Paiements</a>
      <a href="promotions.html" data-i18n="promotions">Promotions</a>
      <a href="fraud.html" data-i18n="fraudShort">Fraude</a>
    </nav>
  </header>

  <!-- MAIN -->
  <main class="admin-main">

    <h1 data-i18n="adminPayoutsHeading">Paiements artistes</h1>

    <!-- SEARCH -->
    <input 
      type="text"
      id="searchPayout"
      placeholder="Rechercher un artiste..."
      data-i18n-placeholder="searchArtistPlaceholder"
      class="admin-search"
    >

    <!-- TABLE -->
    <table class="neon-table">
      <thead>
        <tr>
          <th data-i18n="idLabel">ID</th>
          <th data-i18n="artist">Artist</th>
          <th data-i18n="amountLabel">Amount</th>
          <th data-i18n="dateLabel">Date</th>
          <th data-i18n="status">Status</th>
          <th data-i18n="actions">Actions</th>
        </tr>
      </thead>

      <tbody id="payout-list"></tbody>
    </table>

  </main>

<script type="module">
import { initLang } from "/js/lang.js";

initLang();
import { supabase } from "/js/supabase.js";

let payouts = [];

async function load(){

  const { data } = await supabase
    .from("payouts")
    .select("*")
    .order("created_at",{ascending:false});

  payouts = data || [];
  render(payouts);
}

function render(data){
  const tbody = document.getElementById("payout-list");

  tbody.innerHTML = data.map(p=>`
    <tr>
      <td>${p.id}</td>
      <td>${p.artist}</td>
      <td>${p.amount}</td>
      <td>${p.status}</td>
      <td>
        ${
          p.status==="requested"
          ? `<button class="pay" data-id="${p.id}">${document.documentElement.lang === 'fr' ? 'Paye' : 'Paid'}</button>`
          : (document.documentElement.lang === 'fr' ? 'Termine' : 'Done')
        }
      </td>
    </tr>
  `).join("");
}

document.addEventListener("click", async e=>{
  if(e.target.classList.contains("pay")){
    const id = e.target.dataset.id;

    await supabase
      .from("payouts")
      .update({status:"paid"})
      .eq("id",id);

    load();
  }
});

load();
</script>

</body>
</html>

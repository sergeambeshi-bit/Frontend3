<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fraude admin - JENGU</title>

  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/layout.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/theme-afro.css">
</head>

<body class="dark-theme admin-panel" data-i18n-title="fraudPageTitle">

  <!-- HEADER -->
  <header class="admin-header">
    <a href="/index.html"><img src="../assets/logo.png" class="logo"></a>

    <nav>
      <a href="dashboard.html" data-i18n="dashboard">Tableau de bord</a>
      <a href="users.html" data-i18n="users">Utilisateurs</a>
      <a href="artists.html" data-i18n="artists">Artistes</a>
      <a href="catalog.html" data-i18n="catalogShort">Catalogue</a>
      <a href="transactions.html" data-i18n="transactions">Transactions</a>
      <a href="payouts.html" data-i18n="payouts">Paiements</a>
      <a href="promotions.html" data-i18n="promotions">Promotions</a>
      <a href="fraud.html" class="active" data-i18n="fraudShort">Fraude</a>
    </nav>
  </header>

  <!-- MAIN -->
  <main class="admin-main">

    <h1>Fraude</h1>

    <!-- SEARCH -->
    <input 
      type="text"
      id="searchFraud"
      placeholder="Rechercher des utilisateurs ou une activite..."
      class="admin-search"
    >

    <!-- TABLE -->
    <table class="neon-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Utilisateur</th>
          <th>Activite</th>
          <th>Date</th>
          <th>Statut</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody id="fraud-list"></tbody>
    </table>

  </main>

  <script src="../js/admin.js"></script>

  <script type="module">
    import { initLang } from "/js/lang.js";

initLang();
    let fraudReports = [
      {id: 1, user: 'afrofan', activity: 'Connexions echouees multiples', date: '2026-03-01', status: 'En revue'},
      {id: 2, user: 'beatking', activity: 'Paiement suspect', date: '2026-03-03', status: 'Investigation'},
      {id: 3, user: 'songbird', activity: 'Schema de telechargement anormal', date: '2026-03-05', status: 'Resolue'},
    ];

    const tbody = document.getElementById('fraud-list');

    function render(data){
      tbody.innerHTML = "";

      data.forEach(f => {
        const row = document.createElement('tr');

        row.innerHTML = `
          <td>${f.id}</td>
          <td>${f.user}</td>
          <td>${f.activity}</td>
          <td>${f.date}</td>

          <td>
            <span class="status status-${formatStatus(f.status)}">
              ${f.status}
            </span>
          </td>

          <td>

            ${f.status !== 'Resolue' ? `
              <button class="btn btn-neon-outline investigate">Investiguer</button>
              <button class="btn btn-neon resolve">Resoudre</button>
            ` : '<span style="color:#aaa; font-size:12px;">Ferme</span>'}

          </td>
        `;

        /* ACTIONS */
        const investigateBtn = row.querySelector('.investigate');
        if(investigateBtn){
          investigateBtn.addEventListener('click', () => {
            f.status = 'Investigation';
            render(fraudReports);
          });
        }

        const resolveBtn = row.querySelector('.resolve');
        if(resolveBtn){
          resolveBtn.addEventListener('click', () => {
            f.status = 'Resolue';
            render(fraudReports);
          });
        }

        tbody.appendChild(row);
      });
    }

    function formatStatus(status){
      return status.toLowerCase().replace(" ", "-");
    }

    render(fraudReports);

    /* SEARCH */
    document.getElementById("searchFraud").addEventListener("input", e => {
      const q = e.target.value.toLowerCase();

      const filtered = fraudReports.filter(f =>
        f.user.toLowerCase().includes(q) ||
        f.activity.toLowerCase().includes(q)
      );

      render(filtered);
    });

  </script>

</body>
</html>

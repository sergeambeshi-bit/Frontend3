<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JENGU Admin – Catalog</title>

  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/theme-afro.css">
</head>

<body class="dark-theme admin-panel">

  <!-- HEADER -->
  <header class="admin-header">
    <img src="../assets/logo.png" class="logo">

    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="users.html">Users</a>
      <a href="artists.html">Artists</a>
      <a href="catalog.html" class="active">Catalog</a>
      <a href="transactions.html">Transactions</a>
      <a href="payouts.html">Payouts</a>
      <a href="promotions.html">Promotions</a>
      <a href="fraud.html">Fraud</a>
    </nav>
  </header>

  <!-- MAIN -->
  <main class="admin-main">

    <h1>Manage Catalog</h1>

    <!-- SEARCH -->
    <input 
      type="text"
      id="searchCatalog"
      placeholder="Search tracks or artists..."
      class="admin-search"
    >

    <!-- TABLE -->
    <table class="neon-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Title</th>
          <th>Artist</th>
          <th>Type</th>
          <th>Release</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody id="catalog-list"></tbody>
    </table>

  </main>

  <script src="../js/admin.js"></script>

  <script type="module">
    import { initLang } from "/js/lang.js";

initLang();
    let catalog = [
      {id: 1, title: 'NeoAfro Vibes', artist: 'AfroBeatz', type: 'Album', release: '2026-01-12', status: 'Approved'},
      {id: 2, title: 'Kuba Nights', artist: 'King Kora', type: 'Single', release: '2026-02-15', status: 'Pending'},
      {id: 3, title: 'Mali Sunrise', artist: 'Mali Groove', type: 'Album', release: '2026-03-05', status: 'Rejected'},
    ];

    const tbody = document.getElementById('catalog-list');

    function render(data){
      tbody.innerHTML = "";

      data.forEach(item => {
        const row = document.createElement('tr');

        row.innerHTML = `
          <td>${item.id}</td>
          <td>${item.title}</td>
          <td>${item.artist}</td>
          <td>${item.type}</td>
          <td>${item.release}</td>

          <td>
            <span class="status status-${item.status.toLowerCase()}">
              ${item.status}
            </span>
          </td>

          <td>

            ${item.status === 'Pending' ? `
              <button class="btn btn-neon-outline approve">Approve</button>
              <button class="btn btn-neon-outline reject">Reject</button>
            ` : ''}

            <button class="btn btn-neon delete">Delete</button>

          </td>
        `;

        /* ACTIONS */

        const approveBtn = row.querySelector('.approve');
        if(approveBtn){
          approveBtn.addEventListener('click', () => {
            item.status = 'Approved';
            render(catalog);
          });
        }

        const rejectBtn = row.querySelector('.reject');
        if(rejectBtn){
          rejectBtn.addEventListener('click', () => {
            item.status = 'Rejected';
            render(catalog);
          });
        }

        row.querySelector('.delete').addEventListener('click', () => {
          catalog = catalog.filter(x => x.id !== item.id);
          render(catalog);
        });

        tbody.appendChild(row);
      });
    }

    render(catalog);

    /* SEARCH */
    document.getElementById("searchCatalog").addEventListener("input", e => {
      const q = e.target.value.toLowerCase();

      const filtered = catalog.filter(item =>
        item.title.toLowerCase().includes(q) ||
        item.artist.toLowerCase().includes(q)
      );

      render(filtered);
    });
  </script>

</body>
</html>

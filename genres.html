<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genres – JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
</head>

<body>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">
  <div class="menu-header">
    <img src="/assets/logo.png" class="menu-logo">
  </div>

  <a href="/index.html">Accueil</a>
  <a href="/browse.html">Parcourir</a>
  <a href="/genres.html">Genres</a>
  <a href="/charts.html">Top Charts</a>
  <a href="/new-releases.html">Nouveautés</a>

  <a href="/user/library.html">Ma Bibliothèque</a>
  <a href="/user/purchases.html">Mes Achats</a>
  <a href="/user/settings.html">Paramètres</a>
</div>

<!-- HEADER -->
<div class="topbar">
  <span class="menu" id="menuBtn">☰</span>
  <img src="/assets/logo.png" class="logo">
  <span></span>
</div>

<!-- GENRES -->
<section class="section">
  <h3>Explorer les Genres</h3>

  <div class="genres" id="genresGrid"></div>
</section>

<script>

/* MENU */
import { initLang } from "/js/lang.js";

initLang();
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");

menuBtn.addEventListener("click", () => {
  sideMenu.classList.toggle("open");
});

document.addEventListener("click", (e) => {
  if (!sideMenu.contains(e.target) && !menuBtn.contains(e.target)) {
    sideMenu.classList.remove("open");
  }
});

/* GENRES LIST (AFRICAN FOCUSED) */
const genres = [
  "Mboko",
  "Makossa",
  "Bikutsi",
  "Afropop",
  "Afrobeat",
  "Coupé-Décalé",
  "Ndombolo",
  "Rap FR",
  "Drill",
  "RnB Afro",
  "Gospel Camer",
  "Traditionnel"
];

/* RENDER */
function renderGenres(){
  const container = document.getElementById("genresGrid");

  genres.forEach(genre => {
    const div = document.createElement("div");
    div.className = "genre";
    div.textContent = genre;

    div.addEventListener("click", () => {
      window.location.href = `/browse.html?genre=${encodeURIComponent(genre.toLowerCase())}`;
    });

    container.appendChild(div);
  });
}

renderGenres();

</script>

</body>
</html>

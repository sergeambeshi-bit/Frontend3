<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JENGU – Discover African Music</title>

  <!-- CSS System (Fixed paths) -->
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/theme-afro.css">
</head>

<body class="dark-theme">

  <!-- HERO SECTION -->
  <section class="hero">
    <div class="hero-overlay">
      <img src="/assets/patterns/toghu.svg" class="pattern toghu" alt="Toghu pattern">
      <img src="/assets/patterns/kuba.svg" class="pattern kuba" alt="Kuba pattern">
      <img src="/assets/patterns/mudcloth.svg" class="pattern mudcloth" alt="Mudcloth pattern">
    </div>
    <div class="hero-content">
      <img src="/assets/logo.svg" class="logo" alt="JENGU Logo">

      <h1 class="hero-title">Discover African Music</h1>

      <div class="hero-cta">
        <a href="/pages/browse.html" class="btn btn-neon">Browse</a>
        <a href="/pages/new-releases.html" class="btn btn-neon-outline">New Releases</a>
      </div>

      <div class="scroll-indicator">↓ Scroll</div>
    </div>
  </section>

  <!-- NEW RELEASES SECTION -->
  <section class="new-releases">
    <h2>New Releases</h2>
    <div class="album-grid" id="new-releases-grid"></div>
  </section>

  <!-- TRENDING SECTION -->
  <section class="trending">
    <h2>Trending in Your Country — Cameroon</h2>
    <div class="track-list" id="trending-grid"></div>
  </section>

  <!-- TOP ARTISTS SECTION -->
  <section class="top-artists">
    <h2>Top Artists</h2>
    <div class="artist-grid" id="top-artists-grid"></div>
  </section>

  <!-- GENRES GRID -->
  <section class="genres">
    <h2>Genres</h2>
    <div class="genres-grid" id="genres-grid"></div>
  </section>

  <!-- JS System (Fixed paths) -->
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/cart.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {

      initHeroScrollIndicator();

      /* NEW RELEASES */
      const newReleasesGrid = document.getElementById('new-releases-grid');
      const loaderNR = showLoading(newReleasesGrid);
      try {
        const newReleases = await fetchNewReleases();
        hideLoading(loaderNR);
        newReleases.forEach(album => {
          const div = document.createElement('div');
          div.className = 'album-card';
          div.innerHTML = `
            <img src="${album.cover}" alt="${album.title}">
            <h3>${album.title}</h3>
            <p>${album.artist}</p>`;
          newReleasesGrid.appendChild(div);
        });
      } catch (err) {
        hideLoading(loaderNR);
        console.error(err);
      }

      /* TRENDING */
      const trendingGrid = document.getElementById('trending-grid');
      const loaderTrend = showLoading(trendingGrid);
      try {
        const trending = await fetchTrending();
        hideLoading(loaderTrend);
        trending.forEach(track => {
          const div = document.createElement('div');
          div.className = 'track-card';
          div.innerHTML = `
            <img src="${track.cover}" alt="${track.title}">
            <h4>${track.title}</h4>
            <p>${track.artist}</p>
            <button class="add-to-cart" data-track-id="${track.id}">Add</button>`;
          trendingGrid.appendChild(div);
        });
      } catch (err) {
        hideLoading(loaderTrend);
        console.error(err);
      }

      /* TOP ARTISTS */
      const topArtistsGrid = document.getElementById('top-artists-grid');
      const loaderArtists = showLoading(topArtistsGrid);
      try {
        const artists = await fetchTopArtists();
        hideLoading(loaderArtists);
        artists.forEach(artist => {
          const div = document.createElement('div');
          div.className = 'artist-card';
          div.innerHTML = `
            <img src="${artist.photo}" alt="${artist.name}">
            <h4>${artist.name}</h4>`;
          topArtistsGrid.appendChild(div);
        });
      } catch (err) {
        hideLoading(loaderArtists);
        console.error(err);
      }

      /* GENRES */
      const genresGrid = document.getElementById('genres-grid');
      const loaderGenres = showLoading(genresGrid);
      try {
        const genres = await fetchGenres();
        hideLoading(loaderGenres);
        genres.forEach(genre => {
          const div = document.createElement('div');
          div.className = 'genre-card';
          div.innerHTML = `<h4>${genre.name}</h4>`;
          genresGrid.appendChild(div);
        });
      } catch (err) {
        hideLoading(loaderGenres);
        console.error(err);
      }

      addNeonHover(document.querySelectorAll('.btn-neon, .btn-neon-outline'));
    });
  </script>

</body>
</html>

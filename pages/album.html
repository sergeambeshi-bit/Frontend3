<!-- frontend/pages/album.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Album</title>
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/theme-afro.css">
<script src="../js/api.js" defer></script>
<script src="../js/ui.js" defer></script>
</head>
<body>
<header>
    <h1>Album Title</h1>
</header>
<main>
    <section id="album-details">
        <div class="album-cover">
            <img src="../assets/patterns/mudcloth.svg" alt="Album cover">
        </div>
        <div class="album-tracks cards-container" id="album-tracks">
            <!-- JS rendered tracks -->
        </div>
    </section>
</main>
<footer>
    <p>&copy; 2026 Afro Music Platform</p>
</footer>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const tracks = await fetchNewReleases(); // placeholder
        renderAlbums(document.getElementById('album-tracks'), tracks);
    });
</script>
</body>
</html>

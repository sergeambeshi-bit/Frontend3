<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JENGU – Album</title>
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/theme-afro.css">
<script src="../js/api.js" defer></script>
<script src="../js/ui.js" defer></script>
</head>
<body class="dark-theme">

<header class="site-header">
  <img src="../assets/logo.svg" class="logo" alt="JENGU Logo">
  <nav>
    <a href="index.html">Home</a>
    <a href="browse.html">Browse</a>
    <a href="genres.html">Genres</a>
    <a href="charts.html">Charts</a>
    <a href="new-releases.html">New Releases</a>
    <a href="blog.html">Blog</a>
  </nav>
</header>

<main>
  <section id="album-details">
    <h1 id="album-title">Album Title</h1>
    <div class="album-cover">
      <img src="../assets/patterns/mudcloth.svg" alt="Album cover">
    </div>
    <div class="album-tracks cards-container" id="album-tracks"></div>
  </section>
</main>

<footer>
  <p>&copy; 2026 Afro Music Platform</p>
</footer>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  const tracks = await fetchNewReleases();
  renderAlbums(document.getElementById('album-tracks'), tracks);
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JENGU – Album</title>
  <!-- CSS System -->
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/theme-afro.css">
  <!-- JS System -->
  <script src="/js/api.js" defer></script>
  <script src="/js/ui.js" defer></script>
</head>
<body class="dark-theme">

  <!-- HEADER -->
  <header class="site-header">
    <img src="/assets/logo.svg" class="logo" alt="JENGU Logo">
    <nav>
      <a href="/index.html">Home</a>
      <a href="/browse.html">Browse</a>
      <a href="/genres.html">Genres</a>
      <a href="/charts.html">Charts</a>
      <a href="/new-releases.html">New Releases</a>
      <a href="/blog.html">Blog</a>
    </nav>
    <div class="user-actions">
      <a href="/user/login.html" class="btn btn-neon-outline">Login</a>
      <a href="/user/signup.html" class="btn btn-neon">Sign Up</a>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="album-page">
    <section id="album-details">
      <h1 id="album-title">Album Title</h1>
      <div class="album-cover">
        <img src="/assets/patterns/mudcloth.svg" alt="Album cover">
      </div>
      <div class="album-tracks cards-container" id="album-tracks">
        <!-- JS rendered tracks -->
      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2026 Afro Music Platform</p>
  </footer>

  <!-- Script to render album tracks -->
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const albumTracksContainer = document.getElementById('album-tracks');

      // Show temporary loading message
      albumTracksContainer.innerHTML = '<p class="loading-text">Loading tracks...</p>';

      try {
        const tracks = await fetchNewReleases(); // Replace with album-specific API if needed
        albumTracksContainer.innerHTML = '';

        tracks.forEach(track => {
          const card = document.createElement('div');
          card.className = 'track-card';
          card.innerHTML = `
            <img src="${track.cover || '/assets/patterns/mudcloth.svg'}" alt="${track.title}">
            <div class="track-info">
              <h3>${track.title}</h3>
              <p>${track.artist}</p>
              <button class="btn btn-neon-outline play-btn">Play</button>
            </div>
          `;
          albumTracksContainer.appendChild(card);
        });

      } catch (err) {
        albumTracksContainer.innerHTML = '<p class="error-text">Failed to load tracks.</p>';
        console.error('Album tracks fetch error:', err);
      }
    });
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JENGU – Contact Us</title>

  <!-- CSS System -->
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/theme-afro.css">

  <!-- JS -->
  <script src="/js/ui.js" defer></script>
</head>

<body class="dark-theme">

  <!-- HEADER -->
  <header class="site-header">
    <img src="/assets/logo.svg" class="logo" alt="JENGU Logo">

    <nav>
      <a href="/pages/index.html">Home</a>
      <a href="/pages/browse.html">Browse</a>
      <a href="/pages/genres.html">Genres</a>
      <a href="/pages/charts.html">Charts</a>
      <a href="/pages/new-releases.html">New Releases</a>
      <a href="/pages/contact.html" class="active">Contact</a>
    </nav>

    <div class="user-actions">
      <a href="/user/login.html" class="btn btn-neon-outline">Login</a>
      <a href="/user/signup.html" class="btn btn-neon">Sign Up</a>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="content-section">
    <h1 class="section-title">Contact Us</h1>

    <form id="contact-form" class="contact-form">
      <label>Name</label>
      <input type="text" name="name" required>

      <label>Email</label>
      <input type="email" name="email" required>

      <label>Message</label>
      <textarea name="message" required></textarea>

      <button type="submit" class="btn btn-neon">Send Message</button>
    </form>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p>&copy; 2026 JENGU — African Music Marketplace</p>
  </footer>

</body>
</html>

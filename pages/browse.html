<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JENGU – Browse</title>

  <!-- CSS System -->
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/theme-afro.css">
</head>

<body class="dark-theme">

  <!-- HEADER -->
  <header class="site-header">
    <img src="/assets/logo.svg" class="logo" alt="JENGU Logo">
    
    <nav>
      <a href="/pages/index.html">Home</a>
      <a href="/pages/browse.html" class="active">Browse</a>
      <a href="/pages/genres.html">Genres</a>
      <a href="/pages/charts.html">Charts</a>
      <a href="/pages/new-releases.html">New Releases</a>
    </nav>

    <div class="user-actions">
      <a href="/user/login.html" class="btn btn-neon-outline">Login</a>
      <a href="/user/signup.html" class="btn btn-neon">Sign Up</a>
    </div>
  </header>

  <!-- BROWSE SECTION -->
  <section class="browse-section">
    <h1 class="section-title">Browse Music</h1>

    <!-- Search Bar -->
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search tracks, albums, artists..." />
      <button id="search-btn" class="btn btn-neon-outline">Search</button>
    </div>

    <!-- Filters -->
    <div class="filters">
      <select id="filter-genre">
        <option value="">All Genres</option>
        <option value="afrobeat">Afrobeat</option>
        <option value="hiphop">Hip Hop</option>
        <option value="highlife">Highlife</option>
        <option value="gqom">Gqom</option>
        <option value="zouglou">Zouglou</option>
      </select>

      <select id="filter-type">
        <option value="">All Types</option>
        <option value="track">Track</option>
        <option value="album">Album</option>
        <option value="artist">Artist</option>
      </select>
    </div>

    <!-- Results -->
    <div class="browse-results" id="browse-results">
      <!-- JS populates dynamically -->
    </div>
  </section>

  <!-- JS System -->
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>

  <script>
    async function loadBrowseResults() {
      const container = document.getElementById('browse-results');
      container.innerHTML = '<p class="loading-text">Loading content...</p>';

      try {
        const results = await fetchBrowseResults();
        container.innerHTML = '';

        results.forEach(item => {
          const card = document.createElement('div');
          card.className = 'browse-card';
          card.innerHTML = `
            <img src="${item.cover || '/assets/patterns/mudcloth.svg'}" alt="${item.name}" class="cover">
            <div class="info">
              <h3>${item.name}</h3>
              <p>${item.type} • ${item.genre}</p>
            </div>
            <button class="btn btn-neon-outline play-btn">Play</button>
          `;
          container.appendChild(card);
        });

      } catch (err) {
        container.innerHTML = '<p class="error-text">Failed to load content.</p>';
        console.error('Browse fetch error:', err);
      }
    }

    // Filters + Search
    document.getElementById('search-btn').addEventListener('click', () => {
      const query = document.getElementById('search-input').value.toLowerCase();
      const genre = document.getElementById('filter-genre').value;
      const type = document.getElementById('filter-type').value;
      loadBrowseResultsFiltered(query, genre, type);
    });

    async function loadBrowseResultsFiltered(query, genre, type) {
      const container = document.getElementById('browse-results');
      container.innerHTML = '<p class="loading-text">Loading content...</p>';

      try {
        const results = await fetchBrowseResults();

        const filtered = results.filter(item => {
          const matchesQuery = item.name.toLowerCase().includes(query);
          const matchesGenre = genre ? item.genre === genre : true;
          const matchesType = type ? item.type === type : true;
          return matchesQuery && matchesGenre && matchesType;
        });

        container.innerHTML = '';

        filtered.forEach(item => {
          const card = document.createElement('div');
          card.className = 'browse-card';
          card.innerHTML = `
            <img src="${item.cover || '/assets/patterns/kuba.svg'}" alt="${item.name}" class="cover">
            <div class="info">
              <h3>${item.name}</h3>
              <p>${item.type} • ${item.genre}</p>
            </div>
            <button class="btn btn-neon-outline play-btn">Play</button>
          `;
          container.appendChild(card);
        });

        if (filtered.length === 0) {
          container.innerHTML = '<p class="empty-text">No results found.</p>';
        }

      } catch (err) {
        container.innerHTML = '<p class="error-text">Failed to load content.</p>';
        console.error('Browse filter error:', err);
      }
    }

    document.addEventListener('DOMContentLoaded', loadBrowseResults);
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog – JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
</head>

<body>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">
  <div class="menu-header">
    <img src="/assets/logo.png" class="menu-logo">
  </div>

  <a href="/index.html">Accueil</a>
  <a href="/browse.html">Parcourir</a>
  <a href="/genres.html">Genres</a>
  <a href="/charts.html">Top Charts</a>
  <a href="/new-releases.html">Nouveautés</a>

  <a href="/user/library.html">Ma Bibliothèque</a>
  <a href="/user/purchases.html">Mes Achats</a>
  <a href="/user/settings.html">Paramètres</a>
</div>

<!-- HEADER -->
<div class="topbar">
  <span class="menu" id="menuBtn">☰</span>
  <img src="/assets/logo.png" class="logo">
  <span></span>
</div>

<!-- BLOG -->
<section class="section">
  <h3>Blog</h3>
  <div id="blogPosts"></div>
</section>

<script type="module">
import { fetchBlogPosts } from "/js/api.js";

/* MENU */
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");

menuBtn.addEventListener("click", () => {
  sideMenu.classList.toggle("open");
});

document.addEventListener("click", (e) => {
  if (!sideMenu.contains(e.target) && !menuBtn.contains(e.target)) {
    sideMenu.classList.remove("open");
  }
});

/* CREATE POST */
function createPost(post){
  return `
    <div class="card" style="margin-bottom:15px;">
      <img src="${post.image}" style="border-radius:12px;">
      <div class="title">${post.title}</div>
      <p class="sub">${post.excerpt || ""}</p>

      <a href="/article.html?id=${post.id}" 
         class="btn-outline" 
         style="display:inline-block; margin-top:8px;">
         Lire
      </a>
    </div>
  `;
}

/* LOAD BLOG */
async function loadBlog(){
  const container = document.getElementById("blogPosts");

  try {
    const posts = await fetchBlogPosts();

    container.innerHTML = "";

    posts.forEach(post => {
      container.innerHTML += createPost(post);
    });

  } catch (err) {
    container.innerHTML = "<p>Erreur de chargement</p>";
  }
}

loadBlog();

</script>

</body>
</html>

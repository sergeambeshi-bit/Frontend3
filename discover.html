<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decouvrir - JENGU</title>
<link rel="stylesheet" href="/styles/app.css">
<style>
.discover-page {
  background:
    radial-gradient(900px 420px at 88% -6%, rgba(98, 226, 255, 0.24), transparent 62%),
    radial-gradient(700px 360px at 2% 8%, rgba(244, 183, 81, 0.14), transparent 58%),
    #1b2432;
  color: #e8ecf7;
}

.discover-shell {
  width: min(1120px, calc(100% - 28px));
  margin: 0 auto;
  padding: 104px 0 46px;
}

.discover-topbar {
  position: fixed;
  inset: 0 0 auto 0;
  z-index: 30;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  padding: 14px;
  background: rgba(16, 23, 34, 0.8);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
}

.discover-topbar nav {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.discover-topbar a {
  text-decoration: none;
  color: #d8e0f0;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  border: 1px solid rgba(255, 255, 255, 0.14);
  border-radius: 999px;
  padding: 6px 10px;
}

.discover-head {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  gap: 14px;
  margin-bottom: 18px;
}

.discover-head h1 {
  margin: 0;
  font-size: clamp(28px, 5vw, 44px);
}

.filter-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.filter-tab {
  border: 1px solid rgba(255, 255, 255, 0.16);
  background: rgba(20, 29, 42, 0.7);
  color: #d7deee;
  border-radius: 999px;
  padding: 8px 14px;
  cursor: pointer;
  font-weight: 700;
}

.filter-tab.active {
  color: #061615;
  background: linear-gradient(120deg, #01d4ab, #81ffe8);
  border-color: transparent;
}

.discover-controls {
  margin: 14px 0 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}

.discover-controls select {
  background: rgba(16, 24, 36, 0.86);
  color: #eef3ff;
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 10px;
  padding: 10px 12px;
}

.market-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
}

.market-card {
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid rgba(255, 255, 255, 0.12);
  background: rgba(23, 33, 48, 0.86);
}

.market-card img {
  width: 100%;
  aspect-ratio: 16/10;
  object-fit: cover;
}

.market-card-body {
  padding: 12px;
}

.market-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: #95a7c7;
  margin-bottom: 6px;
}

.market-tag {
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: #73f4df;
}

.market-empty {
  border: 1px dashed rgba(255, 255, 255, 0.2);
  border-radius: 16px;
  padding: 18px;
  color: #9eb0cd;
}

@media (max-width: 980px) {
  .market-grid {
    grid-template-columns: 1fr 1fr;
  }
}

@media (max-width: 700px) {
  .market-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body class="discover-page" data-i18n-title="discoverPageTitle">
<header class="discover-topbar">
  <a href="/index.html"><img src="/assets/logo.png" class="logo" alt="JENGU" style="width:140px;position:static;transform:none;"></a>
  <nav>
    <a href="/discover.html" data-i18n="discoverNav">Decouvrir</a>
    <a href="/browse.html" data-i18n="musicNav">Musique</a>
    <a href="/movies.html" data-i18n="moviesNav">Films</a>
    <a href="/events.html" data-i18n="eventsNav">Evenements</a>
    <a href="/merch.html" data-i18n="merchNav">Merch</a>
    <a href="/creators.html" data-i18n="creatorsNav">Createurs</a>
    <a href="/artist-pricing.html" data-i18n="artistPricingNav">Tarifs Artiste</a>
    <a href="/artist/signup.html" data-i18n="sellOnJenguNav">Vendre sur JENGU</a>
  </nav>
</header>

<main class="discover-shell">
  <section class="discover-head">
    <div>
      <p style="margin:0;color:#82f8e4;text-transform:uppercase;letter-spacing:.1em;font-size:12px;" data-i18n="discoverKicker">Discovery Unifiee</p>
      <h1 data-i18n="discoverHeading">Decouvrez La Musique, Les Films, Les Evenements Et Le Merch</h1>
      <p style="max-width:650px;color:#b9c6de;" data-i18n="discoverSub">Parcourez chaque categorie dans un flux premium, puis filtrez et triez selon ce que vous voulez collectionner.</p>
    </div>
  </section>

  <section>
    <div class="filter-tabs" id="filterTabs">
      <button class="filter-tab active" type="button" data-tab="all" data-i18n="discoverTabAll">All</button>
      <button class="filter-tab" type="button" data-tab="music" data-i18n="discoverTabMusic">Music</button>
      <button class="filter-tab" type="button" data-tab="movies" data-i18n="discoverTabMovies">Movies</button>
      <button class="filter-tab" type="button" data-tab="events" data-i18n="discoverTabEvents">Events</button>
      <button class="filter-tab" type="button" data-tab="merch" data-i18n="discoverTabMerch">Merch</button>
    </div>

    <div class="discover-controls">
      <p id="resultsMeta" style="margin:0;color:#9fb0cc;">0 resultats</p>
      <label>
        <span style="font-size:12px;color:#9fb0cc;margin-right:8px;" data-i18n="discoverSortLabel">Sort</span>
        <select id="sortSelect">
          <option value="popular" data-i18n="discoverSortPopular">Les Plus Populaires</option>
          <option value="newest" data-i18n="discoverSortNewest">Les Plus Recents</option>
          <option value="price-asc" data-i18n="discoverSortPriceAsc">Prix: Croissant</option>
          <option value="price-desc" data-i18n="discoverSortPriceDesc">Prix: Decroissant</option>
        </select>
      </label>
    </div>

    <div class="market-grid" id="discoverGrid"></div>
  </section>
</main>

<script type="module">
import { initLang, getLang, translate } from "/js/lang.js";
import { marketplaceItems, filterItems, sortItems, getLocalizedValue } from "/js/marketplace-catalog.js";

initLang();

const grid = document.getElementById("discoverGrid");
const resultsMeta = document.getElementById("resultsMeta");
const sortSelect = document.getElementById("sortSelect");
const tabs = [...document.querySelectorAll(".filter-tab")];

let activeTab = "all";
let activeSort = "popular";

const categoryLabelMap = {
  music: "discoverTabMusic",
  movies: "discoverTabMovies",
  events: "discoverTabEvents",
  merch: "discoverTabMerch"
};

function t(key) {
  return translate(key);
}

function refreshResultsMeta(count) {
  const key = count === 1 ? "discoverListingSingle" : "discoverListingPlural";
  resultsMeta.textContent = `${count} ${t(key)}`;
}

function itemCard(item) {
  const categoryKey = categoryLabelMap[item.category] || "discoverTabAll";
  const title = getLocalizedValue(item.title, getLang());
  const action = item.category === "merch"
    ? `<a href="/merch-product.html?id=${item.id}" class="btn-ghost" style="display:inline-block;margin-top:10px;padding:8px 12px;">${t("viewMerchDetails")}</a>`
    : "";

  return `
    <article class="market-card">
      <img src="${item.cover}" alt="${title}">
      <div class="market-card-body">
        <div class="market-meta">
          <span class="market-tag">${t(categoryKey)}</span>
          <span>${item.city}</span>
        </div>
        <h3 style="margin:0 0 6px;font-size:18px;">${title}</h3>
        <p style="margin:0;color:#b7c4dc;">${item.creator}</p>
        <p style="margin:8px 0 0;color:#d7e2f8;font-weight:700;">${item.price} XAF</p>
        ${action}
      </div>
    </article>
  `;
}

function render() {
  const filtered = filterItems(marketplaceItems, activeTab);
  const sorted = sortItems(filtered, activeSort);

  refreshResultsMeta(sorted.length);

  if (!sorted.length) {
    grid.innerHTML = `<div class="market-empty">${t("discoverNoItems")}</div>`;
    return;
  }

  grid.innerHTML = sorted.map(itemCard).join("");
}

tabs.forEach((tab) => {
  tab.addEventListener("click", () => {
    activeTab = tab.dataset.tab;
    tabs.forEach((btn) => btn.classList.remove("active"));
    tab.classList.add("active");
    render();
  });
});

sortSelect.addEventListener("change", () => {
  activeSort = sortSelect.value;
  render();
});

window.addEventListener("DOMContentLoaded", () => {
  const langBtn = document.getElementById("langBtn");
  if (langBtn) {
    langBtn.addEventListener("click", () => {
      window.setTimeout(() => {
        refreshResultsMeta(grid.querySelectorAll(".market-card").length);
        render();
      }, 0);
    });
  }
});

render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creator - JENGU</title>
<link rel="stylesheet" href="/styles/app.css">
</head>
<body class="has-topbar-clearance fan-premium-page" data-i18n-title="creatorPageTitle">
<div class="topbar">
  <span class="menu" id="menuBtn">☰</span>
  <a href="/index.html"><img src="/assets/logo.png" class="logo" alt="JENGU"></a>
</div>

<div id="sideMenu" class="side-menu">
  <a href="/discover.html">Discover</a>
  <a href="/browse.html">Music</a>
  <a href="/movies.html">Movies</a>
  <a href="/events.html">Events</a>
  <a href="/creators.html">Creators</a>
  <a href="/artist-pricing.html">Artist Pricing</a>
  <a href="/artist/signup.html">Sell on Jengu</a>
</div>

<section class="section">
  <div id="creatorHeader"></div>
  <h3 style="margin-top:18px;" data-i18n="creatorOfferings">Marketplace Offerings</h3>
  <div id="creatorListings" class="regional-pulse-grid"></div>
</section>

<script type="module">
import { initLang, translate } from "/js/lang.js";
import { creatorProfiles, marketplaceItems } from "/js/marketplace-catalog.js";

initLang();

const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const creator = creatorProfiles.find((item) => item.id === id) || creatorProfiles[0];

const categoryLabelMap = {
  music: "discoverTabMusic",
  movies: "discoverTabMovies",
  events: "discoverTabEvents"
};

document.getElementById("creatorHeader").innerHTML = `
  <h2>${creator.name}</h2>
  <p class="sub">${creator.city}</p>
  <p>${creator.bio}</p>
`;

const listings = marketplaceItems.filter((item) => item.creator === creator.name || creator.categories.includes(item.category));
const creatorListings = document.getElementById("creatorListings");

function renderListings() {
  creatorListings.innerHTML = listings.map((item) => `
    <article class="pulse-card">
      <h3>${item.title}</h3>
      <p>${translate(categoryLabelMap[item.category] || "discoverTabAll")} • ${item.kind}</p>
      <p>${item.price} XAF</p>
    </article>
  `).join("");
}

renderListings();

const langBtn = document.getElementById("langBtn");
if (langBtn) {
  langBtn.addEventListener("click", () => {
    window.setTimeout(renderListings, 0);
  });
}

const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");
menuBtn.onclick = () => sideMenu.classList.toggle("open");
document.addEventListener("click", (e) => {
  if (!sideMenu.contains(e.target) && !menuBtn.contains(e.target)) {
    sideMenu.classList.remove("open");
  }
});
</script>
</body>
</html>

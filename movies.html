<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Films - JENGU</title>
<link rel="stylesheet" href="/styles/app.css">
<link rel="stylesheet" href="/styles/components.css">
<script src="/js/performance-lite.js" defer></script>
</head>
<body class="has-topbar-clearance fan-premium-page" data-i18n-title="moviesPageTitle">
<div class="topbar">
  <span class="menu" id="menuBtn">☰</span>
  <a href="/index.html"><img loading="lazy" decoding="async" src="/assets/logo.png" class="logo" alt="JENGU"></a>
</div>

<div id="sideMenu" class="side-menu">
  <a href="/discover.html" data-i18n="discoverNav">Decouvrir</a>
  <a href="/browse.html" data-i18n="musicNav">Musique</a>
  <a href="/movies.html" data-i18n="moviesNav">Films</a>
  <a href="/events.html" data-i18n="eventsNav">Evenements</a>
  <a href="/merch.html" data-i18n="merchNav">Merch</a>
  <a href="/creators.html" data-i18n="creatorsNav">Createurs</a>
  <a href="/artist-pricing.html" data-i18n="artistPricingNav">Tarifs</a>
  <a href="/artist/signup.html" data-i18n="sellOnJenguNav">Vendre</a>
</div>

<section class="section">
  <h2 data-i18n="moviesHeading">Marketplace Films</h2>
  <div id="moviesGrid" class="regional-pulse-grid"></div>
</section>

<section class="section discovery-access">
  <div class="discovery-access-head">
    <div>
      <h3 style="margin:0 0 4px;" data-i18n="exploreMoreHeading">Explorer</h3>
      <p data-i18n="exploreMoreMoviesBody">Gardez cette page centree sur les films, puis passez au flux global pour decouvrir plus.</p>
    </div>
    <a href="/discover.html" class="btn-ghost" data-i18n="discoverNav">Discover</a>
  </div>
  <div class="explore-strip">
    <a href="/browse.html" class="explore-chip" data-i18n="musicNav">Musique</a>
    <a href="/movies.html" class="explore-chip active" data-i18n="moviesNav">Films</a>
    <a href="/events.html" class="explore-chip" data-i18n="eventsNav">Evenements</a>
    <a href="/merch.html" class="explore-chip" data-i18n="merchNav">Merch</a>
  </div>
</section>

<nav class="bottom-nav" aria-label="Primary">
  <a href="/index.html" data-i18n="home">Home</a>
  <a class="active" href="/discover.html" data-i18n="discoverNav">Discover</a>
  <a href="/artist/signup.html" data-i18n="sellOnJenguNav">Sell</a>
  <a href="/user/login.html" data-i18n="profile">Profile</a>
</nav>

<script type="module">
import { initLang, getLang, translate } from "/js/lang.js";
import { marketplaceItems, getLocalizedValue } from "/js/marketplace-catalog.js";
initLang();

const moviesGrid = document.getElementById("moviesGrid");
const movies = marketplaceItems.filter((item) => item.category === "movies");

const kindLabelMap = {
  film: "kindFilm",
  documentary: "kindDocumentary"
};

function renderMovies() {
  if (!moviesGrid) return;

  if (!movies.length) {
    moviesGrid.innerHTML = `<article class="pulse-card"><p>${translate("discoverNoItems")}</p></article>`;
    return;
  }

  moviesGrid.innerHTML = movies.map((item) => {
    const title = getLocalizedValue(item.title, getLang());
    const kind = translate(kindLabelMap[item.kind] || "kindFilm");

    return `
      <a class="mc-card" href="/movie.html?id=${item.id}" data-cat="movies">
        <div class="mc-card-img">
          <img loading="lazy" decoding="async" src="${item.cover}" alt="${title}">
          <span class="mc-card-badge">${kind}</span>
        </div>
        <div class="mc-card-body">
          <p class="mc-card-title">${title}</p>
          <p class="mc-card-creator">${item.creator}</p>
          <p class="mc-card-meta">${item.city || ""} • ${item.releaseDate || ""}</p>
          <div class="mc-card-foot">
            <span class="mc-card-price">${item.price} XAF</span>
            <span class="mc-card-cta">${translate("view")}</span>
          </div>
        </div>
      </a>
    `;
  }).join("");
}

renderMovies();

const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");
menuBtn.onclick = () => sideMenu.classList.toggle("open");
document.addEventListener("click", (e) => {
  if (!sideMenu.contains(e.target) && !menuBtn.contains(e.target)) {
    sideMenu.classList.remove("open");
  }
});
</script>
</body>
</html>

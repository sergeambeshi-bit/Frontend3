<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion – JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
</head>

<body>

<section class="section" style="padding-top:40px;">

  <!-- LOGO -->
  <div style="text-align:center; margin-bottom:30px;">
    <img src="/assets/logo.png" class="logo" style="width:120px;">
  </div>

  <!-- TITLE -->
  <h2 style="text-align:center;">Connexion</h2>
  <p class="sub" style="text-align:center;">
    Accédez à vos achats et téléchargements
  </p>

  <!-- FORM -->
  <form id="loginForm" style="margin-top:20px;">

    <input type="email" placeholder="Email" required>
    <input type="password" placeholder="Mot de passe" required>

    <button class="btn-primary" style="width:100%; margin-top:10px;">
      Se connecter
    </button>

  </form>

  <!-- SIGNUP -->
  <p style="text-align:center; margin-top:15px;">
    Pas encore de compte ? 
    <a href="/user/signup.html" style="color:#01d4ab;">
      S'inscrire
    </a>
  </p>

</section>

<script>

/* SIMPLE LOGIN SYSTEM (FRONTEND MOCK) */
document.getElementById("loginForm").addEventListener("submit", e=>{
  e.preventDefault();

  // simulate login
  localStorage.setItem("user", "logged");

  alert("Connexion réussie");

  window.location.href = "/pages/index.html";
});

</script>

</body>
</html>

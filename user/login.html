<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion – JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
</head>

<body>

<section class="section" style="padding-top:40px;">

  <!-- LOGO -->
  <div style="text-align:center; margin-bottom:30px;">
    <img src="/assets/logo.png" class="logo" style="width:120px;">
  </div>

  <!-- TITLE -->
  <h2 style="text-align:center;" data-i18n="login"></h2>
  <p class="sub" style="text-align:center;" data-i18n="loginSub"></p>

  <!-- FORM -->
  <form id="loginForm" style="margin-top:20px;">

    <input type="email" data-i18n="email" required>
    <input type="password" data-i18n="password" required>

    <button class="btn-primary" style="width:100%; margin-top:10px;" data-i18n="login"></button>

  </form>

  <!-- SIGNUP -->
  <p style="text-align:center; margin-top:15px;">
    <span data-i18n="noAccount"></span>
    <a href="/user/signup.html" style="color:#01d4ab;" data-i18n="signup"></a>
  </p>

</section>

<script type="module">
import { initLang, getLang } from "/js/lang.js";

initLang();

/* SIMPLE LOGIN SYSTEM (FRONTEND MOCK) */
document.getElementById("loginForm").addEventListener("submit", e=>{
  e.preventDefault();

  localStorage.setItem("user", "logged");

  const msg = getLang() === "fr" ? "Connexion réussie" : "Login successful";
  alert(msg);

  window.location.href = "/";
});
</script>

</body>
</html>

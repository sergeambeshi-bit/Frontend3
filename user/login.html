<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion – JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
<script src="/js/premium-experience.js" defer></script>
<style>
  .auth-section {
    width: min(640px, calc(100% - 28px));
    margin: 24px auto 0;
    padding-top: 18px;
    border: none !important;
    background: transparent !important;
    box-shadow: none !important;
  }

  .auth-logo-wrap {
    text-align: center;
    margin-bottom: 18px;
  }

  .auth-logo-wrap .logo {
    width: 126px;
    filter: drop-shadow(0 8px 24px rgba(1, 212, 171, 0.28));
  }

  .auth-card {
    border: 1px solid rgba(122, 220, 202, 0.24);
    border-radius: 20px;
    background: linear-gradient(160deg, rgba(11, 17, 27, 0.88), rgba(14, 21, 32, 0.82));
    box-shadow: 0 20px 48px rgba(0, 0, 0, 0.35);
    padding: clamp(18px, 3.4vw, 30px);
  }

  .auth-title {
    text-align: center;
    margin: 0;
    line-height: 1.08;
  }

  .auth-sub {
    text-align: center;
    margin: 10px auto 0;
    max-width: 48ch;
    line-height: 1.5;
  }

  .auth-form {
    margin-top: 18px;
    display: grid;
    gap: 12px;
    padding: 0 !important;
    border: none !important;
    background: transparent !important;
    box-shadow: none !important;
  }

  .auth-input {
    height: 48px;
  }

  .role-caption {
    margin: 4px 0 2px;
    font-size: 12px;
    font-weight: 600;
    color: #c4cee0;
  }

  .auth-links {
    text-align: center;
    margin-top: 12px;
  }

  .auth-links-forgot {
    margin-top: 11px;
  }

  .auth-links-signup {
    margin-top: 13px;
  }

  .auth-links a {
    color: #01d4ab;
  }

  .role-picker {
    margin: 2px 0 4px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .role-option {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 14px;
    padding: 12px 12px 11px;
    cursor: pointer;
    background: rgba(255,255,255,0.05);
    min-height: 96px;
    transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
  }

  .role-option:hover {
    border-color: rgba(1, 212, 171, 0.44);
    background: rgba(1, 212, 171, 0.12);
    transform: translateY(-1px);
  }

  .role-option:has(input:checked) {
    border-color: rgba(1, 212, 171, 0.7);
    background: rgba(1, 212, 171, 0.14);
    box-shadow: inset 0 0 0 1px rgba(1, 212, 171, 0.28);
  }

  .role-head {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .role-option input {
    margin: 0;
    accent-color: #01d4ab;
  }

  .role-title {
    font-size: 14px;
    font-weight: 700;
    color: #f3f8ff;
  }

  .role-option small {
    display: block;
    margin-top: 8px;
    color: #adbbd2;
    font-size: 12px;
    line-height: 1.4;
  }

  .auth-submit {
    width: 100%;
    min-height: 46px;
    margin-top: 6px;
    padding: 0 16px;
    font-size: 14px;
  }

  @media (min-width: 900px) {
    .auth-section {
      width: min(700px, calc(100% - 36px));
      margin-top: 28px;
    }

    .auth-card {
      border-radius: 24px;
      padding: 32px;
    }

    .auth-form {
      margin-top: 20px;
      gap: 14px;
    }

    .auth-input {
      height: 50px;
    }

    .role-picker {
      gap: 14px;
    }

    .role-option {
      min-height: 102px;
      padding: 13px;
    }

    .auth-submit {
      min-height: 48px;
    }
  }

  @media (max-width: 520px) {
    .auth-section {
      width: calc(100% - 20px);
      margin-top: 10px;
    }

    .auth-card {
      border-radius: 16px;
      padding: 16px 14px;
    }

    .auth-form {
      margin-top: 14px;
      gap: 10px;
    }

    .auth-input {
      height: 46px;
    }

    .role-picker {
      gap: 9px;
    }

    .role-option {
      min-height: 92px;
      padding: 10px;
    }

    .role-title {
      font-size: 13px;
    }

    .role-option small {
      font-size: 11px;
      margin-top: 6px;
    }

    .auth-submit {
      min-height: 44px;
      font-size: 13px;
    }
  }
</style>
</head>

<body class="fan-premium-page" data-i18n-title="loginPageTitle">

<section class="section auth-section">

  <!-- LOGO -->
  <div class="auth-logo-wrap">
    <a href="/index.html"><img src="/assets/logo.png" class="logo"></a>
  </div>

  <div class="auth-card">

  <!-- TITLE -->
  <h2 class="auth-title" data-i18n="login"></h2>
  <p class="sub auth-sub" data-i18n="loginSub"></p>

  <!-- FORM -->
  <form id="loginForm" class="auth-form">

    <input type="email" id="email" class="auth-input" data-i18n="email" placeholder="Email" required>
    <input type="password" id="password" class="auth-input" data-i18n="password" required>

      <p class="sub role-caption" data-i18n="loginAsRole">Je me connecte en tant que :</p>
      <div class="role-picker">
        <label class="role-option">
          <span class="role-head">
            <input type="radio" name="role" value="fan" checked>
            <span class="role-title" data-i18n="fan">Fan</span>
          </span>
          <small data-i18n="roleFanDescLogin">Espace achat et bibliotheque</small>
        </label>

        <label class="role-option">
          <span class="role-head">
            <input type="radio" name="role" value="artist">
            <span class="role-title" data-i18n="artist">Artist</span>
          </span>
          <small data-i18n="roleArtistDescLogin">Espace dashboard et uploads</small>
        </label>
      </div>

    <button class="btn-primary auth-submit" data-i18n="login"></button>

  </form>

  <!-- FORGOT PASSWORD -->
  <p class="auth-links auth-links-forgot">
    <a href="/user/forgot.html" data-i18n="forgot"></a>
  </p>

  <!-- SIGNUP -->
  <p class="auth-links auth-links-signup">
    <span data-i18n="noAccount"></span>
    <a href="/user/signup.html" data-i18n="signup"></a>
  </p>

  </div>

</section>

<script type="module">
import { initLang, applyLang, translate } from "/js/lang.js";
import { supabase } from "/js/supabase.js";

/* INIT LANGUAGE */
initLang();

/* ensure placeholders applied */
applyLang();

/* LOGIN */
document.getElementById("loginForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const selectedRole = document.querySelector('input[name="role"]:checked')?.value || "fan";

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    alert(error.message);
    return;
  }

  /* EMAIL CONFIRM CHECK */
  if(!data.user.email_confirmed_at){
    alert(translate("confirmEmail"));
    await supabase.auth.signOut();
    return;
  }

  const actualRole = data.user.user_metadata?.role || "fan";

  if(selectedRole !== actualRole){
    alert(selectedRole === "artist"
        ? translate("accountTypeFanMismatch")
        : translate("accountTypeArtistMismatch"));
    await supabase.auth.signOut();
    return;
  }

  const sessionUser = {
    id: data.user.id,
      name: data.user.user_metadata?.name || (data.user.email || "").split("@")[0] || translate("fan"),
    email: data.user.email,
    role: actualRole
  };

  localStorage.setItem("session", JSON.stringify(sessionUser));

  alert(actualRole === "artist" ? translate("artistLoginSuccess") : translate("loginSuccess"));

  window.location.href = actualRole === "artist" ? "/artist/dashboard.html" : "/browse.html";
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion – JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
<style>
  .role-picker {
    margin: 14px 0 8px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .role-option {
    display: block;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 12px;
    padding: 10px;
    cursor: pointer;
    background: rgba(255,255,255,0.04);
  }

  .role-option input {
    margin-right: 7px;
  }

  .role-option small {
    display: block;
    margin-top: 4px;
    color: #9ca3af;
    font-size: 12px;
  }
</style>
</head>

<body data-i18n-title="loginPageTitle">

<section class="section" style="padding-top:40px;">

  <!-- LOGO -->
  <div style="text-align:center; margin-bottom:30px;">
    <a href="/index.html"><img src="/assets/logo.png" class="logo" style="width:120px;"></a>
  </div>

  <!-- TITLE -->
  <h2 style="text-align:center;" data-i18n="login"></h2>
  <p class="sub" style="text-align:center;" data-i18n="loginSub"></p>

  <!-- FORM -->
  <form id="loginForm" style="margin-top:20px;">

    <input type="email" id="email" data-i18n="email" placeholder="Email" required>
    <input type="password" id="password" data-i18n="password" required>

      <p class="sub" style="margin:10px 0 6px;" data-i18n="loginAsRole">Je me connecte en tant que :</p>
      <div class="role-picker">
        <label class="role-option">
          <input type="radio" name="role" value="fan" checked>
          <span data-i18n="fan">Fan</span>
          <small data-i18n="roleFanDescLogin">Espace achat et bibliotheque</small>
        </label>

        <label class="role-option">
          <input type="radio" name="role" value="artist">
          <span data-i18n="artist">Artist</span>
          <small data-i18n="roleArtistDescLogin">Espace dashboard et uploads</small>
        </label>
      </div>

    <button class="btn-primary" style="width:100%; margin-top:10px;" data-i18n="login"></button>

  </form>

  <!-- FORGOT PASSWORD -->
  <p style="text-align:center; margin-top:10px;">
    <a href="/user/forgot.html" style="color:#01d4ab;" data-i18n="forgot"></a>
  </p>

  <!-- SIGNUP -->
  <p style="text-align:center; margin-top:15px;">
    <span data-i18n="noAccount"></span>
    <a href="/user/signup.html" style="color:#01d4ab;" data-i18n="signup"></a>
  </p>

</section>

<script type="module">
import { initLang, applyLang, translate } from "/js/lang.js";
import { supabase } from "/js/supabase.js";

/* INIT LANGUAGE */
initLang();

/* ensure placeholders applied */
applyLang();

/* LOGIN */
document.getElementById("loginForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const selectedRole = document.querySelector('input[name="role"]:checked')?.value || "fan";

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    alert(error.message);
    return;
  }

  /* EMAIL CONFIRM CHECK */
  if(!data.user.email_confirmed_at){
    alert(translate("confirmEmail"));
    await supabase.auth.signOut();
    return;
  }

  const actualRole = data.user.user_metadata?.role || "fan";

  if(selectedRole !== actualRole){
    alert(selectedRole === "artist"
        ? translate("accountTypeFanMismatch")
        : translate("accountTypeArtistMismatch"));
    await supabase.auth.signOut();
    return;
  }

  const sessionUser = {
    id: data.user.id,
      name: data.user.user_metadata?.name || (data.user.email || "").split("@")[0] || translate("fan"),
    email: data.user.email,
    role: actualRole
  };

  localStorage.setItem("session", JSON.stringify(sessionUser));

  alert(actualRole === "artist" ? translate("artistLoginSuccess") : translate("loginSuccess"));

  window.location.href = actualRole === "artist" ? "/artist/dashboard.html" : "/browse.html";
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes Achats – JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
<script src="/js/premium-experience.js" defer></script>
<script src="/js/performance-lite.js" defer></script>
</head>

<body class="has-topbar-clearance fan-premium-page">

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">
  <div class="menu-header">
    <img loading="lazy" decoding="async" src="/assets/logo.png" class="menu-logo">
  </div>

  <a href="/">Accueil</a>
  <a href="/browse.html">Parcourir</a>
  <a href="/genres.html">Genres</a>
  <a href="/charts.html">Top Charts</a>
  <a href="/new-releases.html">Nouveautés</a>

  <a href="/user/library.html">Ma Bibliothèque</a>
  <a href="/user/purchases.html">Mes Achats</a>
  <a href="/settings.html">Paramètres</a>
</div>

<!-- HEADER -->
<div class="topbar">
  <span class="menu" id="menuBtn">☰</span>
  <h3 data-i18n="purchasesHeader">Mes Achats</h3>
  <span></span>
</div>

<!-- PURCHASES -->
<section class="section">
  <form id="purchasesFilterForm" class="list-filter-form">
    <input type="search" id="purchasesSearchInput" class="list-search-input" data-i18n="purchasesSearchPlaceholder" placeholder="Rechercher dans mes achats">
    <button type="submit" class="list-filter-btn" data-i18n="purchasesSearchButton">Rechercher</button>
  </form>

  <div id="purchasesList"></div>
</section>

<script type="module">
import { initLang, translate } from "/js/lang.js";
import { getPurchases } from "/js/store.js";

initLang();
import { getCurrentUser } from "/js/auth.js";

const API = "http://localhost:5001";

/* UTILITY FUNCTIONS */
function getRandomCover() {
  const covers = [
    '/assets/covers/album1.png',
    '/assets/covers/album2.png',
    '/assets/covers/album3.png',
    '/assets/covers/cover.png',
    '/assets/covers/cover02.png',
    '/assets/covers/cover03.png',
    '/assets/covers/cover1.png',
    '/assets/covers/cover2.png',
    '/assets/covers/cover3.png',
    '/assets/covers/cover5.png',
    '/assets/covers/cover6.png',
    '/assets/covers/cover7.png'
  ];
  return covers[Math.floor(Math.random() * covers.length)];
}

/* =========================
   AUTH
========================= */
const user = getCurrentUser();

if(!user){
  window.location.href = "/user/login.html";
  throw new Error(translate("userNotAuthenticated"));
}

/* =========================
   MENU
========================= */
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");

menuBtn.onclick = ()=> sideMenu.classList.toggle("open");

document.addEventListener("click",(e)=>{
  if(!sideMenu.contains(e.target) && !menuBtn.contains(e.target)){
    sideMenu.classList.remove("open");
  }
});

/* =========================
   LOAD PURCHASES
========================= */
async function loadPurchases(){

  let purchases = getPurchases();
  let usingLocalFallback = false;

  try {
    const res = await fetch(`${API}/api/purchases/${user.id}`);

    if(!res.ok){
      throw new Error(translate("purchasesApiUnavailable"));
    }

    const apiPurchases = await res.json();

    if(Array.isArray(apiPurchases)){
      purchases = apiPurchases;
    }
  } catch(err){
    usingLocalFallback = true;
    console.error("Failed to load purchases:", err);
  }

  renderPurchases(purchases, usingLocalFallback);
}

/* =========================
   RENDER
========================= */
function renderPurchases(purchases, usingLocalFallback = false){

  window.__purchasesItems = purchases;
  window.__purchasesFallback = usingLocalFallback;

  renderPurchasesItems(purchases, usingLocalFallback);
}

function renderPurchasesItems(purchases, usingLocalFallback = false){

  const container = document.getElementById("purchasesList");
  const notice = usingLocalFallback
    ? `<p class="sub" style="text-align:center; color:#f1c40f;">${translate("purchasesFallbackNotice")}</p>`
    : "";

  if(!purchases.length){
    container.innerHTML = `
      ${notice}
      <p class="sub" style="text-align:center;">
        ${translate("noPurchases")}
      </p>
    `;
    return;
  }

  let html = "";

  purchases.forEach(p => {
    const title = p.name || (p.trackId ? `Track #${p.trackId}` : "Track");
    const artist = p.artist ? `<p>${p.artist}</p>` : "";
    const price = Number(p.price || 0);

    html += `
      <div class="chart-item">
          <img loading="lazy" decoding="async" src="${p.cover || getRandomCover()}">

        <div class="info">
            <b>${title}</b>
            ${artist}
            <p>${price} XAF</p>
        </div>

        <a href="/assets/sample.wav" download class="download-btn">
          ↓
        </a>
      </div>
    `;
  });

  container.innerHTML = notice + html;
}

/* INIT */
loadPurchases();

function applyPurchasesFilter(){
  const q = (document.getElementById("purchasesSearchInput").value || "").trim().toLowerCase();
  const allItems = window.__purchasesItems || [];
  const fallback = Boolean(window.__purchasesFallback);

  if(!q){
    renderPurchasesItems(allItems, fallback);
    return;
  }

  const filtered = allItems.filter(item => {
    return String(item.name || item.trackId || "").toLowerCase().includes(q)
      || String(item.artist || "").toLowerCase().includes(q)
      || String(item.price || "").toLowerCase().includes(q);
  });

  renderPurchasesItems(filtered, fallback);
}

document.getElementById("purchasesFilterForm").addEventListener("submit", (event) => {
  event.preventDefault();
  applyPurchasesFilter();
});

document.getElementById("purchasesSearchInput").addEventListener("input", () => {
  applyPurchasesFilter();
});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes Achats – JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
</head>

<body>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">
  <div class="menu-header">
    <img src="/assets/logo.png" class="menu-logo">
  </div>

  <a href="/">Accueil</a>
  <a href="/browse.html">Parcourir</a>
  <a href="/genres.html">Genres</a>
  <a href="/charts.html">Top Charts</a>
  <a href="/new-releases.html">Nouveautés</a>

  <a href="/user/library.html">Ma Bibliothèque</a>
  <a href="/user/purchases.html">Mes Achats</a>
  <a href="/user/settings.html">Paramètres</a>
</div>

<!-- HEADER -->
<div class="topbar">
  <span class="menu" id="menuBtn">☰</span>
  <h3>Mes Achats</h3>
  <span></span>
</div>

<!-- PURCHASES -->
<section class="section">
  <div id="purchasesList"></div>
</section>

<script type="module">
import { getCurrentUser } from "/js/auth.js";

const API = "http://localhost:5001";

/* =========================
   AUTH
========================= */
const user = getCurrentUser();

if(!user){
  window.location.href = "/user/login.html";
}

/* =========================
   MENU
========================= */
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");

menuBtn.onclick = ()=> sideMenu.classList.toggle("open");

document.addEventListener("click",(e)=>{
  if(!sideMenu.contains(e.target) && !menuBtn.contains(e.target)){
    sideMenu.classList.remove("open");
  }
});

/* =========================
   LOAD PURCHASES
========================= */
async function loadPurchases(){

  let purchases = [];

  try {
    const res = await fetch(`${API}/api/purchases/${user.id}`);
    purchases = await res.json();
  } catch(err){
    console.error("Failed to load purchases:", err);
  }

  renderPurchases(purchases);
}

/* =========================
   RENDER
========================= */
function renderPurchases(purchases){

  const container = document.getElementById("purchasesList");

  if(!purchases.length){
    container.innerHTML = `
      <p class="sub" style="text-align:center;">
        Aucun achat pour le moment
      </p>
    `;
    return;
  }

  let html = "";

  purchases.forEach(p => {
    html += `
      <div class="chart-item">
        <img src="/assets/covers/cover1.png">

        <div class="info">
          <b>Track #${p.trackId}</b>
          <p>${p.price} XAF</p>
        </div>

        <a href="/assets/sample.mp3" download class="download-btn">
          ↓
        </a>
      </div>
    `;
  });

  container.innerHTML = html;
}

/* INIT */
loadPurchases();

</script>

</body>
</html>

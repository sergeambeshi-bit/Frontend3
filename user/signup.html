<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription – JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
<style>
  .role-picker {
    margin: 14px 0 8px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .role-option {
    display: block;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 12px;
    padding: 10px;
    cursor: pointer;
    background: rgba(255,255,255,0.04);
  }

  .role-option input {
    margin-right: 7px;
  }

  .role-option small {
    display: block;
    margin-top: 4px;
    color: #9ca3af;
    font-size: 12px;
  }
</style>
</head>

<body>

<section class="section" style="padding-top:40px;">

  <!-- LOGO -->
  <div style="text-align:center; margin-bottom:30px;">
    <a href="/index.html"><img src="/assets/logo.png" class="logo" style="width:120px;"></a>
  </div>

  <!-- TITLE -->
  <h2 style="text-align:center;" data-i18n="signup"></h2>
  <p class="sub" style="text-align:center;" data-i18n="signupSub"></p>

  <!-- FORM -->
  <form id="signupForm" style="margin-top:20px;">

    <input type="text" id="name" data-i18n="name" required>
    <input type="email" id="email" data-i18n="email" placeholder="Email" required>
    <input type="password" id="password" data-i18n="password" required>

      <p class="sub" style="margin:10px 0 6px;">Je m'inscris en tant que :</p>
      <div class="role-picker">
        <label class="role-option">
          <input type="radio" name="role" value="fan" checked>
          Fan
          <small>Acheter, decouvrir et telecharger</small>
        </label>

        <label class="role-option">
          <input type="radio" name="role" value="artist">
          Artist
          <small>Publier et vendre votre musique</small>
        </label>
      </div>

    <button class="btn-primary" style="width:100%; margin-top:10px;" data-i18n="signup"></button>

  </form>

  <!-- LOGIN LINK -->
  <p style="text-align:center; margin-top:15px;">
    <span data-i18n="haveAccount"></span>
    <a href="/user/login.html" style="color:#01d4ab;" data-i18n="login"></a>
  </p>

</section>

<script type="module">
import { initLang, getLang, applyLang } from "/js/lang.js";
import { supabase } from "/js/supabase.js";

/* INIT LANGUAGE */
initLang();
applyLang();

/* REAL SIGNUP */
document.getElementById("signupForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const role = document.querySelector('input[name="role"]:checked')?.value || "fan";

  const { data, error } = await supabase.auth.signUp({
    email,
    password,
    options: {
      data: {
        name: name,
        role: role
      }
    }
  });

  if(error){
    alert(error.message);
    return;
  }

  const msg = getLang() === "fr"
    ? `Compte ${role === "artist" ? "artiste" : "fan"} cree ! Verifiez votre email pour confirmer.`
    : `${role === "artist" ? "Artist" : "Fan"} account created! Check your email to confirm.`;

  alert(msg);

  window.location.href = "/user/login.html";
});
</script>

</body>
</html>

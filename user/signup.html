<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription – JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
</head>

<body>

<section class="section" style="padding-top:40px;">

  <!-- LOGO -->
  <div style="text-align:center; margin-bottom:30px;">
    <img src="/assets/logo.png" class="logo" style="width:120px;">
  </div>

  <!-- TITLE -->
  <h2 style="text-align:center;" data-i18n="signup"></h2>
  <p class="sub" style="text-align:center;" data-i18n="signupSub"></p>

  <!-- FORM -->
  <form id="signupForm" style="margin-top:20px;">

    <input type="text" id="name" data-i18n="name" required>
    <input type="email" id="email" data-i18n="email" placeholder="Email" required>
    <input type="password" id="password" data-i18n="password" required>

    <button class="btn-primary" style="width:100%; margin-top:10px;" data-i18n="signup"></button>

  </form>

  <!-- LOGIN LINK -->
  <p style="text-align:center; margin-top:15px;">
    <span data-i18n="haveAccount"></span>
    <a href="/user/login.html" style="color:#01d4ab;" data-i18n="login"></a>
  </p>

</section>

<script type="module">
import { initLang, getLang, applyLang } from "/js/lang.js";
import { supabase } from "/js/supabase.js";

/* INIT LANGUAGE */
initLang();
applyLang();

/* REAL SIGNUP */
document.getElementById("signupForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signUp({
    email,
    password,
    options: {
      data: {
        name: name
      }
    }
  });

  if(error){
    alert(error.message);
    return;
  }

  const msg = getLang() === "fr"
    ? "Compte créé ! Vérifiez votre email pour confirmer."
    : "Account created! Check your email to confirm.";

  alert(msg);

  window.location.href = "/user/login.html";
});
</script>

</body>
</html>

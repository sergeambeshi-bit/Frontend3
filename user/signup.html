<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription – JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
<script src="/js/premium-experience.js" defer></script>
<style>
  .auth-section {
    max-width: 560px;
    margin: 18px auto 0;
    padding-top: 26px;
  }

  .auth-logo-wrap {
    text-align: center;
    margin-bottom: 24px;
  }

  .auth-logo-wrap .logo {
    width: 120px;
  }

  .auth-title {
    text-align: center;
  }

  .auth-sub {
    text-align: center;
  }

  .auth-form {
    margin-top: 20px;
  }

  .auth-links {
    text-align: center;
    margin-top: 15px;
  }

  .auth-links a {
    color: #01d4ab;
  }

  .role-picker {
    margin: 14px 0 8px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .role-option {
    display: block;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 12px;
    padding: 10px;
    cursor: pointer;
    background: rgba(255,255,255,0.04);
  }

  .role-option input {
    margin-right: 7px;
  }

  .role-option small {
    display: block;
    margin-top: 4px;
    color: #9ca3af;
    font-size: 12px;
  }
</style>
</head>

<body class="fan-premium-page" data-i18n-title="signupPageTitle">

<section class="section auth-section">

  <!-- LOGO -->
  <div class="auth-logo-wrap">
    <a href="/index.html"><img src="/assets/logo.png" class="logo"></a>
  </div>

  <!-- TITLE -->
  <h2 class="auth-title" data-i18n="signup"></h2>
  <p class="sub auth-sub" data-i18n="signupSub"></p>

  <!-- FORM -->
  <form id="signupForm" class="auth-form">

    <input type="text" id="name" data-i18n="name" required>
    <input type="email" id="email" data-i18n="email" placeholder="Email" required>
    <input type="password" id="password" data-i18n="password" required>

      <p class="sub" style="margin:10px 0 6px;" data-i18n="signupAsRole">Je m'inscris en tant que :</p>
      <div class="role-picker">
        <label class="role-option">
          <input type="radio" name="role" value="fan" checked>
          <span data-i18n="fan">Fan</span>
          <small data-i18n="roleFanDescSignup">Acheter, decouvrir et telecharger</small>
        </label>

        <label class="role-option">
          <input type="radio" name="role" value="artist">
          <span data-i18n="artist">Artist</span>
          <small data-i18n="roleArtistDescSignup">Publier et vendre votre musique</small>
        </label>
      </div>

    <button class="btn-primary" style="width:100%; margin-top:10px;" data-i18n="signup"></button>

  </form>

  <!-- LOGIN LINK -->
  <p class="auth-links">
    <span data-i18n="haveAccount"></span>
    <a href="/user/login.html" data-i18n="login"></a>
  </p>

</section>

<script type="module">
  import { initLang, applyLang, translate } from "/js/lang.js";
import { supabase } from "/js/supabase.js";

/* INIT LANGUAGE */
initLang();
applyLang();

/* REAL SIGNUP */
document.getElementById("signupForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const role = document.querySelector('input[name="role"]:checked')?.value || "fan";

  const { data, error } = await supabase.auth.signUp({
    email,
    password,
    options: {
      data: {
        name: name,
        role: role
      }
    }
  });

  if(error){
    alert(error.message);
    return;
  }

  const msg = role === "artist"
    ? translate("roleArtistAccountCreated")
    : translate("roleFanAccountCreated");

  alert(msg);

  window.location.href = "/user/login.html";
});
</script>

</body>
</html>

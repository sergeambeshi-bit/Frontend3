<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Créer un compte – JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
</head>

<body>

<section class="section" style="padding-top:40px;">

  <!-- LOGO -->
  <div style="text-align:center; margin-bottom:30px;">
    <img src="/assets/logo.png" class="logo" style="width:120px;">
  </div>

  <!-- TITLE -->
  <h2 style="text-align:center;">Créer un compte</h2>
  <p class="sub" style="text-align:center;">
    Accédez à vos téléchargements et achats
  </p>

  <!-- FORM -->
  <form id="signupForm" style="margin-top:20px;">

    <input type="text" placeholder="Nom complet" required>
    <input type="email" placeholder="Email" required>
    <input type="password" placeholder="Mot de passe" required>

    <button class="btn-primary" style="width:100%; margin-top:10px;">
      S'inscrire
    </button>

  </form>

  <!-- LOGIN -->
  <p style="text-align:center; margin-top:15px;">
    Déjà un compte ? 
    <a href="/user/login.html" style="color:#01d4ab;">
      Se connecter
    </a>
  </p>

</section>

<script>

/* SIMPLE UX FEEDBACK */
import { initLang } from "/js/lang.js";

initLang();
document.getElementById("signupForm").addEventListener("submit", e=>{
  e.preventDefault();

  alert("Compte créé avec succès (simulation)");

  window.location.href = "/pages/index.html";
});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paramètres – JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
</head>

<body>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">
  <div class="menu-header">
    <img src="/assets/logo.png" class="menu-logo">
  </div>

  <a href="/pages/index.html">Accueil</a>
  <a href="/pages/browse.html">Parcourir</a>
  <a href="/pages/genres.html">Genres</a>
  <a href="/pages/charts.html">Top Charts</a>
  <a href="/pages/new-releases.html">Nouveautés</a>

  <a href="/user/library.html">Ma Bibliothèque</a>
  <a href="/user/purchases.html">Mes Achats</a>
  <a href="/user/settings.html">Paramètres</a>
</div>

<!-- HEADER -->
<div class="topbar">
  <span class="menu" id="menuBtn">☰</span>
  <h3>Paramètres</h3>
  <span></span>
</div>

<!-- PROFILE -->
<section class="section">

  <h3>Profil</h3>

  <input type="text" placeholder="Nom complet">
  <input type="email" placeholder="Email">
  <input type="password" placeholder="Nouveau mot de passe">

</section>

<!-- PAYMENT SETTINGS -->
<section class="section">

  <h3>Paiement Mobile</h3>

  <input type="text" placeholder="Numéro MTN / Orange">

  <p class="sub">
    Utilisé pour recevoir vos paiements ou achats
  </p>

</section>

<!-- ACTION -->
<section class="section">

  <button class="btn-primary" style="width:100%;">
    Sauvegarder
  </button>

</section>

<script>

/* MENU */
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");

menuBtn.addEventListener("click", () => {
  sideMenu.classList.toggle("open");
});

document.addEventListener("click", (e) => {
  if (!sideMenu.contains(e.target) && !menuBtn.contains(e.target)) {
    sideMenu.classList.remove("open");
  }
});

/* SAVE */
document.querySelector(".btn-primary").addEventListener("click", () => {
  alert("Paramètres sauvegardés");
});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mot de passe oublié – JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
<script src="/js/premium-experience.js" defer></script>
<script src="/js/performance-lite.js" defer></script>
</head>

<body class="fan-premium-page">

<section class="section" style="padding-top:40px;">

  <!-- LOGO -->
  <div style="text-align:center; margin-bottom:30px;">
    <a href="/index.html"><img loading="lazy" decoding="async" src="/assets/logo.png" class="logo" style="width:120px;"></a>
  </div>

  <!-- TITLE -->
  <h2 style="text-align:center;">Mot de passe oublié</h2>
  <p class="sub" style="text-align:center;">
    Entrez votre email pour recevoir un lien de réinitialisation
  </p>

  <!-- FORM -->
  <form id="forgotForm" style="margin-top:20px;">

    <input type="email" placeholder="Email" required>

    <button class="btn-primary" style="width:100%; margin-top:10px;">
      Envoyer le lien
    </button>

  </form>

  <!-- BACK TO LOGIN -->
  <p style="text-align:center; margin-top:15px;">
    Retour à 
    <a href="/user/login.html" style="color:#01d4ab;">
      la connexion
    </a>
  </p>

</section>

<script type="module">

/* RESET FLOW (SIMULATED) */
import { initLang } from "/js/lang.js";

initLang();
document.getElementById("forgotForm").addEventListener("submit", e=>{
  e.preventDefault();

  alert("Lien de réinitialisation envoyé (simulation)");

  window.location.href = "/user/login.html";
});

</script>

</body>
</html>

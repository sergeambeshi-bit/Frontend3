<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ma Bibliothèque – JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
</head>

<body>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">
  <div class="menu-header">
    <img src="/assets/logo.png" class="menu-logo">
  </div>

  <a href="/index.html">Accueil</a>
  <a href="/browse.html">Parcourir</a>
  <a href="/genres.html">Genres</a>
  <a href="/charts.html">Top Charts</a>
  <a href="/new-releases.html">Nouveautés</a>

  <a href="/user/library.html">Ma Bibliothèque</a>
  <a href="/user/purchases.html">Mes Achats</a>
  <a href="/user/settings.html">Paramètres</a>
</div>

<!-- HEADER -->
<div class="topbar">
  <span class="menu" id="menuBtn">☰</span>
  <h3>Ma Bibliothèque</h3>
  <span></span>
</div>

<!-- LIBRARY -->
<section class="section">

  <div id="libraryList">
    <p class="sub">Chargement...</p>
  </div>

</section>

<script type="module">

/* =========================
   AUTH PROTECTION
========================= */
import { initLang } from "/js/lang.js";

initLang();
function requireAuth(){
  const user = localStorage.getItem("user");

  if(!user){
    alert("Veuillez vous connecter");
    window.location.href = "/user/login.html";
  }
}

requireAuth();

/* =========================
   MENU
========================= */
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");

menuBtn.addEventListener("click", () => {
  sideMenu.classList.toggle("open");
});

document.addEventListener("click", (e) => {
  if (!sideMenu.contains(e.target) && !menuBtn.contains(e.target)) {
    sideMenu.classList.remove("open");
  }
});

/* =========================
   LOAD LIBRARY
========================= */
function renderLibrary(){

  const container = document.getElementById("libraryList");

  const purchases = JSON.parse(localStorage.getItem("purchases")) || [];

  /* EMPTY STATE */
  if(purchases.length === 0){
    container.innerHTML = `
      <p class="sub" style="text-align:center;">
        🎧 Votre bibliothèque est vide
      </p>
    `;
    return;
  }

  container.innerHTML = purchases.map(item => `
    <div class="chart-item">
      <img src="${item.cover}" loading="lazy">

      <div class="info">
        <b>${item.name}</b>
        <p>${item.artist}</p>
      </div>

      <button class="play">▶</button>

      <a href="/assets/sample.mp3" download class="download-btn">
        ↓
      </a>
    </div>
  `).join("");
}

renderLibrary();

/* =========================
   PREVIEW
========================= */
document.addEventListener("click", e=>{
  if(e.target.classList.contains("play")){
    const audio = new Audio("/assets/sample.mp3");
    audio.play();
    setTimeout(()=>audio.pause(),30000);
  }
});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ma Bibliothèque – JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
<script src="/js/premium-experience.js" defer></script>
</head>

<body class="has-topbar-clearance fan-premium-page">

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">
  <div class="menu-header">
    <img src="/assets/logo.png" class="menu-logo">
  </div>

  <a href="/index.html">Accueil</a>
  <a href="/browse.html">Parcourir</a>
  <a href="/genres.html">Genres</a>
  <a href="/charts.html">Top Charts</a>
  <a href="/new-releases.html">Nouveautés</a>

  <a href="/user/library.html">Ma Bibliothèque</a>
  <a href="/user/purchases.html">Mes Achats</a>
  <a href="/settings.html">Paramètres</a>
</div>

<!-- HEADER -->
<div class="topbar">
  <span class="menu" id="menuBtn">☰</span>
  <h3 data-i18n="libraryHeader">Ma Bibliothèque</h3>
  <span></span>
</div>

<!-- LIBRARY -->
<section class="section">

  <form id="libraryFilterForm" class="list-filter-form">
    <input type="search" id="librarySearchInput" class="list-search-input" placeholder="Rechercher dans ma bibliothèque">
    <button type="submit" class="list-filter-btn">Rechercher</button>
  </form>

  <div id="libraryList">
    <p class="sub">Chargement...</p>
  </div>

</section>

<script type="module">

/* =========================
   AUTH PROTECTION
========================= */
import { initLang, translate } from "/js/lang.js";

initLang();
function requireAuth(){
  const user = localStorage.getItem("user");

  if(!user){
    alert(translate("pleaseLogin"));
    window.location.href = "/user/login.html";
  }
}

requireAuth();

/* =========================
   MENU
========================= */
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");

menuBtn.addEventListener("click", () => {
  sideMenu.classList.toggle("open");
});

document.addEventListener("click", (e) => {
  if (!sideMenu.contains(e.target) && !menuBtn.contains(e.target)) {
    sideMenu.classList.remove("open");
  }
});

/* =========================
   LOAD LIBRARY
========================= */
function renderLibrary(){

  const container = document.getElementById("libraryList");

  const purchases = JSON.parse(localStorage.getItem("purchases")) || [];
  window.__libraryItems = purchases;

  renderLibraryItems(purchases);
}

function renderLibraryItems(items){
  const container = document.getElementById("libraryList");

  /* EMPTY STATE */
  if(items.length === 0){
    container.innerHTML = `
      <p class="sub" style="text-align:center;">
        ${translate("libraryEmpty")}
      </p>
    `;
    return;
  }

  container.innerHTML = items.map(item => `
    <div class="chart-item">
      <img src="${item.cover}" loading="lazy">

      <div class="info">
        <b>${item.name}</b>
        <p>${item.artist}</p>
      </div>

      <button class="play">▶</button>

      <a href="/assets/sample.mp3" download class="download-btn">
        ↓
      </a>
    </div>
  `).join("");
}

renderLibrary();

function applyLibraryFilter(){
  const q = (document.getElementById("librarySearchInput").value || "").trim().toLowerCase();
  const allItems = window.__libraryItems || [];

  if(!q){
    renderLibraryItems(allItems);
    return;
  }

  const filtered = allItems.filter(item => {
    return String(item.name || "").toLowerCase().includes(q)
      || String(item.artist || "").toLowerCase().includes(q);
  });

  renderLibraryItems(filtered);
}

document.getElementById("libraryFilterForm").addEventListener("submit", (event) => {
  event.preventDefault();
  applyLibraryFilter();
});

document.getElementById("librarySearchInput").addEventListener("input", () => {
  applyLibraryFilter();
});

/* =========================
   PREVIEW
========================= */
document.addEventListener("click", e=>{
  if(e.target.classList.contains("play")){
    const audio = new Audio("/assets/sample.mp3");
    audio.play();
    setTimeout(()=>audio.pause(),30000);
  }
});

</script>

</body>
</html>

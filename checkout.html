<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paiement - JENGU</title>

<link rel="stylesheet" href="/styles/app.css?v=20260430">
</head>

<body>

<a href="/checkout.html" class="cart-btn checkout-cart-btn" aria-label="Voir le panier" data-i18n-aria="viewCartAria">
  <span class="cart-icon">🛒</span><span class="cart-count">0</span>
</a>

<section class="section">

  <h3 data-i18n="payment">Paiement</h3>

  <p id="paymentGatewayStatus" class="gateway-status" data-state="checking" data-i18n="gatewayStatusChecking">
    Verification de la passerelle de paiement...
  </p>

  <div id="checkoutItems"></div>

  <h3>Total: <span id="checkoutTotal">0 XAF</span></h3>

  <form id="checkout-form">
    <p class="sub" data-i18n="paymentMethod">Methode de paiement</p>

    <button type="button" class="pay-btn momo" data-method="mtn">
      MTN MoMo
    </button>

    <button type="button" class="pay-btn momo" data-method="orange">
      Orange Money
    </button>

    <button type="button" class="pay-btn bank-card" data-method="card">
      Carte bancaire
    </button>

    <div id="mobile-phone-field" style="display:none; margin-top:12px;">
      <label for="mobilePhone" style="display:block; font-size:0.9rem; color:#aaa; margin-bottom:6px;" data-i18n="mobilePrompt">
        Entrez votre numero Mobile Money
      </label>
      <input
        type="tel"
        id="mobilePhone"
        name="mobilePhone"
        placeholder="Ex: 6XXXXXXXX"
        autocomplete="tel"
        style="width:100%; padding:10px 12px; background:#111; color:#fff; border:1px solid #333; border-radius:8px; font-size:1rem; box-sizing:border-box;"
      >
    </div>

    <button type="submit" class="btn-primary" style="width:100%; margin-top:10px;" data-i18n="payNow">
      Payer maintenant
    </button>
  </form>

</section>

<script type="module">
import { initLang } from "/js/lang.js?v=20260430";
import { initCheckout } from "/js/checkout.js?v=20260430";

initLang();
initCheckout();
</script>

</body>
</html>

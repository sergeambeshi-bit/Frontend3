<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n-title="checkoutPageTitle">Checkout - JENGU</title>
<link rel="stylesheet" href="/styles/checkout.css?v=20260509">
<script src="/js/performance-lite.js" defer></script>
</head>
<body class="checkout-page" data-i18n-title="checkoutPageTitle">
  <main class="checkout-wrap" data-cat="checkout">
    <h1 class="checkout-heading" data-i18n="payment">Paiement</h1>

    <section class="checkout-section" aria-labelledby="summaryTitle">
      <h2 id="summaryTitle" class="checkout-title" data-i18n="checkoutSummary">Product Summary</h2>
      <article id="checkoutSummaryCard" class="summary-card" hidden>
        <img loading="lazy" decoding="async" id="summaryImage" class="summary-image" src="" alt="">
        <div class="summary-content">
          <h3 id="summaryName" class="summary-name"></h3>
          <p id="summaryCreator" class="summary-creator"></p>
          <p id="summaryPrice" class="summary-price"></p>
        </div>
      </article>
      <p id="checkoutEmpty" class="checkout-empty" data-i18n="checkoutEmpty" hidden>Cart is empty.</p>
    </section>

    <form id="checkoutForm" class="checkout-section checkout-form" novalidate>
      <h2 class="checkout-title" data-i18n="checkoutUserInput">User Input</h2>

      <label for="checkoutEmail" class="field-label" data-i18n="email">E-mail</label>
      <input id="checkoutEmail" name="email" type="email" class="field-input" autocomplete="email" required>

      <label for="checkoutName" class="field-label" data-i18n="checkoutNameOptional">Name (optional)</label>
      <input id="checkoutName" name="name" type="text" class="field-input" autocomplete="name">

      <h2 class="checkout-title checkout-pay-title" data-i18n="checkoutPaymentOptions">Payment Options</h2>
      <div class="pay-options pay-options-3" role="radiogroup" data-i18n-aria="checkoutPaymentOptions">
        <button type="button" class="pay-option active" data-method="mtn" role="radio" aria-checked="true">MTN</button>
        <button type="button" class="pay-option" data-method="orange" role="radio" aria-checked="false" data-i18n="checkoutOrangeMoney">Orange</button>
        <button type="button" class="pay-option" data-method="card" role="radio" aria-checked="false" data-i18n="card">Card</button>
      </div>

      <div id="phoneBlock" class="phone-block">
        <label for="checkoutPhone" class="field-label" data-i18n="checkoutPhone">Phone</label>
        <input id="checkoutPhone" name="phone" type="tel" class="field-input" autocomplete="tel" placeholder="6XXXXXXXX / +2376XXXXXXXX">
        <p id="networkHint" class="network-hint" aria-live="polite"></p>
      </div>

      <div id="checkoutSpinner" class="checkout-spinner" hidden>
        <span class="spinner-dot" aria-hidden="true"></span>
        <span data-i18n="checkoutWaiting">Waiting for confirmation...</span>
      </div>

      <p id="checkoutFeedback" class="checkout-feedback" role="status" aria-live="polite"></p>
      <button id="checkoutPayBtn" type="submit" class="checkout-cta" data-i18n="pay">Pay</button>
      <button id="checkoutBackBtn" type="button" class="checkout-back" data-i18n="back">Back</button>
    </form>
  </main>

  <script type="module">
    import { initLang } from "/js/lang.js?v=20260509";
    import { initCheckout } from "/js/checkout.js?v=20260509";

    initLang();
    initCheckout();
  </script>
</body>
</html>

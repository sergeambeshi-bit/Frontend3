<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Article – JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
</head>

<body>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">
  <div class="menu-header">
    <img src="/assets/logo.png" class="menu-logo">
  </div>

  <a href="/index.html">Accueil</a>
  <a href="/browse.html">Parcourir</a>
  <a href="/genres.html">Genres</a>
  <a href="/charts.html">Top Charts</a>
  <a href="/new-releases.html">Nouveautés</a>

  <a href="/user/library.html">Ma Bibliothèque</a>
  <a href="/user/purchases.html">Mes Achats</a>
  <a href="/user/settings.html">Paramètres</a>
</div>

<!-- HERO -->
<section class="hero" style="height:50vh;">
  <div class="hero-bg" id="articleBg"></div>
  <div class="hero-patterns"></div>

  <div class="topbar">
    <span class="menu" id="menuBtn">☰</span>
    <a href="/index.html">
  <img src="/assets/logo.png" class="logo">
</a>
    <span></span>
  </div>

  <div class="hero-content">
    <h1 id="articleTitle">Titre de l'article</h1>
  </div>
</section>

<!-- ARTICLE CONTENT -->
<section class="section">
  <p id="articleContent" style="line-height:1.6; font-size:14px;">
    Chargement...
  </p>
</section>

<script type="module">
import { initLang } from "/js/lang.js";

initLang();
import { fetchBlogPosts } from "/js/api.js";

/* MENU */
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");

menuBtn.addEventListener("click", () => {
  sideMenu.classList.toggle("open");
});

document.addEventListener("click", (e) => {
  if (!sideMenu.contains(e.target) && !menuBtn.contains(e.target)) {
    sideMenu.classList.remove("open");
  }
});

/* GET ARTICLE ID */
const params = new URLSearchParams(window.location.search);
const articleId = params.get("id");

/* LOAD ARTICLE */
async function loadArticle(){
  const posts = await fetchBlogPosts();

  const article = posts.find(p => p.id == articleId);

  if(!article) return;

  document.getElementById("articleTitle").textContent = article.title;
  document.getElementById("articleContent").textContent = article.content;

  document.getElementById("articleBg").style.backgroundImage = `url(${article.image})`;
}

loadArticle();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JENGU – Discover African Music</title>

  <link rel="stylesheet" href="/css/app.css">
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <button class="menu-btn">☰</button>
    <img src="/assets/logo.svg" class="logo" alt="JENGU">
    <div class="lang-switch">FR ▾</div>
  </header>

  <!-- HERO CAROUSEL -->
  <section class="hero-carousel">
    <div class="hero-card">
      <img src="/assets/banners/naija.jpg" alt="Naija Vibes">
      <div class="hero-info">
        <h3>Naija Vibes</h3>
        <p>AfroStar • Nouvel Album Disponible</p>
        <button class="btn-primary">ACHETER</button>
      </div>
    </div>
  </section>

  <!-- TRENDING SECTION -->
  <section class="section">
    <h2>Tendance au Cameroun</h2>
    <p class="subtitle">À la Une au Cameroun</p>

    <div class="card-row">
      <div class="card">
        <img src="/assets/tracks/mboko.jpg">
        <span class="price">200 XAF</span>
      </div>
      <div class="card">
        <img src="/assets/tracks/zouk.jpg">
        <span class="price">1200 XAF</span>
      </div>
      <div class="card">
        <img src="/assets/tracks/rap237.jpg">
        <span class="price">300 XAF</span>
      </div>
    </div>
  </section>

  <!-- NEW RELEASES -->
  <section class="section">
    <h2>Nouvelles Sorties</h2>

    <div class="card-row">
      <div class="card"><img src="/assets/albums/sunset.jpg"><span class="price">1000 XAF</span></div>
      <div class="card"><img src="/assets/albums/mali.jpg"><span class="price">150 XAF</span></div>
      <div class="card"><img src="/assets/albums/bikutsi.jpg"><span class="price">250 XAF</span></div>
    </div>
  </section>

  <!-- GENRES -->
  <section class="section">
    <h2>Explorer les Genres</h2>
    <div class="genre-grid">
      <div class="genre">Makossa</div>
      <div class="genre">AfroPop</div>
      <div class="genre">Ndombolo</div>
      <div class="genre">Rap / Drill</div>
    </div>
  </section>

  <!-- SUPPORT -->
  <footer class="support">
    <img src="/assets/icons/whatsapp.svg">
    <div>
      <strong>Support WhatsApp</strong><br>
      Besoin d’aide? Contactez-nous!
    </div>
  </footer>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
</head>

<body>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">
  <div class="menu-header">
    <img src="/assets/logo.png" class="menu-logo">
  </div>

  <a href="/">Accueil</a>
  <a href="/browse.html">Parcourir</a>
  <a href="/genres.html">Genres</a>
  <a href="/charts.html">Top Charts</a>
  <a href="/new-releases.html">Nouveautés</a>
</div>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-patterns"></div>

  <div class="hero-content">

    <div class="topbar">
      <span class="menu" id="menuBtn">☰</span>
      <img src="/assets/logo.png" class="logo">
      <span class="lang" onclick="toggleLang()">FR ▾</span>
    </div>

    <h1 id="heroText">Télécharger la musique africaine</h1>

    <div class="cta">
      <a href="/browse.html" class="btn-primary">Parcourir</a>
      <a href="/new-releases.html" class="btn-outline">Nouveautés</a>
    </div>

    <div class="scroll">↓ Scroll</div>

  </div>
</section>

<!-- TRENDING -->
<section class="section">
  <h3>Tendance au Cameroun</h3>
  <p class="sub">À la Une au Cameroun</p>
  <div class="scroll-row" id="trending"></div>
</section>

<!-- NEW RELEASES -->
<section class="section">
  <h3>Nouvelles Sorties</h3>
  <div class="scroll-row" id="releases"></div>
</section>

<!-- PAYMENT MODAL -->
<div id="paymentModal" class="modal hidden">
  <div class="modal-content">
    <h3>Paiement</h3>

    <div class="pay-section">
      <p class="label">🇨🇲 Mobile Money</p>
      <button class="pay-btn momo" data-method="mtn">MTN MoMo</button>
      <button class="pay-btn momo" data-method="orange">Orange Money</button>
    </div>

    <div class="pay-section">
      <p class="label">💳 Carte</p>
      <button class="pay-btn card" data-method="card">Visa / Mastercard</button>
    </div>

    <input type="text" id="phone" placeholder="6XXXXXXXX">
    <button class="confirm">Confirmer</button>
  </div>
</div>

<script type="module">
import { fetchBrowseResults } from "/js/api.js";
import { savePurchase } from "/js/store.js";

/* HERO */
const heroImages = [
  "/assets/hero/hero1.png",
  "/assets/hero/hero2.png",
  "/assets/hero/hero3.png"
];

let heroIndex = 0;
function rotateHero() {
  const hero = document.querySelector(".hero-bg");
  hero.style.backgroundImage = `url(${heroImages[heroIndex]})`;
  heroIndex = (heroIndex + 1) % heroImages.length;
}
setInterval(rotateHero, 5000);
rotateHero();

/* DATA */
const data = await fetchBrowseResults();

/* CHECK OWNERSHIP */
function isOwned(name){
  const purchases = JSON.parse(localStorage.getItem("purchases")) || [];
  return purchases.some(p => p.name === name);
}

/* CARD */
function createCard(item){

  const owned = isOwned(item.name);

  return `
    <div class="card">
      <div class="cover">
        <img src="${item.cover}">
        <button class="play">▶</button>
      </div>

      <div class="title">${item.name}</div>

      <div class="card-bottom">

        ${
          owned
          ? `<span class="owned-badge">✓ Owned</span>`
          : `<span class="price">${item.price || 300} XAF</span>`
        }

        <button class="buy ${owned ? 'disabled' : ''}" ${owned ? 'disabled' : ''}>
          ${owned ? 'Owned' : 'Buy'}
        </button>

      </div>
    </div>
  `;
}

/* RENDER */
const trending = document.getElementById("trending");
const releases = document.getElementById("releases");

data.forEach(item => {
  trending.innerHTML += createCard(item);
  releases.innerHTML += createCard(item);
});

/* CURRENT ITEM */
let currentItem = null;

/* EVENTS */
let selectedMethod = null;

document.addEventListener("click", e => {

  /* PLAY */
  if(e.target.classList.contains("play")){
    const audio = new Audio("/assets/sample.mp3");
    audio.play();
    setTimeout(()=>audio.pause(),30000);
  }

  /* BUY */
  if(e.target.classList.contains("buy")){

    if(e.target.classList.contains("disabled")) return;

    const card = e.target.closest(".card");

    currentItem = {
      name: card.querySelector(".title").innerText,
      artist: "Artist",
      cover: card.querySelector("img").src,
      price: 300
    };

    document.getElementById("paymentModal").classList.remove("hidden");
  }

  /* SELECT PAYMENT */
  if(e.target.classList.contains("pay-btn")){
    selectedMethod = e.target.dataset.method;

    document.querySelectorAll(".pay-btn").forEach(btn=>{
      btn.style.background = "#222";
      btn.style.color = "white";
    });

    e.target.style.background = "#01d4ab";
    e.target.style.color = "black";
  }

  /* CONFIRM */
  if(e.target.classList.contains("confirm")){

    if(!selectedMethod){
      alert("Choisissez un moyen de paiement");
      return;
    }

    savePurchase(currentItem);

    document.getElementById("paymentModal").classList.add("hidden");

    alert("Achat réussi 🎉");

    location.reload(); // refresh to show Owned
  }

});

/* MENU */
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");

menuBtn.addEventListener("click", () => {
  sideMenu.classList.toggle("open");
});

document.addEventListener("click", (e) => {
  if (!sideMenu.contains(e.target) && !menuBtn.contains(e.target)) {
    sideMenu.classList.remove("open");
  }
});

/* LANG */
window.toggleLang = function () {
  const lang = localStorage.getItem("lang") === "fr" ? "en" : "fr";
  localStorage.setItem("lang", lang);
  location.reload();
};

</script>

</body>
</html>

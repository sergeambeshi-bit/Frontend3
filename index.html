<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>JENGU</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="image" href="/assets/hero/optimized/hero1-960.jpg" fetchpriority="high">
<link rel="preload" as="image" href="/assets/logo.png" fetchpriority="high">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
<script src="/js/performance-lite.js" defer></script>
<style>
:root {
  --bg: #060b14;
  --surface: #0f1726;
  --surface-2: #111b2d;
  --line: rgba(255, 255, 255, 0.12);
  --text: #f5f7fb;
  --muted: #a5b2c9;
  --accent: #01d4ab;
  --accent-2: #62f7db;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  color: var(--text);
  font-family: "Manrope", sans-serif;
  background:
    radial-gradient(1200px 340px at 50% -16%, rgba(1, 212, 171, 0.18), transparent 60%),
    linear-gradient(180deg, #0b1322 0%, #070d18 45%, #060a13 100%);
  padding-bottom: calc(84px + env(safe-area-inset-bottom));
}

.page {
  width: min(760px, 100%);
  margin: 0 auto;
  padding: 0 12px;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 30;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 118px;
  padding: 12px 0;
  background: linear-gradient(180deg, rgba(6, 11, 20, 0.9), rgba(6, 11, 20, 0.56));
  backdrop-filter: blur(9px);
}

.logo-link {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
}

.logo {
  width: clamp(234px, 66vw, 430px);
  height: auto;
  filter: drop-shadow(0 6px 14px rgba(1, 212, 171, 0.26));
  animation: none;
}

.slow-net .logo {
  animation: none;
}

.topbar-actions {
  margin-left: auto;
  display: inline-flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
  z-index: 2;
}

.topbar-left {
  margin-right: auto;
  z-index: 2;
}

.lang-btn {
  min-width: 36px;
  padding: 0 10px;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.03em;
}

.topbar-actions .icon-btn {
  width: 38px;
  height: 38px;
}

.side-menu {
  position: fixed;
  inset: 0 auto 0 0;
  width: min(78vw, 320px);
  background: rgba(10, 15, 24, 0.98);
  border-right: 1px solid var(--line);
  z-index: 45;
  transform: translateX(-100%);
  transition: transform 0.22s ease;
  padding: 18px 14px;
  display: grid;
  gap: 10px;
}

.side-menu.open {
  transform: translateX(0);
}

.side-menu a {
  text-decoration: none;
  color: #e5edf8;
  border: 1px solid rgba(255, 255, 255, 0.14);
  border-radius: 10px;
  min-height: 40px;
  padding: 0 12px;
  display: inline-flex;
  align-items: center;
}

.menu-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(4, 8, 14, 0.5);
  z-index: 44;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
}

.menu-backdrop.show {
  opacity: 1;
  pointer-events: auto;
}

.icon-btn {
  width: 36px;
  height: 36px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.06);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: #dce6f7;
}

.icon-btn svg {
  width: 18px;
  height: 18px;
}

.hero {
  margin-top: 4px;
  min-height: 46vh;
  border-radius: 18px;
  overflow: hidden;
  border: 1px solid var(--line);
  position: relative;
}

.slow-net .hero {
  min-height: 36vh;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background: center/cover no-repeat;
  transform: scale(1.04);
  transition: transform 2.8s ease, background-image 0.5s ease;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(145deg, rgba(8, 12, 20, 0.72) 14%, rgba(8, 12, 20, 0.26) 64%, rgba(8, 12, 20, 0.72) 100%);
}

.hero-content {
  position: relative;
  z-index: 1;
  min-height: 46vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  gap: 10px;
  padding: 16px;
}

.slow-net .hero-content {
  min-height: 36vh;
}

.hero h1 {
  margin: 0;
  font-family: "Manrope", sans-serif;
  font-size: clamp(29px, 8.8vw, 52px);
  line-height: 0.98;
  letter-spacing: -0.02em;
  max-width: 12.5ch;
}

.hero-sub {
  margin: 0;
  font-size: clamp(12px, 3.2vw, 15px);
  color: #d7dfee;
  max-width: 32ch;
}

.row {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.btn-main,
.btn-ghost,
.btn-view,
.item-btn {
  text-decoration: none;
  border-radius: 999px;
  min-height: 38px;
  padding: 0 14px;
  font-size: 12px;
  font-weight: 800;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.btn-main {
  color: #041612;
  background: linear-gradient(120deg, var(--accent), var(--accent-2));
}

.btn-ghost,
.btn-view,
.item-btn {
  color: #edf2fb;
  background: rgba(255, 255, 255, 0.07);
  border: 1px solid rgba(255, 255, 255, 0.22);
}

.hero .btn-main,
.hero .btn-ghost {
  min-height: 40px;
  padding: 0 16px;
  color: #041612;
  background: linear-gradient(120deg, var(--accent), var(--accent-2));
  border: none;
  transition: filter 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
}

.hero .btn-main:hover,
.hero .btn-ghost:hover {
  filter: brightness(1.05);
  transform: translateY(-1px);
  box-shadow: 0 10px 20px rgba(1, 212, 171, 0.28);
}

.hero .btn-main:focus-visible,
.hero .btn-ghost:focus-visible {
  outline: 2px solid rgba(98, 247, 219, 0.9);
  outline-offset: 2px;
}

.section {
  margin-top: 24px;
  content-visibility: auto;
  contain-intrinsic-size: 420px;
}

.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.section h2 {
  margin: 0;
  font-size: clamp(20px, 5.6vw, 30px);
  font-family: "Manrope", sans-serif;
  letter-spacing: -0.02em;
}

.categories-scroll,
.new-scroll,
.film-scroll,
.merch-scroll {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 2px;
  scroll-snap-type: x proximity;
}

.categories-scroll::-webkit-scrollbar,
.new-scroll::-webkit-scrollbar,
.film-scroll::-webkit-scrollbar,
.merch-scroll::-webkit-scrollbar {
  display: none;
}

.cat-card {
  flex: 0 0 44%;
  min-height: 96px;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid var(--line);
  position: relative;
  text-decoration: none;
  scroll-snap-align: start;
}

.cat-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.cat-card::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(7, 12, 20, 0.2), rgba(7, 12, 20, 0.8));
}

.cat-card span {
  position: absolute;
  left: 10px;
  bottom: 10px;
  z-index: 1;
  font-family: "Manrope", sans-serif;
  font-size: 22px;
  color: #f8fbff;
}

.grid-2 {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}

.item-card {
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid var(--line);
  background: linear-gradient(160deg, rgba(16, 24, 38, 0.94), rgba(11, 18, 30, 0.94));
}

.item-cover {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  display: block;
}

.item-cover.poster {
  aspect-ratio: 2 / 3;
}

.item-body {
  padding: 9px;
  display: grid;
  gap: 6px;
}

.item-title {
  margin: 0;
  font-size: 12px;
  line-height: 1.28;
}

.item-meta {
  margin: 0;
  font-size: 11px;
  color: var(--muted);
}

.item-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
}

.price {
  color: #8efde8;
  font-size: 11px;
  font-weight: 700;
}

.scroll-card {
  flex: 0 0 42%;
  scroll-snap-align: start;
}

.event-meta {
  margin: 0;
  font-size: 11px;
  color: #9ee9db;
}

.discover-cta {
  margin: 30px 0 8px;
  border: 1px solid rgba(1, 212, 171, 0.45);
  border-radius: 18px;
  padding: 18px 12px;
  text-align: center;
  background:
    radial-gradient(360px 120px at 50% 0%, rgba(1, 212, 171, 0.2), transparent 70%),
    linear-gradient(180deg, rgba(16, 23, 36, 0.95), rgba(10, 14, 22, 0.95));
}

.discover-cta h3 {
  margin: 0 0 12px;
  font-family: "Manrope", sans-serif;
  font-size: clamp(21px, 6vw, 30px);
}

.bottom-nav {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  bottom: 8px;
  width: min(760px, calc(100% - 16px));
  z-index: 40;
  border: 1px solid var(--line);
  border-radius: 16px;
  background: rgba(9, 14, 24, 0.9);
  backdrop-filter: blur(12px);
  padding: 6px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
}

.bottom-nav a {
  text-decoration: none;
  color: #dfe7f5;
  min-height: 38px;
  border-radius: 12px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
}

.bottom-nav a.active {
  background: rgba(1, 212, 171, 0.2);
  color: #e9fffa;
}

@media (min-width: 640px) {
  .page {
    padding: 0 16px;
  }

  .cat-card {
    flex-basis: 28%;
  }

  .scroll-card {
    flex-basis: 26%;
  }

  .grid-2 {
    gap: 12px;
  }
}

@media (max-width: 640px) {
  .hero,
  .hero-content,
  .slow-net .hero,
  .slow-net .hero-content {
    min-height: 38vh;
  }
}

@media (prefers-reduced-motion: reduce) {
  .logo {
    animation: none;
  }
}
</style>
</head>

  <aside id="sideMenu" class="side-menu" aria-label="Menu">
    <a href="/discover.html" data-i18n="discoverNav">Discover</a>
    <a href="/browse.html" data-i18n="musicNav">Music</a>
    <a href="/movies.html" data-i18n="moviesNav">Movies</a>
    <a href="/events.html" data-i18n="eventsNav">Events</a>

  </aside>
  <div id="menuBackdrop" class="menu-backdrop" aria-hidden="true"></div>

  <main class="page">
    <header class="topbar">

            <line x1="3" y1="12" x2="21" y2="12"></line>

      <a class="logo-link" href="/index.html" data-i18n-aria="home" aria-label="Home"><img loading="eager" fetchpriority="high" decoding="async" class="logo" src="/assets/logo.png" alt="JENGU"></a>

<script type="module">
import { initLang, getLang, translate } from "/js/lang.js";
import { marketplaceItems, getLocalizedValue } from "/js/marketplace-catalog.js";
import { getCurrentUser } from "/js/auth.js";

initLang();

const IS_SLOW_NET = Boolean(
  navigator.connection &&
  (navigator.connection.saveData || /(slow-2g|2g|3g)/i.test(navigator.connection.effectiveType || ""))
);

const HERO_SIZE = IS_SLOW_NET ? "640" : "960";
const heroImages = [
  `/assets/hero/optimized/hero1-${HERO_SIZE}.jpg`,
  `/assets/hero/optimized/hero2-${HERO_SIZE}.jpg`,
  `/assets/hero/optimized/hero3-${HERO_SIZE}.jpg`
];

function linkFor(item) {
  if (item.category === "movies") return `/movie.html?id=${encodeURIComponent(item.id)}`;
  if (item.category === "events") return `/event.html?id=${encodeURIComponent(item.id)}`;
  if (item.category === "merch") return `/merch-product.html?id=${encodeURIComponent(item.id)}`;
  if (item.kind === "album") return `/album.html?id=${encodeURIComponent(item.id)}`;
  return `/track.html?id=${encodeURIComponent(item.id)}`;
}

function actionFor(item) {
  if (item.category === "merch") return "Buy";
  if (item.category === "music" || item.category === "movies") return "Play";
  return "View";
}

function fmtXaf(value) {
  return `${Number(value || 0).toLocaleString("fr-FR")} XAF`;
}

function sortByPopularity(items) {
  return [...items].sort((a, b) => (b.popularity || 0) - (a.popularity || 0));
}

function sortByNewest(items) {
  return [...items].sort((a, b) => Date.parse(b.releaseDate || "") - Date.parse(a.releaseDate || ""));
}

function shortDate(dateText) {
  const lang = getLang() === "fr" ? "fr-FR" : "en-US";
  const d = new Date(dateText || "");
  if (Number.isNaN(d.getTime())) return "";
  return d.toLocaleDateString(lang, { day: "2-digit", month: "short" });
}

function tTitle(item) {
  const lang = getLang() === "fr" ? "fr" : "en";
  return getLocalizedValue(item.title, lang) || translate("homeUntitled");
}

function renderItemCard(item, options = {}) {
  const title = tTitle(item);
  const creator = item.creator || translate("pdpCreator");
  const poster = options.poster ? " poster" : "";
  const sub = options.subline || creator;

  return `
    <article class="item-card ${options.scroll ? "scroll-card" : ""}">
      <a href="${linkFor(item)}"><img decoding="async" loading="lazy" class="item-cover${poster}" src="${item.cover}" alt="${title}"></a>
      <div class="item-body">
        <p class="item-title">${title}</p>
        <p class="item-meta">${sub}</p>
        <div class="item-foot">
          <span class="price">${fmtXaf(item.price)}</span>
          <a class="item-btn" href="${linkFor(item)}">${translate(actionFor(item).toLowerCase())}</a>
        </div>
      </div>
    </article>
  `;
}

function mount() {
  const all = [...marketplaceItems];
  const limits = IS_SLOW_NET
    ? { trending: 4, newest: 4, events: 2, films: 6, merch: 6 }
    : { trending: 6, newest: 8, events: 4, films: 999, merch: 999 };

  const trending = sortByPopularity(all).slice(0, limits.trending);
  const newest = sortByNewest(all).slice(0, limits.newest);
  const events = all.filter((i) => i.category === "events").sort((a, b) => Date.parse(a.releaseDate || "") - Date.parse(b.releaseDate || ""));
  const films = all.filter((i) => i.category === "movies").sort((a, b) => (b.popularity || 0) - (a.popularity || 0));
  const merch = all.filter((i) => i.category === "merch").sort((a, b) => (b.popularity || 0) - (a.popularity || 0));

  const trendingEl = document.getElementById("trendingGrid");
  const newEl = document.getElementById("newRow");
  const eventsEl = document.getElementById("eventsGrid");
  const filmsEl = document.getElementById("filmsRow");
  const merchEl = document.getElementById("merchRow");

  if (trendingEl) {
    trendingEl.innerHTML = trending.map((item) => renderItemCard(item)).join("");
  }

  if (newEl) {
    newEl.innerHTML = newest.map((item) => renderItemCard(item, { scroll: true })).join("");
  }

  const renderSecondaryRows = () => {
    if (eventsEl) {
      eventsEl.innerHTML = events.slice(0, limits.events).map((item) => {
        const date = shortDate(item.releaseDate);
        const city = item.city || "";
        return renderItemCard(item, {
          subline: `${date}${date && city ? " - " : ""}${city}`
        });
      }).join("");
    }

    if (filmsEl) {
      filmsEl.innerHTML = films.slice(0, limits.films).map((item) => renderItemCard(item, { scroll: true, poster: true })).join("");
    }

    if (merchEl) {
      merchEl.innerHTML = merch.slice(0, limits.merch).map((item) => renderItemCard(item, { scroll: true })).join("");
    }
  };

  if (IS_SLOW_NET && "requestIdleCallback" in window) {
    window.requestIdleCallback(renderSecondaryRows, { timeout: 1200 });
  } else if (IS_SLOW_NET) {
    setTimeout(renderSecondaryRows, 300);
  } else {
    renderSecondaryRows();
  }
}

function bindRoleLinks() {
  const user = getCurrentUser();
  if (user?.role === "artist") {
    const heroSell = document.getElementById("heroSell");
    const sellNav = document.getElementById("sellNav");
    if (heroSell) heroSell.href = "/artist/upload-track.html";
    if (sellNav) sellNav.href = "/artist/creator-hub.html";
  }
}

function startHero() {
  const bg = document.getElementById("heroBg");
  if (!bg) return;

  let index = 0;
  bg.style.backgroundImage = `url(${heroImages[index]})`;

  setInterval(() => {
    index = (index + 1) % heroImages.length;
    bg.style.backgroundImage = `url(${heroImages[index]})`;
    bg.style.transform = "scale(1.08)";
    setTimeout(() => {
      bg.style.transform = "scale(1.04)";
    }, 320);
  }, 5600);
}

window.addEventListener("DOMContentLoaded", () => {
  mount();
  bindRoleLinks();
  startHero();

  const menuBtn = document.getElementById("menuBtn");
  const sideMenu = document.getElementById("sideMenu");
  const backdrop = document.getElementById("menuBackdrop");

  function closeMenu() {
    if (sideMenu) sideMenu.classList.remove("open");
    if (backdrop) backdrop.classList.remove("show");
  }

  if (menuBtn && sideMenu && backdrop) {
    menuBtn.addEventListener("click", () => {
      sideMenu.classList.toggle("open");
      backdrop.classList.toggle("show");
    });

    backdrop.addEventListener("click", closeMenu);
    sideMenu.querySelectorAll("a").forEach((link) => {
      link.addEventListener("click", closeMenu);
    });
  }

  const langBtn = document.getElementById("langBtn");
  if (langBtn) {
    langBtn.addEventListener("click", () => {
      setTimeout(() => {
        mount();
      }, 0);
    });
  }
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b0b0f">
<title>JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
</head>

<body>

<div class="main-container">

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">
  <img src="/assets/logo.png" class="menu-logo">

  <a href="/">Accueil</a>
  <a href="/browse.html">Parcourir</a>
  <a href="/genres.html">Genres</a>
  <a href="/charts.html">Charts</a>
  <a href="/new-releases.html">Nouveautés</a>

  <hr>

  <a href="/user/library.html">📁 Library</a>
  <a href="/user/purchases.html">💳 Purchases</a>
</div>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>

  <div class="hero-content">

    <!-- TOPBAR -->
    <div class="topbar">
      <span class="menu" id="menuBtn">☰</span>

      <!-- LOGO -->
      <a href="/index.html">
        <img src="/assets/logo.png" class="logo">
      </a>

      <div id="authArea"></div>
      <span class="lang" id="langBtn">FR ▾</span>
    </div>

    <h1 data-i18n="hero"></h1>
    <p class="hero-sub" data-i18n="heroSub"></p>

    <div class="cta">
      <a href="/browse.html" class="btn-primary" data-i18n="browse"></a>
      <a href="/genres.html" class="btn-outline">Genres</a>
    </div>

  </div>
</section>

<!-- SINGLES -->
<section class="section">
  <div class="row-between">
    <h3 data-i18n="singles">🎧 Singles</h3>
    <a href="/browse.html" data-i18n="view">View</a>
  </div>
  <div class="scroll-row" id="singles"></div>
</section>

<!-- ALBUMS -->
<section class="section">
  <div class="row-between">
    <h3 data-i18n="albums">💿 Albums</h3>
    <a href="/browse.html" data-i18n="view">View</a>
  </div>
  <div class="scroll-row" id="albums"></div>
</section>

<!-- USER TYPE -->
<section class="section center">
  <h3 data-i18n="getStarted"></h3>

  <div class="genres">
    <a href="/user/login.html" class="genre big" data-i18n="fan"></a>
    <a href="/user/login.html" class="genre big" data-i18n="artist"></a>
  </div>
</section>

<!-- TRENDING -->
<section class="section">
  <h3 data-i18n="trending"></h3>
  <p class="sub" data-i18n="trendingSub"></p>
  <div class="scroll-row" id="trending"></div>
</section>

<!-- NEW RELEASES -->
<section class="section">
  <h3 data-i18n="newReleases"></h3>
  <div class="scroll-row" id="releases"></div>
</section>

<!-- TOP CHARTS -->
<section class="section">
  <div class="row-between">
    <h3 data-i18n="charts"></h3>
    <a href="/charts.html" data-i18n="view"></a>
  </div>
  <div id="charts"></div>
</section>

<!-- GENRES -->
<section class="section">
  <div class="row-between">
    <h3 data-i18n="exploreGenres"></h3>
    <a href="/genres.html" data-i18n="viewAll"></a>
  </div>

  <div class="genres grid" id="genresGrid"></div>
</section>

<!-- CTA -->
<section class="section center">
  <h3 data-i18n="support"></h3>
  <p class="sub" data-i18n="supportSub"></p>
  <a href="/browse.html" class="btn-primary" data-i18n="start"></a>
</section>

<a href="https://wa.me/447888314381" class="whatsapp">
  💬 Support
</a>

</div> <!-- END main-container -->

<script type="module">
import { initLang } from "/js/lang.js";
import { fetchBrowseResults } from "/js/api.js";
import { getCurrentUser, logout } from "/js/auth.js";

initLang();

/* HERO */
const heroImages = [
  "/assets/hero/hero1.png",
  "/assets/hero/hero2.png",
  "/assets/hero/hero3.png"
];

let heroIndex = 0;
const hero = document.querySelector(".hero-bg");

if(hero){
  hero.style.backgroundImage = `url(${heroImages[0]})`;
  setInterval(()=>{
    heroIndex = (heroIndex+1)%heroImages.length;
    hero.style.backgroundImage = `url(${heroImages[heroIndex]})`;
  },5000);
}

/* AUTH */
const user = getCurrentUser();
const authArea = document.getElementById("authArea");

if(user){
  authArea.innerHTML = `
    <span>👋 ${user.name}</span>
    <button id="logoutBtn">Logout</button>
  `;
  document.getElementById("logoutBtn").onclick = logout;
}else{
  authArea.innerHTML = `
    <a href="/user/login.html">Login</a>
    <a href="/user/signup.html" class="primary">Sign Up</a>
  `;
}

/* NORMALIZE */
function normalize(str){
  return (str || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/\s+/g, "-");
}

/* DATA */
async function initPage(){

  let data = [];

  try{
    data = await fetchBrowseResults();
  }catch(e){
    console.error(e);
  }

  const trendingData = data.slice(0,6);
  const newData = [...data].sort((a,b)=> new Date(b.createdAt||0)-new Date(a.createdAt||0)).slice(0,6);
  const chartsData = data.slice(0,5);

  const genres = [...new Set(data.map(d=>d.genre).filter(Boolean))];

  const singles = data.filter(i=>i.type==="track").slice(0,6);
  const albums = data.filter(i=>i.type==="album").slice(0,6);

  function createCard(item){
    const link = item.type === "album"
      ? `/album.html?album=${encodeURIComponent(item.album || item.name)}`
      : `/track.html?id=${item.id}`;

    return `
      <a href="${link}" class="card">
        <img src="${item.cover || '/assets/covers/cover1.png'}">
        <div class="title">${item.name}</div>
      </a>
    `;
  }

  const trending = document.getElementById("trending");
  const releases = document.getElementById("releases");
  const charts = document.getElementById("charts");
  const genresGrid = document.getElementById("genresGrid");
  const singlesContainer = document.getElementById("singles");
  const albumsContainer = document.getElementById("albums");

  singles.forEach(i=> singlesContainer.innerHTML += createCard(i));
  albums.forEach(i=> albumsContainer.innerHTML += createCard(i));
  trendingData.forEach(i=> trending.innerHTML += createCard(i));
  newData.forEach(i=> releases.innerHTML += createCard(i));

  chartsData.forEach((item,i)=>{
    charts.innerHTML += `
      <div class="chart-item">
        <span>${i+1}</span>
        <img src="${item.cover}">
        <div class="info">
          <b>${item.name}</b>
          <p>${item.artist}</p>
        </div>
      </div>
    `;
  });

  genres.forEach(g=>{
    genresGrid.innerHTML += `
      <a href="/browse.html?genre=${normalize(g)}" class="genre-card">
        ${g.toUpperCase()}
      </a>
    `;
  });
}

window.addEventListener("DOMContentLoaded", initPage);

/* MENU */
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");

menuBtn.onclick = ()=> sideMenu.classList.toggle("open");

document.addEventListener("click",(e)=>{
  if(!sideMenu.contains(e.target) && !menuBtn.contains(e.target)){
    sideMenu.classList.remove("open");
  }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
</head>

<body>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">
  <img src="/assets/logo.png" class="menu-logo">

  <a href="/" data-i18n="home">Accueil</a>
  <a href="/browse.html" data-i18n="browse">Parcourir</a>
  <a href="/genres.html">Genres</a>
  <a href="/charts.html">Charts</a>
  <a href="/new-releases.html" data-i18n="releases">Nouveautés</a>

  <hr>

  <a href="/user/library.html">📁 Library</a>
  <a href="/user/purchases.html">💳 Purchases</a>
</div>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>

  <div class="hero-content">

    <!-- TOPBAR -->
    <div class="topbar">
      <span class="menu" id="menuBtn">☰</span>
      <img src="/assets/logo.png" class="logo">

      <div id="authArea"></div>

      <span class="lang" id="langBtn">FR ▾</span>
    </div>

    <!-- TITLE -->
    <h1 data-i18n="hero"></h1>
    <p class="hero-sub">Stream • Download • Support African Artists</p>

    <!-- CTA -->
    <div class="cta">
      <a href="/browse.html" class="btn-primary" data-i18n="browse"></a>
      <a href="/genres.html" class="btn-outline">Genres</a>
    </div>

  </div>
</section>

<!-- USER TYPE -->
<section class="section center">
  <h3>Get Started</h3>

  <div class="genres">
    <a href="/browse.html" class="genre big">🎧 Fan</a>
    <a href="#" id="artistLink" class="genre big">🎤 Artist</a>
  </div>
</section>

<!-- TRENDING -->
<section class="section">
  <h3 data-i18n="trending"></h3>
  <p class="sub" data-i18n="trendingSub"></p>
  <div class="scroll-row" id="trending"></div>
</section>

<!-- NEW RELEASES -->
<section class="section">
  <h3 data-i18n="newReleases"></h3>
  <div class="scroll-row" id="releases"></div>
</section>

<!-- TOP CHARTS -->
<section class="section">
  <div class="row-between">
    <h3>📊 Top Charts</h3>
    <a href="/charts.html">View</a>
  </div>
  <div id="charts"></div>
</section>

<!-- GENRES -->
<section class="section">
  <div class="row-between">
    <h3 data-i18n="exploreGenres"></h3>
    <a href="/genres.html">View All</a>
  </div>

  <div class="genres grid" id="genresGrid"></div>
</section>

<!-- CTA -->
<section class="section center">
  <h3>Support African Music</h3>
  <p class="sub">Buy tracks and empower artists directly</p>
  <a href="/browse.html" class="btn-primary">Start Exploring</a>
</section>

<!-- WHATSAPP -->
<a href="https://wa.me/237XXXXXXXXX" class="whatsapp">
  💬 Support
</a>

<script type="module">
import { fetchBrowseResults } from "/js/api.js";
import { getCurrentUser, logout } from "/js/auth.js";

/* =========================
   HERO ROTATION (KEPT)
========================= */
const heroImages = [
  "/assets/hero/hero1.png",
  "/assets/hero/hero2.png",
  "/assets/hero/hero3.png"
];

let heroIndex = 0;

window.addEventListener("DOMContentLoaded", () => {
  const hero = document.querySelector(".hero-bg");

  if(hero){
    hero.style.backgroundImage = `url(${heroImages[0]})`;

    setInterval(() => {
      heroIndex = (heroIndex + 1) % heroImages.length;
      hero.style.backgroundImage = `url(${heroImages[heroIndex]})`;
    }, 5000);
  }
});

/* =========================
   AUTH SYSTEM (KEPT)
========================= */
const user = getCurrentUser();
const authArea = document.getElementById("authArea");

if(user){
  authArea.innerHTML = `
    <span>👋 ${user.name}</span>
    <button id="logoutBtn">Logout</button>
  `;
  document.getElementById("logoutBtn").onclick = logout;
}else{
  authArea.innerHTML = `
    <a href="/user/login.html">Login</a>
    <a href="/user/signup.html" class="primary">Sign Up</a>
  `;
}

/* =========================
   ARTIST ACCESS (KEPT)
========================= */
document.getElementById("artistLink").onclick = () => {

  if(!user){
    window.location.href = "/user/login.html";
    return;
  }

  if(user.role !== "artist"){
    alert("Artist account required");
    return;
  }

  window.location.href = "/artist/dashboard.html";
};

/* =========================
   LANGUAGE (KEPT)
========================= */
const translations = {
  fr: {
    home:"Accueil",
    browse:"Parcourir",
    releases:"Nouveautés",
    hero:"Télécharger la musique africaine",
    trending:"Tendance",
    trendingSub:"À la une",
    newReleases:"Nouvelles sorties",
    exploreGenres:"Explorer les genres"
  },
  en: {
    home:"Home",
    browse:"Browse",
    releases:"New Releases",
    hero:"Download African Music",
    trending:"Trending",
    trendingSub:"Hot right now",
    newReleases:"New Releases",
    exploreGenres:"Explore Genres"
  }
};

let lang = localStorage.getItem("lang") || "fr";

function applyLang(){
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    el.textContent = translations[lang][el.dataset.i18n];
  });
  document.getElementById("langBtn").textContent = lang.toUpperCase()+" ▾";
}

document.getElementById("langBtn").onclick = ()=>{
  lang = lang === "fr" ? "en" : "fr";
  localStorage.setItem("lang", lang);
  applyLang();
};

applyLang();

/* =========================
   DATA (UPGRADED)
========================= */
let data = [];

try {
  data = await fetchBrowseResults();
} catch(e){
  console.error(e);
}

/* HELPERS */
const trendingData = data.slice(0,6);
const newData = [...data].sort((a,b)=> new Date(b.createdAt||0) - new Date(a.createdAt||0)).slice(0,6);
const chartsData = data.slice(0,5);

const genres = [...new Set(data.map(d=>d.genre).filter(Boolean))];

/* CARD */
function createCard(item){
  return `
    <div class="card">
      <img src="${item.cover}">
      <div class="title">${item.name}</div>
    </div>
  `;
}

/* RENDER */
const trending = document.getElementById("trending");
const releases = document.getElementById("releases");
const charts = document.getElementById("charts");
const genresGrid = document.getElementById("genresGrid");

trendingData.forEach(item=>{
  trending.innerHTML += createCard(item);
});

newData.forEach(item=>{
  releases.innerHTML += createCard(item);
});

chartsData.forEach((item,i)=>{
  charts.innerHTML += `
    <div class="chart-item">
      <span>${i+1}</span>
      <img src="${item.cover}">
      <div class="info">
        <b>${item.name}</b>
        <p>${item.artist}</p>
      </div>
    </div>
  `;
});

genres.slice(0,6).forEach(g=>{
  genresGrid.innerHTML += `
    <a href="/browse.html?genre=${g}" class="genre-card">
      ${g.toUpperCase()}
    </a>
  `;
});

/* =========================
   MENU (KEPT)
========================= */
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");

menuBtn.onclick = ()=> sideMenu.classList.toggle("open");

document.addEventListener("click",(e)=>{
  if(!sideMenu.contains(e.target) && !menuBtn.contains(e.target)){
    sideMenu.classList.remove("open");
  }
});
</script>

</body>
</html>

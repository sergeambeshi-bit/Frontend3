<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
</head>

<body>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">
  <img src="/assets/logo.png" class="menu-logo">

  <a href="/" data-i18n="home">Accueil</a>
  <a href="/browse.html" data-i18n="browse">Parcourir</a>
  <a href="/genres.html">Genres</a>
  <a href="/charts.html">Charts</a>
  <a href="/new-releases.html" data-i18n="releases">Nouveautés</a>

  <hr>

  <a href="/user/library.html">📁 Library</a>
  <a href="/user/purchases.html">💳 Purchases</a>
</div>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-patterns"></div>

  <div class="hero-content">

    <div class="topbar">

      <span class="menu" id="menuBtn">☰</span>

      <img src="/assets/logo.png" class="logo">

      <!-- AUTH AREA -->
      <div id="authArea" style="display:flex; gap:10px; align-items:center;"></div>

      <span class="lang" id="langBtn">FR ▾</span>

    </div>

    <h1 data-i18n="hero"></h1>

    <div class="cta">
      <a href="/browse.html" class="btn-primary" data-i18n="browse"></a>
      <a href="/new-releases.html" class="btn-outline" data-i18n="releases"></a>
    </div>

  </div>
</section>

<!-- USER TYPE -->
<section class="section">
  <h3 style="text-align:center;">Get Started</h3>

  <div class="genres">
    <a href="/browse.html" class="genre">🎧 Fan</a>
    <a href="/artist/dashboard.html" class="genre">🎤 Artist</a>
  </div>
</section>

<!-- TRENDING -->
<section class="section">
  <h3 data-i18n="trending"></h3>
  <p class="sub" data-i18n="trendingSub"></p>
  <div class="scroll-row" id="trending"></div>
</section>

<!-- NEW RELEASES -->
<section class="section">
  <h3 data-i18n="newReleases"></h3>
  <div class="scroll-row" id="releases"></div>
</section>

<!-- TOP CHARTS -->
<section class="section">
  <div class="row-between">
    <h3>Top Charts</h3>
    <a href="/charts.html">View</a>
  </div>
  <div id="charts"></div>
</section>

<!-- GENRES -->
<section class="section">
  <h3 data-i18n="exploreGenres"></h3>

  <div class="genres">
    <a href="/browse.html?genre=mboko" class="genre">Mboko</a>
    <a href="/browse.html?genre=makossa" class="genre">Makossa</a>
    <a href="/browse.html?genre=bikutsi" class="genre">Bikutsi</a>
    <a href="/browse.html?genre=afropop" class="genre">Afropop</a>
    <a href="/browse.html?genre=ndombolo" class="genre">Ndombolo</a>
  </div>
</section>

<!-- WHATSAPP -->
<a href="https://wa.me/237XXXXXXXXX" class="whatsapp">
  💬 Support
</a>

<script type="module">
import { fetchBrowseResults } from "/js/api.js";
import { getCurrentUser, logout } from "/js/auth.js";

/* =========================
   AUTH SYSTEM (FIXED)
========================= */
const user = getCurrentUser();
const authArea = document.getElementById("authArea");

if(user){
  authArea.innerHTML = `
    <span style="font-size:12px;">👋 ${user.name}</span>
    <button id="logoutBtn">Logout</button>
  `;

  document.getElementById("logoutBtn").onclick = logout;

}else{
  authArea.innerHTML = `
    <a href="/user/login.html" class="nav-btn">Login</a>
    <a href="/user/signup.html" class="nav-btn primary">Sign Up</a>
  `;
}

/* =========================
   LANGUAGE
========================= */
const translations = {
  fr: {
    home:"Accueil",
    browse:"Parcourir",
    releases:"Nouveautés",
    hero:"Télécharger la musique africaine",
    trending:"Tendance au Cameroun",
    trendingSub:"À la Une",
    newReleases:"Nouvelles Sorties",
    exploreGenres:"Explorer les Genres"
  },
  en: {
    home:"Home",
    browse:"Browse",
    releases:"New Releases",
    hero:"Download African Music",
    trending:"Trending",
    trendingSub:"Hot right now",
    newReleases:"New Releases",
    exploreGenres:"Explore Genres"
  }
};

let lang = localStorage.getItem("lang") || "fr";

function applyLang(){
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    el.textContent = translations[lang][el.dataset.i18n];
  });
  document.getElementById("langBtn").textContent = lang.toUpperCase()+" ▾";
}

document.getElementById("langBtn").onclick = ()=>{
  lang = lang === "fr" ? "en" : "fr";
  localStorage.setItem("lang", lang);
  applyLang();
};

applyLang();

/* =========================
   DATA LOAD
========================= */
let data = [];

try {
  data = await fetchBrowseResults();
} catch(e){
  console.error(e);
}

/* =========================
   CARD
========================= */
function createCard(item){
  return `
    <div class="card">
      <div class="cover">
        <img src="${item.cover}">
      </div>
      <div class="title">${item.name}</div>
    </div>
  `;
}

/* =========================
   RENDER
========================= */
const trending = document.getElementById("trending");
const releases = document.getElementById("releases");
const charts = document.getElementById("charts");

trending.innerHTML = "";
releases.innerHTML = "";
charts.innerHTML = "";

data.forEach(item=>{
  trending.innerHTML += createCard(item);
  releases.innerHTML += createCard(item);
});

data.slice(0,3).forEach((item,i)=>{
  charts.innerHTML += `
    <div class="chart-item">
      <span>${i+1}</span>
      <img src="${item.cover}">
      <div class="info">
        <b>${item.name}</b>
        <p>${item.artist}</p>
      </div>
    </div>
  `;
});

/* =========================
   MENU
========================= */
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");

menuBtn.onclick = ()=> sideMenu.classList.toggle("open");

document.addEventListener("click",(e)=>{
  if(!sideMenu.contains(e.target) && !menuBtn.contains(e.target)){
    sideMenu.classList.remove("open");
  }
});
</script>

</body>
</html>

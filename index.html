<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
</head>

<body>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">
  <img src="/assets/logo.png" class="menu-logo">

  <a href="/" data-i18n="browse"></a>
  <a href="/browse.html" data-i18n="browse"></a>
  <a href="/genres.html" data-i18n="genres"></a>
  <a href="/charts.html" data-i18n="charts"></a>
  <a href="/new-releases.html" data-i18n="new"></a>

  <hr>

  <a href="/user/library.html" data-i18n="library"></a>
  <a href="/user/purchases.html" data-i18n="purchases"></a>
</div>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>

  <div class="hero-content">

    <div class="topbar">
      <span class="menu" id="menuBtn">☰</span>

      <a href="/index.html">
        <img src="/assets/logo.png" class="logo">
      </a>

      <div id="authArea"></div>
      <span class="lang" id="langBtn"></span>
    </div>

    <div style="max-width:300px;">
      <h1 data-i18n="hero"></h1>
      <p class="hero-sub" data-i18n="heroSub"></p>

      <div class="cta">
        <a href="/browse.html" class="btn-primary" data-i18n="browse"></a>
        <a href="/genres.html" class="btn-outline" data-i18n="genres"></a>
      </div>
    </div>

  </div>
</section>

<!-- SINGLES -->
<section class="section">
  <h3 data-i18n="singles"></h3>
  <div class="scroll-row" id="singles"></div>
</section>

<!-- ALBUMS -->
<section class="section">
  <h3 data-i18n="albums"></h3>
  <div class="scroll-row" id="albums"></div>
</section>

<!-- TRENDING -->
<section class="section">
  <h3 data-i18n="trending"></h3>
  <div class="scroll-row" id="trending"></div>
</section>

<!-- NEW RELEASES -->
<section class="section">
  <h3 data-i18n="newReleases"></h3>
  <div class="scroll-row" id="releases"></div>
</section>

<!-- GENRES -->
<section class="section">
  <h3 data-i18n="exploreGenres"></h3>
  <div class="genres grid" id="genresGrid"></div>
</section>

<!-- CTA -->
<section class="section" style="padding-bottom:40px;">
  <h3 data-i18n="support"></h3>
  <p class="sub" data-i18n="supportSub"></p>

  <a href="/browse.html" class="btn-primary" data-i18n="start"></a>
</section>

<a href="https://wa.me/447888314381" class="whatsapp">
  💬 Support
</a>

<script type="module">
import { initLang, applyLang } from "/js/lang.js";
import { fetchBrowseResults } from "/js/api.js";
import { getCurrentUser, logout } from "/js/auth.js";

/* LANGUAGE */
initLang();

/* HERO ROTATION */
const heroImages = [
  "/assets/hero/hero1.png",
  "/assets/hero/hero2.png",
  "/assets/hero/hero3.png"
];

let heroIndex = 0;
const hero = document.querySelector(".hero-bg");

if(hero){
  hero.style.backgroundImage = `url(${heroImages[0]})`;

  setInterval(()=>{
    heroIndex = (heroIndex+1)%heroImages.length;
    hero.style.backgroundImage = `url(${heroImages[heroIndex]})`;
  },5000);
}

/* AUTH */
const user = getCurrentUser();
const authArea = document.getElementById("authArea");

if(user){
  authArea.innerHTML = `
    <span style="font-size:13px;">👋 ${user.name}</span>
    <button id="logoutBtn" class="btn-outline" style="padding:6px 10px;">Logout</button>
  `;
  document.getElementById("logoutBtn").onclick = logout;
}else{
  authArea.innerHTML = `
    <a href="/user/login.html" data-i18n="login"></a>
    <a href="/user/signup.html" class="btn-outline" data-i18n="signup"></a>
  `;
}

/* 🔥 APPLY AGAIN AFTER DYNAMIC HTML */
applyLang();

/* NORMALIZE */
function normalize(str){
  return (str || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/\s+/g, "-");
}

/* INIT PAGE */
async function initPage(){

  const singlesEl = document.getElementById("singles");
  const albumsEl = document.getElementById("albums");
  const trendingEl = document.getElementById("trending");
  const releasesEl = document.getElementById("releases");
  const genresEl = document.getElementById("genresGrid");

  let data = [];

  try{
    data = await fetchBrowseResults();
  }catch(e){
    console.error(e);
  }

  const singles = data.filter(i=>i.type==="track").slice(0,6);
  const albums = data.filter(i=>i.type==="album").slice(0,6);
  const trending = data.slice(0,6);
  const releases = [...data]
    .sort((a,b)=> new Date(b.createdAt||0)-new Date(a.createdAt||0))
    .slice(0,6);

  const genres = [...new Set(data.map(d=>d.genre).filter(Boolean))];

  function createCard(item){
    const link = item.type === "album"
      ? `/album.html?album=${encodeURIComponent(item.album || item.name)}`
      : `/track.html?id=${item.id}`;

    return `
      <a href="${link}" class="card">
        <img src="${item.cover || '/assets/covers/cover1.png'}">
        <div class="title">${item.name}</div>
      </a>
    `;
  }

  singles.forEach(i=> singlesEl.innerHTML += createCard(i));
  albums.forEach(i=> albumsEl.innerHTML += createCard(i));
  trending.forEach(i=> trendingEl.innerHTML += createCard(i));
  releases.forEach(i=> releasesEl.innerHTML += createCard(i));

  genres.forEach(g=>{
    genresEl.innerHTML += `
      <a href="/browse.html?genre=${normalize(g)}" class="genre-card">
        ${g.toUpperCase()}
      </a>
    `;
  });
}

window.addEventListener("DOMContentLoaded", initPage);

/* MENU */
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");

menuBtn.onclick = ()=> sideMenu.classList.toggle("open");

document.addEventListener("click",(e)=>{
  if(!sideMenu.contains(e.target) && !menuBtn.contains(e.target)){
    sideMenu.classList.remove("open");
  }
});
</script>

</body>
</html>

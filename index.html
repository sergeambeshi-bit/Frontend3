<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b0b0f">
<title>JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
</head>

<body>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">
  <img src="/assets/logo.png" class="menu-logo">

  <a href="/" data-i18n="home"></a>
  <a href="/browse.html" data-i18n="browse"></a>
  <a href="/genres.html" data-i18n="genres"></a>
  <a href="/charts.html" data-i18n="charts"></a>
  <a href="/new-releases.html" data-i18n="releases"></a>

  <hr>

  <a href="/user/library.html" data-i18n="library"></a>
  <a href="/user/purchases.html" data-i18n="purchases"></a>
</div>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>

  <div class="hero-content">

    <!-- TOPBAR -->
    <div class="topbar">
      <span class="menu" id="menuBtn">☰</span>
      <img src="/assets/logo.png" class="logo">

      <div id="authArea"></div>

      <span class="lang" id="langBtn">FR ▾</span>
    </div>

    <h1 data-i18n="hero"></h1>
    <p class="hero-sub" data-i18n="heroSub"></p>

    <div class="cta">
      <a href="/browse.html" class="btn-primary" data-i18n="browse"></a>
      <a href="/genres.html" class="btn-outline" data-i18n="genres"></a>
    </div>

  </div>
</section>

<!-- SINGLES -->
<section class="section">
  <div class="row-between">
    <h3 data-i18n="singles"></h3>
    <a href="/browse.html" data-i18n="view"></a>
  </div>
  <div class="scroll-row" id="singles"></div>
</section>

<!-- ALBUMS -->
<section class="section">
  <div class="row-between">
    <h3 data-i18n="albums"></h3>
    <a href="/albums.html" data-i18n="view"></a>
  </div>
  <div class="scroll-row" id="albums"></div>
</section>

<!-- USER TYPE -->
<section class="section center">
  <h3 data-i18n="getStarted"></h3>

  <div class="genres">
    <a href="/user/signup.html?role=fan" class="genre big">🎧 Fan</a>
    <a href="/user/signup.html?role=artist" class="genre big">🎤 Artist</a>
    
  </div>
</section>

<!-- TRENDING -->
<section class="section">
  <h3 data-i18n="trending"></h3>
  <p class="sub" data-i18n="trendingSub"></p>
  <div class="scroll-row" id="trending"></div>
</section>

<!-- NEW RELEASES -->
<section class="section">
  <h3 data-i18n="newReleases"></h3>
  <div class="scroll-row" id="releases"></div>
</section>

<!-- TOP CHARTS -->
<section class="section">
  <div class="row-between">
    <h3 data-i18n="charts"></h3>
    <a href="/charts.html" data-i18n="view"></a>
  </div>
  <div id="charts"></div>
</section>

<!-- GENRES -->
<section class="section">
  <div class="row-between">
    <h3 data-i18n="exploreGenres"></h3>
    <a href="/genres.html" data-i18n="viewAll"></a>
  </div>

  <div class="genres grid" id="genresGrid"></div>
</section>

<!-- CTA -->
<section class="section center">
  <h3 data-i18n="support"></h3>
  <p class="sub" data-i18n="supportSub"></p>
  <a href="/browse.html" class="btn-primary" data-i18n="start"></a>
</section>

<a href="https://wa.me/237XXXXXXXXX" class="whatsapp">
  💬 Support
</a>

<script type="module">
import { initLang } from "/js/lang.js";
import { fetchBrowseResults } from "/js/api.js";
import { getCurrentUser, logout } from "/js/auth.js";

initLang();

/* HERO ROTATION */
const heroImages = [
  "/assets/hero/hero1.png",
  "/assets/hero/hero2.png",
  "/assets/hero/hero3.png"
];

let heroIndex = 0;

window.addEventListener("DOMContentLoaded", () => {
  const hero = document.querySelector(".hero-bg");

  if(hero){
    hero.style.backgroundImage = `url(${heroImages[0]})`;

    setInterval(() => {
      heroIndex = (heroIndex + 1) % heroImages.length;
      hero.style.backgroundImage = `url(${heroImages[heroIndex]})`;
    }, 5000);
  }
});

/* AUTH */
const user = getCurrentUser();
const authArea = document.getElementById("authArea");

if(user){
  authArea.innerHTML = `
    <span>👋 ${user.name}</span>
    <button id="logoutBtn">Logout</button>
  `;
  document.getElementById("logoutBtn").onclick = logout;
}else{
  authArea.innerHTML = `
    <a href="/user/login.html">Login</a>
    <a href="/user/signup.html" class="primary">Sign Up</a>
  `;
}

/* =========================
   DATA LOAD (RESTORED)
========================= */
let data = [];

try {
  data = await fetchBrowseResults();
  console.log("DATA:", data);
} catch(e){
  console.error(e);
}

/* =========================
   HELPERS
========================= */
const trendingData = data.slice(0,6);

const newData = [...data]
  .sort((a,b)=> new Date(b.createdAt||0) - new Date(a.createdAt||0))
  .slice(0,6);

const chartsData = data.slice(0,5);

const genres = [...new Set(data.map(d=>d.genre).filter(Boolean))];

const singles = data.filter(i => i.type === "track").slice(0,6);
const albums = data.filter(i => i.type === "album").slice(0,6);

/* =========================
   CARD (FIXED)
========================= */
function createCard(item){
  return `
    <div class="card ${item.type === 'album' ? 'album' : ''}">
      <img src="${item.cover || 'assets/covers/cover1.png'}">
      <div class="title">${item.name}</div>
    </div>
  `;
}

/* =========================
   ELEMENTS
========================= */
const trending = document.getElementById("trending");
const releases = document.getElementById("releases");
const charts = document.getElementById("charts");
const genresGrid = document.getElementById("genresGrid");
const singlesContainer = document.getElementById("singles");
const albumsContainer = document.getElementById("albums");

/* =========================
   RENDER
========================= */

if(singlesContainer){
  singles.forEach(item=>{
    singlesContainer.innerHTML += createCard(item);
  });
}

if(albumsContainer){
  albums.forEach(item=>{
    albumsContainer.innerHTML += createCard(item);
  });
}

trendingData.forEach(item=>{
  trending.innerHTML += createCard(item);
});

newData.forEach(item=>{
  releases.innerHTML += createCard(item);
});

chartsData.forEach((item,i)=>{
  charts.innerHTML += `
    <div class="chart-item">
      <span>${i+1}</span>
      <img src="${item.cover || 'assets/covers/cover1.png'}">
      <div class="info">
        <b>${item.name}</b>
        <p>${item.artist}</p>
      </div>
    </div>
  `;
});

  genres.forEach(g=>{
  genresGrid.innerHTML += `
    <a href="/browse.html?genre=${g}" class="genre-card">
      ${g.toUpperCase()}
    </a>
  `;
});

/* =========================
   MENU
========================= */
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");

menuBtn.onclick = ()=> sideMenu.classList.toggle("open");

document.addEventListener("click",(e)=>{
  if(!sideMenu.contains(e.target) && !menuBtn.contains(e.target)){
    sideMenu.classList.remove("open");
  }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JENGU – Discover African Music</title>

  <!-- CSS -->
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/theme-afro.css">
</head>

<body>

<!-- BACKGROUND PATTERNS -->
<div class="toghu"></div>
<div class="kuba"></div>
<div class="mudcloth"></div>

<!-- HEADER -->
<header class="header container flex" style="justify-content: space-between; padding: 1rem 0;">
  <button class="menu-btn">☰</button>
  <img src="/assets/logo.svg" class="logo" style="height:40px;">
  <div class="text-muted">FR ▾</div>
</header>

<!-- HERO CAROUSEL -->
<section class="section container">
  <div class="carousel">
    <div class="carousel-track" id="carouselTrack"></div>

    <div class="carousel-buttons">
      <button class="carousel-btn" onclick="prevSlide()">‹</button>
      <button class="carousel-btn" onclick="nextSlide()">›</button>
    </div>
  </div>
</section>

<!-- TRENDING -->
<section class="section container">
  <h2>Tendance au Cameroun</h2>
  <p class="text-muted">À la Une au Cameroun</p>

  <div id="trendingGrid" class="grid grid-4"></div>
</section>

<!-- NEW RELEASES -->
<section class="section container">
  <h2>Nouvelles Sorties</h2>
  <div id="newReleasesGrid" class="grid grid-4"></div>
</section>

<!-- GENRES -->
<section class="section container">
  <h2>Explorer les Genres</h2>

  <div class="grid grid-4">
    <div class="card"><div class="card-title">Makossa</div></div>
    <div class="card"><div class="card-title">AfroPop</div></div>
    <div class="card"><div class="card-title">Ndombolo</div></div>
    <div class="card"><div class="card-title">Rap / Drill</div></div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <p>&copy; 2026 JENGU — African Music Marketplace</p>
</footer>

<!-- =========================
     MODULE SCRIPT (IMPORTANT)
========================= -->
<script type="module">

import { fetchBrowseResults } from "/js/api.js";

/* =========================
   CAROUSEL LOGIC
========================= */
let index = 0;

function updateCarousel() {
  const track = document.getElementById("carouselTrack");
  track.style.transform = `translateX(-${index * 100}%)`;
}

function nextSlide() {
  const total = document.querySelectorAll(".carousel-item").length;
  index = (index + 1) % total;
  updateCarousel();
}

function prevSlide() {
  const total = document.querySelectorAll(".carousel-item").length;
  index = (index - 1 + total) % total;
  updateCarousel();
}

/* Make buttons work globally */
window.nextSlide = nextSlide;
window.prevSlide = prevSlide;


/* =========================
   LOAD DATA INTO UI
========================= */
async function loadHome() {
  const data = await fetchBrowseResults();

  const trending = document.getElementById("trendingGrid");
  const releases = document.getElementById("newReleasesGrid");
  const carousel = document.getElementById("carouselTrack");

  trending.innerHTML = "";
  releases.innerHTML = "";
  carousel.innerHTML = "";

  data.forEach(item => {

    /* TRENDING */
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${item.cover}" class="card-cover">
      <div class="card-title">${item.name}</div>
      <div class="card-meta">${item.type}</div>
    `;
    trending.appendChild(card);

    /* RELEASES */
    const card2 = document.createElement("div");
    card2.className = "card";

    card2.innerHTML = `
      <img src="${item.cover}" class="card-cover">
      <div class="card-title">${item.name}</div>
    `;
    releases.appendChild(card2);

    /* CAROUSEL */
    const slide = document.createElement("div");
    slide.className = "carousel-item";

    slide.innerHTML = `<img src="${item.cover}">`;
    carousel.appendChild(slide);
  });
}

document.addEventListener("DOMContentLoaded", loadHome);

</script>

</body>
</html>

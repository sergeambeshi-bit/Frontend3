<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
</head>

<body>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-patterns"></div>

  <div class="hero-content">

    <div class="topbar">
      <span class="menu">☰</span>
      <img src="/assets/logo.png" class="logo">
      <span class="lang" onclick="toggleLang()">FR ▾</span>
    </div>

    <h1 id="heroText">Télécharger la musique africaine</h1>

    <div class="cta">
      <a href="/browse.html" class="btn-primary" id="browseBtn">Parcourir</a>
      <a href="/new-releases.html" class="btn-outline" id="newBtn">Nouveautés</a>
    </div>

    <div class="scroll">↓ Scroll</div>

  </div>
</section>

<!-- TRENDING -->
<section class="section">
  <h3 id="trendingTitle">Tendance au Cameroun</h3>
  <p class="sub" id="trendingSub">À la Une au Cameroun</p>
  <div class="scroll-row" id="trending"></div>
</section>

<!-- NEW RELEASES -->
<section class="section">
  <h3 id="releasesTitle">Nouvelles Sorties</h3>
  <div class="scroll-row" id="releases"></div>
</section>

<!-- TOP CHARTS -->
<section class="section">
  <div class="row-between">
    <h3 id="chartsTitle">Top Charts</h3>
    <span class="view">VOIR TOUT</span>
  </div>
  <div id="charts"></div>
</section>

<!-- GENRES -->
<section class="section">
  <h3 id="genresTitle">Explorer les Genres</h3>

  <div class="genres">
    <div class="genre">Makossa</div>
    <div class="genre">AfroPop</div>
    <div class="genre">Ndombolo</div>
    <div class="genre">Rap / Drill</div>
  </div>
</section>

<!-- PAYMENT MODAL -->
<div id="paymentModal" class="modal hidden">
  <div class="modal-content">

    <h3>Paiement</h3>

    <div class="pay-section">
      <p class="label">🇨🇲 Mobile Money</p>
      <button class="pay-btn momo" data-method="mtn">MTN MoMo</button>
      <button class="pay-btn momo" data-method="orange">Orange Money</button>
    </div>

    <div class="pay-section">
      <p class="label">💳 Carte / International</p>
      <button class="pay-btn card" data-method="card">
        Visa / Mastercard
      </button>
    </div>

    <input type="text" id="phone" placeholder="6XXXXXXXX">

    <button class="confirm">Confirmer le paiement</button>

  </div>
</div>

<script type="module">
import { fetchBrowseResults } from "/js/api.js";

/* HERO ROTATION */
const heroImages = [
  "/assets/hero/hero1.png",
  "/assets/hero/hero2.png",
  "/assets/hero/hero3.png"
];

let heroIndex = 0;

function rotateHero() {
  const hero = document.querySelector(".hero-bg");
  hero.style.backgroundImage = `url(${heroImages[heroIndex]})`;
  heroIndex = (heroIndex + 1) % heroImages.length;
}

setInterval(rotateHero, 5000);
rotateHero();

/* DATA */
const data = await fetchBrowseResults();

function createCard(item){
  return `
    <div class="card">
      <div class="cover">
        <img src="${item.cover}">
        <button class="play">▶</button>
      </div>

      <div class="title">${item.name}</div>

      <div class="card-bottom">
        <span class="price">${Math.floor(Math.random()*1000)} XAF</span>
        <button class="buy">Buy</button>
      </div>
    </div>
  `;
}

const trending = document.getElementById("trending");
const releases = document.getElementById("releases");

data.forEach(item => {
  trending.innerHTML += createCard(item);
  releases.innerHTML += createCard(item);
});

/* CHARTS */
const charts = document.getElementById("charts");

data.slice(0,3).forEach((item,i)=>{
  charts.innerHTML += `
    <div class="chart-item">
      <span>${String(i+1).padStart(2,'0')}</span>
      <img src="${item.cover}">
      <div>
        <b>${item.name}</b>
        <p>${item.artist || "Artist"}</p>
      </div>
      <div class="price">${Math.floor(Math.random()*300)} XAF</div>
    </div>
  `;
});

/* PREVIEW */
document.addEventListener("click", e=>{
  if(e.target.classList.contains("play")){
    const audio = new Audio("/assets/sample.mp3");
    audio.play();
    setTimeout(()=>audio.pause(),30000);
  }
});

/* PAYMENT + DOWNLOAD */
let selectedMethod = null;

document.addEventListener("click", e => {

  if(e.target.classList.contains("buy")){
    document.getElementById("paymentModal").classList.remove("hidden");
  }

  if(e.target.classList.contains("pay-btn")){
    selectedMethod = e.target.dataset.method;

    document.querySelectorAll(".pay-btn").forEach(btn=>{
      btn.style.background = "#222";
      btn.style.color = "white";
    });

    e.target.style.background = "#01d4ab";
    e.target.style.color = "black";
  }

  if(e.target.classList.contains("confirm")){
    if(!selectedMethod){
      alert("Choisissez un moyen de paiement");
      return;
    }

    document.getElementById("paymentModal").classList.add("hidden");

    showDownloadModal();
  }

});

/* DOWNLOAD MODAL */
function showDownloadModal(){
  const modal = document.createElement("div");

  modal.className = "modal";

  modal.innerHTML = `
    <div class="modal-content">
      <h3>Téléchargement prêt</h3>
      <p>Votre achat a été confirmé.</p>

      <a href="/assets/sample.mp3" download class="download-btn">
        Télécharger
      </a>

      <button class="close-download">Fermer</button>
    </div>
  `;

  document.body.appendChild(modal);

  modal.addEventListener("click", e=>{
    if(e.target.classList.contains("close-download")){
      modal.remove();
    }
  });
}

/* LANGUAGE */
const translations = {
  en: {
    hero: "Download African Music",
    trending: "Trending in Cameroon",
    subTrending: "Top in Cameroon",
    releases: "New Releases",
    charts: "Top Charts",
    genres: "Explore Genres",
    browse: "Browse",
    new: "New Releases"
  },
  fr: {
    hero: "Télécharger la musique africaine",
    trending: "Tendance au Cameroun",
    subTrending: "À la Une au Cameroun",
    releases: "Nouvelles Sorties",
    charts: "Top Charts",
    genres: "Explorer les Genres",
    browse: "Parcourir",
    new: "Nouveautés"
  }
};

let currentLang = localStorage.getItem("lang") || "fr";

function applyLang() {
  const t = translations[currentLang];

  document.getElementById("heroText").textContent = t.hero;
  document.getElementById("trendingTitle").textContent = t.trending;
  document.getElementById("trendingSub").textContent = t.subTrending;
  document.getElementById("releasesTitle").textContent = t.releases;
  document.getElementById("chartsTitle").textContent = t.charts;
  document.getElementById("genresTitle").textContent = t.genres;
  document.getElementById("browseBtn").textContent = t.browse;
  document.getElementById("newBtn").textContent = t.new;

  document.querySelector(".lang").textContent =
    currentLang === "fr" ? "FR ▾" : "EN ▾";
}

window.toggleLang = function () {
  currentLang = currentLang === "fr" ? "en" : "fr";
  localStorage.setItem("lang", currentLang);
  applyLang();
};

applyLang();

</script>

</body>
</html>

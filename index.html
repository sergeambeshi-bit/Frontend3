<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
</head>

<body>

<!-- HERO -->
<section class="hero">

  <!-- BACKGROUND -->
  <div class="hero-bg"></div>
  <div class="hero-patterns"></div>

  <!-- CONTENT -->
  <div class="hero-content">

    <div class="topbar">
      <span class="menu">☰</span>
      <img src="/assets/logo.svg" class="logo">
      <span class="lang">FR ▾</span>
    </div>

    <h1>Download African Music</h1>

    <div class="cta">
      <a href="/browse.html" class="btn-primary">Browse</a>
      <a href="/new-releases.html" class="btn-outline">New Releases</a>
    </div>

    <div class="scroll">↓ Scroll</div>

  </div>

</section>

<!-- TRENDING -->
<section class="section">
  <h3>Tendance au Cameroun</h3>
  <p class="sub">À la Une au Cameroun</p>
  <div class="scroll-row" id="trending"></div>
</section>

<!-- NEW RELEASES -->
<section class="section">
  <h3>Nouvelles Sorties</h3>
  <div class="scroll-row" id="releases"></div>
</section>

<!-- TOP CHARTS -->
<section class="section">
  <div class="row-between">
    <h3>Top Charts</h3>
    <span class="view">VOIR TOUT</span>
  </div>
  <div id="charts"></div>
</section>

<!-- GENRES -->
<section class="section">
  <h3>Explorer les Genres</h3>

  <div class="genres">
    <div class="genre">Makossa</div>
    <div class="genre">AfroPop</div>
    <div class="genre">Ndombolo</div>
    <div class="genre">Rap / Drill</div>
  </div>
</section>

<script type="module">
import { fetchBrowseResults } from "/js/api.js";

const data = await fetchBrowseResults();

/* CARDS */
function createCard(item){
  return `
    <div class="card">
      <div class="cover">
        <img src="${item.cover}">
        <button class="play">▶</button>
      </div>
      <div class="title">${item.name}</div>
      <div class="price">${Math.floor(Math.random()*1000)} XAF</div>
    </div>
  `;
}

/* TRENDING + RELEASES */
const trending = document.getElementById("trending");
const releases = document.getElementById("releases");

data.forEach(item => {
  trending.innerHTML += createCard(item);
  releases.innerHTML += createCard(item);
});

/* CHARTS */
const charts = document.getElementById("charts");

data.slice(0,3).forEach((item,i)=>{
  charts.innerHTML += `
    <div class="chart-item">
      <span>${String(i+1).padStart(2,'0')}</span>
      <img src="${item.cover}">
      <div>
        <b>${item.name}</b>
        <p>${item.artist || "Artist"}</p>
      </div>
      <div class="price">${Math.floor(Math.random()*300)} XAF</div>
    </div>
  `;
});

/* PREVIEW */
document.addEventListener("click", e=>{
  if(e.target.classList.contains("play")){
    const audio = new Audio("/assets/sample.mp3");
    audio.play();
    setTimeout(()=>audio.pause(),30000);
  }
});
</script>

</body>
</html>

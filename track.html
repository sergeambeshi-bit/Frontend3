<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track – JENGU</title>
<!-- CSS System -->
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/layout.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/theme-afro.css">
<!-- JS System -->
<script src="/js/api.js" defer></script>
<script src="/js/ui.js" defer></script>
</head>
<body class="dark-theme">

<!-- HEADER -->
<header class="site-header">
  <img src="/assets/logo.svg" class="logo" alt="JENGU Logo">
  <nav>
    <a href="/index.html">Home</a>
    <a href="/browse.html">Browse</a>
    <a href="/genres.html">Genres</a>
    <a href="/charts.html">Charts</a>
    <a href="/new-releases.html">New Releases</a>
    <a href="/blog.html">Blog</a>
  </nav>
  <div class="user-actions">
    <a href="/user/login.html" class="btn btn-neon-outline">Login</a>
    <a href="/user/signup.html" class="btn btn-neon">Sign Up</a>
  </div>
</header>

<main>
  <section class="track-section">
    <h1 id="track-title">Track Title</h1>
    <div class="track-details">
      <img src="/assets/patterns/mudcloth.svg" alt="Track cover" class="track-cover">
      <p>Artist: <span id="track-artist">Artist Name</span></p>
      <p>Album: <span id="track-album">Album Name</span></p>
      <button class="btn btn-neon-outline play-btn">Play</button>
    </div>
  </section>
</main>

<!-- FOOTER -->
<footer>
  <p>&copy; 2026 Afro Music Platform</p>
</footer>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  try {
    const track = await fetchTrackDetails(); // placeholder function
    document.getElementById('track-title').textContent = track.title;
    document.getElementById('track-artist').textContent = track.artist;
    document.getElementById('track-album').textContent = track.album;
    document.querySelector('.track-cover').src = track.cover || '/assets/patterns/mudcloth.svg';
  } catch (err) {
    console.error('Failed to load track details:', err);
  }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track – JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
</head>

<body>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">
  <div class="menu-header">
    <a href="/index.html">
  <img src="/assets/logo.png" class="logo">
</a>
  </div>

  <a href="/index.html">Accueil</a>
  <a href="/browse.html">Parcourir</a>
  <a href="/genres.html">Genres</a>
  <a href="/charts.html">Top Charts</a>
  <a href="/new-releases.html">Nouveautés</a>

  <a href="/user/library.html">Ma Bibliothèque</a>
  <a href="/user/purchases.html">Mes Achats</a>
  <a href="/user/settings.html">Paramètres</a>
</div>

<!-- HERO -->
<section class="hero" style="height:60vh;">
  <div class="hero-bg" id="trackBg"></div>
  <div class="hero-patterns"></div>

  <div class="topbar">
    <span class="menu" id="menuBtn">☰</span>
    <a href="/index.html"><img src="/assets/logo.png" class="logo"></a>
    <span></span>
  </div>

  <div class="hero-content">
    <h1 id="trackTitle" data-i18n="trackTitlePlaceholder">Titre du morceau</h1>
    <p id="trackArtist" class="sub" data-i18n="artist">Artiste</p>
  </div>
</section>

<!-- TRACK INFO -->
<section class="section">

  <div class="cover" style="max-width:200px; margin:auto;">
    <img id="trackCover" src="">
  </div>

  <h3 id="trackName" style="text-align:center;" data-i18n="trackNameLabel">Titre</h3>
  <p id="trackArtist2" class="sub" style="text-align:center;" data-i18n="artist">Artiste</p>

  <div class="cta" style="justify-content:center;">
    <button class="btn-primary play" data-i18n="preview">▶ Preview</button>
    <button class="btn-outline buy" data-i18n="buy">Acheter</button>
  </div>

  <p class="price" style="text-align:center; margin-top:10px;">
    300 XAF
  </p>

</section>

<!-- PAYMENT MODAL -->
<div id="paymentModal" class="modal hidden">
  <div class="modal-content">
    <h3 data-i18n="payment">Paiement</h3>

    <div class="pay-section">
      <p class="label">🇨🇲 Mobile Money</p>
      <button class="pay-btn momo" data-method="mtn">MTN MoMo</button>
      <button class="pay-btn momo" data-method="orange">Orange Money</button>
    </div>

    <div class="pay-section">
      <p class="label">💳 Carte</p>
      <button class="pay-btn card" data-method="card">Visa / Mastercard</button>
    </div>

    <input type="text" id="phone" placeholder="6XXXXXXXX">
    <button class="confirm" data-i18n="confirm">Confirmer</button>
  </div>
</div>

<script type="module">
import { fetchBrowseResults } from "/js/api.js";
import { initLang, applyLang, translate } from "/js/lang.js";

initLang();

/* UTILITY FUNCTIONS */
function getRandomCover() {
  const covers = [
    '/assets/covers/album1.png',
    '/assets/covers/album2.png',
    '/assets/covers/album3.png',
    '/assets/covers/cover.png',
    '/assets/covers/cover02.png',
    '/assets/covers/cover03.png',
    '/assets/covers/cover1.png',
    '/assets/covers/cover2.png',
    '/assets/covers/cover3.png',
    '/assets/covers/cover5.png',
    '/assets/covers/cover6.png',
    '/assets/covers/cover7.png'
  ];
  return covers[Math.floor(Math.random() * covers.length)];
}

/* MENU */
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");

menuBtn.addEventListener("click", () => {
  sideMenu.classList.toggle("open");
});

document.addEventListener("click", (e) => {
  if (!sideMenu.contains(e.target) && !menuBtn.contains(e.target)) {
    sideMenu.classList.remove("open");
  }
});

/* LOAD TRACK (FROM URL) */
const params = new URLSearchParams(window.location.search);
const trackName = params.get("track");

async function loadTrack(){
  const data = await fetchBrowseResults();

  const track = data.find(t =>
    t.name.toLowerCase() === (trackName || "").toLowerCase()
  );

  if(!track) return;

  const trackTitleEl = document.getElementById("trackTitle");
  const trackNameEl = document.getElementById("trackName");
  const trackArtistEl = document.getElementById("trackArtist");
  const trackArtist2El = document.getElementById("trackArtist2");

  trackTitleEl.textContent = track.name;
  trackNameEl.textContent = track.name;
  trackArtistEl.textContent = track.artist || "Artist";
  trackArtist2El.textContent = track.artist || "Artist";

  trackTitleEl.removeAttribute("data-i18n");
  trackNameEl.removeAttribute("data-i18n");
  trackArtistEl.removeAttribute("data-i18n");
  trackArtist2El.removeAttribute("data-i18n");

  document.getElementById("trackCover").src = track.cover || getRandomCover();
  document.getElementById("trackBg").style.backgroundImage = `url(${track.cover || getRandomCover()})`;
}

/* PREVIEW */
document.addEventListener("click", e=>{
  if(e.target.classList.contains("play")){
    const audio = new Audio("/assets/sample.mp3");
    audio.play();
    setTimeout(()=>audio.pause(),30000);
  }
});

/* PAYMENT */
let selectedMethod = null;

document.addEventListener("click", e => {

  if(e.target.classList.contains("buy")){
    document.getElementById("paymentModal").classList.remove("hidden");
  }

  if(e.target.classList.contains("pay-btn")){
    selectedMethod = e.target.dataset.method;

    document.querySelectorAll(".pay-btn").forEach(btn=>{
      btn.style.background = "#222";
      btn.style.color = "white";
    });

    e.target.style.background = "#01d4ab";
    e.target.style.color = "black";
  }

  if(e.target.classList.contains("confirm")){
    if(!selectedMethod){
      alert(translate("choosePayment"));
      return;
    }

    document.getElementById("paymentModal").classList.add("hidden");

    showDownloadModal();
  }

});

/* DOWNLOAD */
function showDownloadModal(){
  const modal = document.createElement("div");

  modal.className = "modal";

  modal.innerHTML = `
    <div class="modal-content">
      <h3 data-i18n="readyDownload">Téléchargement prêt</h3>
      <p data-i18n="purchaseConfirmed">Votre achat a été confirmé.</p>

      <a href="/assets/sample.mp3" download class="download-btn" data-i18n="downloadZip">
        Télécharger
      </a>

      <button class="close-download" data-i18n="close">Fermer</button>
    </div>
  `;

  document.body.appendChild(modal);
  applyLang();

  modal.addEventListener("click", e=>{
    if(e.target.classList.contains("close-download")){
      modal.remove();
    }
  });
}

loadTrack();

</script>

</body>
</html>

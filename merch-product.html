<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produit merch - JENGU</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles/app.css">
<link rel="stylesheet" href="/styles/components.css">
<link rel="stylesheet" href="/styles/pdp.css">
<style>
  body { font-family: "Outfit", sans-serif; }
  /* Merch: stack gallery above details on mobile */
  @media (max-width: 700px) {
    .merch-pdp-grid {
      grid-template-columns: 1fr !important;
    }
  }
  .merch-pdp-grid {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 20px;
  }
</style>
</head>
<body class="pdp-page" data-cat="merch" data-i18n-title="merchProductPageTitle">

<div id="sideMenu" class="side-menu">
  <div class="menu-header">
    <a href="/index.html"><img src="/assets/logo.png" class="menu-logo" alt="JENGU"></a>
  </div>
  <a href="/discover.html" data-i18n="discoverNav">Decouvrir</a>
  <a href="/browse.html" data-i18n="musicNav">Musique</a>
  <a href="/movies.html" data-i18n="moviesNav">Films</a>
  <a href="/events.html" data-i18n="eventsNav">Evenements</a>
  <a href="/merch.html" data-i18n="merchNav">Merch</a>
  <a href="/creators.html" data-i18n="creatorsNav">Createurs</a>
  <a href="/artist-pricing.html" data-i18n="artistPricingNav">Tarifs</a>
  <a href="/artist/signup.html" data-i18n="sellOnJenguNav">Vendre</a>
</div>

<!-- HERO -->
<section class="pdp-hero">
  <div class="pdp-hero-bg" id="merchHeroBg"></div>
  <div class="pdp-hero-fg"></div>
  <div class="topbar">
    <span class="menu" id="menuBtn">☰</span>
    <a href="/index.html"><img src="/assets/logo.png" class="logo" alt="JENGU"></a>
    <a href="/checkout.html" class="cart-btn" aria-label="Voir le panier" data-i18n-aria="viewCartAria"><span class="cart-icon">🛒</span><span class="cart-count">0</span></a>
  </div>
</section>

<!-- SHELL -->
<main class="pdp-shell">

  <!-- MERCH TOP: gallery + details side-by-side -->
  <div style="background:var(--pdp-surf);border:1px solid var(--pdp-border);border-radius:20px;padding:20px;box-shadow:0 24px 64px rgba(0,0,0,.5);margin-bottom:14px;">
    <div class="merch-pdp-grid">

      <!-- Gallery column -->
      <div>
        <div class="pdp-gallery-main">
          <img id="merchMainImg" src="" alt="Produit merch">
        </div>
        <div class="pdp-gallery-thumbs" id="merchThumbs" style="margin-top:8px;"></div>
      </div>

      <!-- Details column -->
      <div class="pdp-details">
        <span class="pdp-cat-badge" style="position:static;display:inline-block;margin-bottom:12px;" data-i18n="merchNav">Merch</span>
        <p class="pdp-eyebrow" id="merchKind"></p>
        <h1 class="pdp-title" id="merchTitle" style="font-family:'Space Grotesk',sans-serif;"></h1>
        <a class="pdp-creator-link" id="merchCreatorLink" href="#tab-creator"></a>
        <p class="pdp-desc" id="merchDesc"></p>
        <p class="pdp-price" id="merchPrice"></p>

        <!-- Stock badge -->
        <span class="pdp-stock-badge in-stock" id="merchStockBadge"></span>

        <!-- Variant selector -->
        <label class="pdp-variant-label" for="merchVariant" data-i18n="chooseVariant">Choisir une variante</label>
        <select class="pdp-variant-select" id="merchVariant"></select>

        <!-- Shipping -->
        <p id="merchShipping" style="font-size:12px;color:#6e86a8;margin:0 0 14px;"></p>

        <div class="pdp-cta-row">
          <button class="pdp-btn-buy" id="merchAddBtn" data-i18n="merchAddToCart">Ajouter</button>
          <a href="/checkout.html" class="pdp-btn-secondary" id="merchCartLink" style="display:none;text-align:center;text-decoration:none;" data-i18n="viewCartCta">Panier</a>
          <button class="pdp-btn-share" id="merchShareBtn" data-i18n="creatorShare">Partager</button>
        </div>
      </div>

    </div>
  </div>

  <!-- Info strip -->
  <div class="pdp-infostrip">
    <span class="pdp-info-pill"><span class="pdp-info-pill-icon">📦</span> <span id="merchShippingPill"></span></span>
    <span class="pdp-info-pill"><span class="pdp-info-pill-icon">📅</span> <span id="merchReleasePill"></span></span>
    <span class="pdp-info-pill"><span class="pdp-info-pill-icon">🔒</span> <span data-i18n="trackMetaSecure">Secure Checkout</span></span>
  </div>

  <!-- Tabs -->
  <div class="pdp-tabs-bar">
    <button class="pdp-tab-btn active" data-tab="specs" data-i18n="pdpSpecs">Caracteristiques</button>
    <button class="pdp-tab-btn" data-tab="creator" data-i18n="pdpCreator">Createur</button>
    <button class="pdp-tab-btn" data-tab="related" data-i18n="pdpRelated">Similaires</button>
  </div>

  <!-- Specs tab -->
  <div class="pdp-tab-panel active" id="tab-specs">
    <p class="pdp-section-label" data-i18n="pdpSpecs">Caracteristiques</p>
    <div class="pdp-infostrip" style="padding:0;border:none;background:none;" id="specsStrip"></div>
  </div>

  <!-- Creator tab -->
  <div class="pdp-tab-panel" id="tab-creator">
    <div id="merchCreatorCard"></div>
  </div>

  <!-- Related tab -->
  <div class="pdp-tab-panel" id="tab-related">
    <p class="pdp-section-label" data-i18n="relatedMerch">Merch associe</p>
    <div class="pdp-related-grid" id="merchRelatedGrid"></div>
  </div>

</main>

<script type="module">
import { initLang, getLang, applyLang, translate } from "/js/lang.js";
import { marketplaceItems, creatorProfiles, getLocalizedValue } from "/js/marketplace-catalog.js";
import { cart } from "/js/cart.js";
import { getCurrentUser } from "/js/auth.js";

initLang();

// ── ITEM LOOKUP ───────────────────────────────────────────────
const params    = new URLSearchParams(window.location.search);
const merchId   = params.get("id");
const allMerch  = marketplaceItems.filter(i => i.category === "merch");
const product   = allMerch.find(i => i.id === merchId) || allMerch[0];

// ── HELPERS ───────────────────────────────────────────────────
function stockForVariant(index) {
  if (!Array.isArray(product?.variants)) return 0;
  return Number(product.variants[index]?.stock || 0);
}

function refreshStock() {
  const idx   = Number(document.getElementById("merchVariant")?.value || 0);
  const stock = stockForVariant(idx);
  const badge = document.getElementById("merchStockBadge");
  const addBtn = document.getElementById("merchAddBtn");
  if (badge) {
    badge.className = "pdp-stock-badge " + (stock > 5 ? "in-stock" : stock > 0 ? "low-stock" : "out-stock");
    badge.textContent = `${translate("stockLabel")}: ${stock}`;
  }
  if (addBtn) {
    addBtn.disabled   = stock <= 0;
    addBtn.textContent = stock <= 0 ? translate("merchOutOfStock") : translate("merchAddToCart");
  }
}

// ── TAB SWITCHING ─────────────────────────────────────────────
document.querySelectorAll(".pdp-tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".pdp-tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".pdp-tab-panel").forEach(p => p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById(`tab-${btn.dataset.tab}`)?.classList.add("active");
  });
});

// ── MENU ──────────────────────────────────────────────────────
const menuBtn  = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");
menuBtn.addEventListener("click", () => sideMenu.classList.toggle("open"));
document.addEventListener("click", e => {
  if (!sideMenu.contains(e.target) && !menuBtn.contains(e.target)) sideMenu.classList.remove("open");
});

// ── RENDER ────────────────────────────────────────────────────
function render() {
  if (!product) return;

  const lang    = getLang();
  const title   = getLocalizedValue(product.title, lang);
  const desc    = getLocalizedValue(product.description, lang) || "";
  const gallery = Array.isArray(product.gallery) && product.gallery.length ? product.gallery : [product.cover];

  // Hero BG
  const heroBg = document.getElementById("merchHeroBg");
  if (heroBg) heroBg.style.backgroundImage = `url(${product.cover})`;
  document.title = `${title} - JENGU`;

  // Gallery main
  const mainImg = document.getElementById("merchMainImg");
  if (mainImg) { mainImg.src = gallery[0]; mainImg.alt = title; }

  // Thumbs
  const thumbsEl = document.getElementById("merchThumbs");
  if (thumbsEl) {
    thumbsEl.innerHTML = gallery.map((src, i) => `
      <button type="button" class="pdp-thumb-btn${i === 0 ? " active" : ""}" data-src="${src}">
        <img src="${src}" alt="${title}">
      </button>`).join("");
    thumbsEl.querySelectorAll(".pdp-thumb-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        thumbsEl.querySelectorAll(".pdp-thumb-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        if (mainImg) mainImg.src = btn.dataset.src || product.cover;
      });
    });
  }

  // Kind
  const kindEl = document.getElementById("merchKind");
  if (kindEl) kindEl.textContent = (product.kind || "").toUpperCase();

  // Title
  const titleEl = document.getElementById("merchTitle");
  if (titleEl) titleEl.textContent = title;

  // Creator link
  const creator = creatorProfiles.find(c => c.name === product.creator);
  const creatorLink = document.getElementById("merchCreatorLink");
  if (creatorLink) {
    creatorLink.textContent = product.creator;
    creatorLink.href = creator ? `/creator.html?id=${creator.id}` : "#tab-creator";
  }

  // Desc
  const descEl = document.getElementById("merchDesc");
  if (descEl) descEl.textContent = desc;

  // Price
  const priceEl = document.getElementById("merchPrice");
  if (priceEl) priceEl.textContent = `${product.price} XAF`;

  // Variants
  const variantSelect = document.getElementById("merchVariant");
  if (variantSelect) {
    variantSelect.innerHTML = (product.variants || []).map((v, i) => {
      const parts = [v.size, v.color].filter(Boolean);
      return `<option value="${i}">${parts.join(" / ")} (${v.stock})</option>`;
    }).join("");
    variantSelect.addEventListener("change", refreshStock);
  }
  refreshStock();

  // Shipping
  const shipEl = document.getElementById("merchShipping");
  if (shipEl && product.shipping) {
    shipEl.textContent = `${translate("shippingLabel")}: ${(product.shipping.regions || []).join(", ")} • ${product.shipping.eta || ""}`;
  }

  const shipPill = document.getElementById("merchShippingPill");
  if (shipPill && product.shipping) {
    shipPill.textContent = `${(product.shipping.regions || []).join(", ")} • ${product.shipping.eta || ""}`;
  }

  const releasePill = document.getElementById("merchReleasePill");
  if (releasePill) releasePill.textContent = product.releaseDate || "";

  // Specs strip
  const specsEl = document.getElementById("specsStrip");
  if (specsEl) {
    const v0 = product.variants?.[0];
    specsEl.innerHTML = [
      product.kind    ? `<span class="pdp-info-pill">👕 ${product.kind}</span>` : "",
      v0?.color       ? `<span class="pdp-info-pill">🎨 ${v0.color}</span>` : "",
      product.city    ? `<span class="pdp-info-pill">📍 ${product.city}</span>` : "",
      product.shipping?.regions?.length ? `<span class="pdp-info-pill">🚚 ${product.shipping.regions.join(", ")}</span>` : ""
    ].filter(Boolean).join("");
  }

  // Creator card
  const creatorCardEl = document.getElementById("merchCreatorCard");
  if (creatorCardEl && creator) {
    const bio = getLocalizedValue(creator.bio, lang) || "";
    creatorCardEl.innerHTML = `
      <a class="pdp-creator-card" href="/creator.html?id=${creator.id}">
        <div class="pdp-creator-avatar"><img src="${creator.avatar}" alt="${creator.name}"></div>
        <div class="pdp-creator-info">
          <p class="pdp-creator-name">${creator.name}</p>
          <p class="pdp-creator-city">${creator.city || ""}</p>
        </div>
        <button class="pdp-btn-follow-sm" data-i18n="creatorFollow">Suivre</button>
      </a>
      ${bio ? `<p style="color:#6e86a8;font-size:13px;margin-top:12px;line-height:1.55;">${bio}</p>` : ""}
    `;
  } else if (creatorCardEl) {
    creatorCardEl.innerHTML = `<div class="pdp-creator-card" style="cursor:default;"><div class="pdp-creator-avatar" style="font-size:22px;">👗</div><div class="pdp-creator-info"><p class="pdp-creator-name">${product.creator}</p></div></div>`;
  }

  // Related grid
  const relGrid = document.getElementById("merchRelatedGrid");
  if (relGrid) {
    const related = allMerch.filter(i => i.id !== product.id).slice(0, 4);
    relGrid.innerHTML = related.map(item => {
      const t = getLocalizedValue(item.title, lang);
      return `
        <a class="mc-card" href="/merch-product.html?id=${item.id}">
          <div class="mc-card-img" style="background-image:url(${item.cover})">
            <span class="mc-card-badge badge-new">${item.kind || "merch"}</span>
            <button class="mc-card-play" aria-label="View">▶</button>
          </div>
          <div class="mc-card-body">
            <p class="mc-card-title">${t}</p>
            <p class="mc-card-creator">${item.creator}</p>
            <div class="mc-card-foot">
              <span class="mc-card-price">${item.price} XAF</span>
              <button class="mc-card-cta" data-i18n="buy">Acheter</button>
            </div>
          </div>
        </a>`;
    }).join("");
  }
}

render();

// ── ADD TO CART ───────────────────────────────────────────────
document.getElementById("merchAddBtn")?.addEventListener("click", () => {
  const user = getCurrentUser();
  if (!user) { window.location.href = "/user/login.html"; return; }
  if (!product) return;

  const lang     = getLang();
  const title    = getLocalizedValue(product.title, lang);
  const idx      = Number(document.getElementById("merchVariant")?.value || 0);
  const variant  = product.variants?.[idx];
  if (!variant || Number(variant.stock || 0) <= 0) return;

  const added = cart.add({
    id: `${product.id}-${idx}`,
    name: `${title} (${[variant.size, variant.color].filter(Boolean).join(" / ")})`,
    artist: product.creator,
    cover: product.cover,
    price: Number(product.price || 0),
    type: "merch"
  });

  if (added) {
    const addBtn = document.getElementById("merchAddBtn");
    if (addBtn) { addBtn.textContent = translate("merchAdded"); addBtn.disabled = true; }
    const cartLink = document.getElementById("merchCartLink");
    if (cartLink) cartLink.style.display = "";
  }
});

document.getElementById("merchShareBtn")?.addEventListener("click", () => {
  if (navigator.share) {
    navigator.share({ title: document.title, url: location.href }).catch(() => {});
  } else {
    navigator.clipboard?.writeText(location.href);
  }
});

applyLang();
</script>
</body>
</html>

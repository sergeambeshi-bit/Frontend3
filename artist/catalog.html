<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalogue – JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
<script src="/js/artist-dashboard.js" defer></script>
</head>

<body>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">

  <div class="menu-header">
    <img src="/assets/logo.png" class="menu-logo">
  </div>

  <a href="/index.html">🏠 Accueil</a>
  <a href="/browse.html">🔍 Parcourir</a>
  <a href="/genres.html">🎵 Genres</a>

  <hr>

  <a href="/artist/dashboard.html">📈 Dashboard</a>
  <a href="/artist/catalog.html">🎶 Catalogue</a>
  <a href="/artist/upload-track.html">⬆ Upload Track</a>
  <a href="/artist/upload-album.html">💿 Upload Album</a>
  <a href="/artist/payouts.html">💰 Paiements</a>

</div>

<!-- HEADER -->
<div class="topbar">
  <span class="menu" id="menuBtn">☰</span>
  <h3>Mon Catalogue</h3>
  <span></span>
</div>

<!-- CATALOG -->
<section class="section">

  <div id="catalogList">

    <!-- ITEM -->
    <div class="catalog-item">

      <img src="/assets/patterns/toghu.svg">

      <div class="info">
        <b>Mboko Anthem</b>
        <p>Track • 300 XAF</p>
      </div>

      <div class="actions">
        <button class="edit-btn">✏️</button>
        <button class="delete-btn">🗑</button>
      </div>

    </div>

    <!-- ITEM -->
    <div class="catalog-item">

      <img src="/assets/patterns/kuba.svg">

      <div class="info">
        <b>Afro Vibes Vol.1</b>
        <p>Album • 1000 XAF</p>
      </div>

      <div class="actions">
        <button class="edit-btn">✏️</button>
        <button class="delete-btn">🗑</button>
      </div>

    </div>

  </div>

</section>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <a href="/index.html" class="nav-item">🏠</a>
  <a href="/browse.html" class="nav-item">🔍</a>
  <a href="/genres.html" class="nav-item">🎵</a>
  <a href="/user/library.html" class="nav-item">📚</a>
  <a href="/user/purchases.html" class="nav-item">💰</a>
</div>

<script>

/* MENU */
import { initLang } from "/js/lang.js";

initLang();
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");

menuBtn.addEventListener("click", () => {
  sideMenu.classList.toggle("open");
});

document.addEventListener("click", (e) => {
  if (!sideMenu.contains(e.target) && !menuBtn.contains(e.target)) {
    sideMenu.classList.remove("open");
  }
});

/* ACTIVE NAV */
const currentPath = window.location.pathname;
document.querySelectorAll(".nav-item").forEach(link => {
  if(currentPath.includes(link.getAttribute("href"))){
    link.classList.add("active");
  }
});

/* ACTIONS */
document.addEventListener("click", e => {

  if(e.target.classList.contains("edit-btn")){
    alert("Modifier (à connecter plus tard)");
  }

  if(e.target.classList.contains("delete-btn")){
    const item = e.target.closest(".catalog-item");
    item.remove();
    alert("Supprimé du catalogue");
  }

});

</script>

</body>
</html>

<script type="module">
import { supabase } from "/js/supabase.js";

/* =========================
   STATE
========================= */
let payouts = [];

/* =========================
   FETCH PAYOUTS
========================= */
async function loadPayouts(){

  try {

    const { data, error } = await supabase
      .from("payouts")
      .select("*")
      .order("created_at", { ascending: false });

    if(error){
      console.error(error);
      return;
    }

    payouts = data || [];
    render(payouts);

  } catch(err){
    console.error(err);
  }
}

/* =========================
   RENDER
========================= */
function render(data){

  const tbody = document.getElementById("payout-list");
  tbody.innerHTML = "";

  if(!data.length){
    tbody.innerHTML = `
      <tr>
        <td colspan="6" style="text-align:center;">No payouts</td>
      </tr>
    `;
    return;
  }

  data.forEach(p => {

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${p.id}</td>
      <td>${p.artist}</td>
      <td>${p.amount} XAF</td>
      <td>${new Date(p.created_at).toLocaleDateString()}</td>

      <td>
        <span class="status status-${p.status}">
          ${p.status}
        </span>
      </td>

      <td>
        ${
          p.status === "requested"
          ? `<button class="btn btn-neon-outline mark-paid" data-id="${p.id}">
               Mark Paid
             </button>`
          : `<span style="color:#aaa;">Completed</span>`
        }
      </td>
    `;

    tbody.appendChild(row);
  });
}

/* =========================
   MARK AS PAID
========================= */
document.addEventListener("click", async (e)=>{

  if(e.target.classList.contains("mark-paid")){

    const id = e.target.dataset.id;

    const confirmAction = confirm("Mark this payout as paid?");
    if(!confirmAction) return;

    e.target.innerText = "Processing...";
    e.target.disabled = true;

    const { error } = await supabase
      .from("payouts")
      .update({ status: "paid" })
      .eq("id", id);

    if(error){
      console.error(error);
      alert("Update failed ❌");
      return;
    }

    alert("Payout marked as paid ✅");

    loadPayouts();
  }

});

/* =========================
   SEARCH
========================= */
document.getElementById("searchPayout").addEventListener("input", e => {

  const q = e.target.value.toLowerCase();

  const filtered = payouts.filter(p =>
    p.artist.toLowerCase().includes(q)
  );

  render(filtered);
});

/* INIT */
loadPayouts();

</script>

</body>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paiements – JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
</head>

<body>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">

  <div class="menu-header">
    <img src="/assets/logo.png" class="menu-logo">
  </div>

  <a href="/pages/index.html">🏠 Accueil</a>
  <a href="/pages/browse.html">🔍 Parcourir</a>
  <a href="/pages/genres.html">🎵 Genres</a>

  <hr>

  <a href="/artist/dashboard.html">📈 Dashboard</a>
  <a href="/artist/catalog.html">🎶 Catalogue</a>
  <a href="/artist/upload-track.html">⬆ Upload Track</a>
  <a href="/artist/upload-album.html">💿 Upload Album</a>
  <a href="/artist/payouts.html">💰 Paiements</a>

</div>

<!-- HEADER -->
<div class="topbar">
  <span class="menu" id="menuBtn">☰</span>
  <h3>Paiements</h3>
  <span></span>
</div>

<!-- BALANCE -->
<section class="section">

  <div class="balance-card">
    <h2>85,000 XAF</h2>
    <p>Solde disponible</p>

    <button class="btn-primary" id="withdrawBtn">
      Retirer mes gains
    </button>
  </div>

</section>

<!-- PAYOUT HISTORY -->
<section class="section">

  <h3>Historique des paiements</h3>

  <div id="payoutList">

    <div class="chart-item">
      <div class="info">
        <b>Retrait Mobile Money</b>
        <p>15 Mars 2026</p>
      </div>
      <div class="price">20,000 XAF</div>
    </div>

    <div class="chart-item">
      <div class="info">
        <b>Retrait Mobile Money</b>
        <p>01 Mars 2026</p>
      </div>
      <div class="price">15,000 XAF</div>
    </div>

  </div>

</section>

<!-- WITHDRAW MODAL -->
<div id="withdrawModal" class="modal hidden">
  <div class="modal-content">

    <h3>Retirer vos gains</h3>

    <label class="label">Numéro Mobile Money</label>
    <input type="text" id="withdrawPhone" placeholder="6XXXXXXXX">

    <label class="label">Montant</label>
    <input type="number" id="withdrawAmount" placeholder="Ex: 10000">

    <button class="confirm" id="confirmWithdraw">
      Confirmer le retrait
    </button>

  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <a href="/pages/index.html" class="nav-item">🏠</a>
  <a href="/pages/browse.html" class="nav-item">🔍</a>
  <a href="/pages/genres.html" class="nav-item">🎵</a>
  <a href="/user/library.html" class="nav-item">📚</a>
  <a href="/user/purchases.html" class="nav-item">💰</a>
</div>

<script>

/* MENU */
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");

menuBtn.addEventListener("click", () => {
  sideMenu.classList.toggle("open");
});

document.addEventListener("click", (e) => {
  if (!sideMenu.contains(e.target) && !menuBtn.contains(e.target)) {
    sideMenu.classList.remove("open");
  }
});

/* ACTIVE NAV */
const currentPath = window.location.pathname;
document.querySelectorAll(".nav-item").forEach(link => {
  if(currentPath.includes(link.getAttribute("href"))){
    link.classList.add("active");
  }
});

/* WITHDRAW FLOW */
const withdrawBtn = document.getElementById("withdrawBtn");
const modal = document.getElementById("withdrawModal");

withdrawBtn.addEventListener("click", () => {
  modal.classList.remove("hidden");
});

document.getElementById("confirmWithdraw").addEventListener("click", () => {
  const phone = document.getElementById("withdrawPhone").value;
  const amount = document.getElementById("withdrawAmount").value;

  if(!phone || !amount){
    alert("Veuillez remplir les champs");
    return;
  }

  alert("Demande de retrait envoyée ✅");

  modal.classList.add("hidden");
});

</script>

</body>
</html>

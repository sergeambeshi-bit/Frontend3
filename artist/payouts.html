<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paiements artiste - JENGU</title>

  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/layout.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/theme-afro.css">
  <link rel="stylesheet" href="/styles/app.css">
  <script src="/js/premium-experience.js" defer></script>
</head>

<body class="dark-theme admin-panel artist-premium-page" data-i18n-title="payoutsPageTitle">

  <!-- HEADER -->
  <header class="admin-header">
    <a href="/index.html"><img src="../assets/logo.png" class="logo"></a>

    <nav>
      <a href="/artist/dashboard.html" data-i18n="dashboard">Tableau de bord</a>
      <a href="/artist/catalog.html" data-i18n="catalog">Catalogue</a>
      <a href="/artist/analytics.html" data-i18n="analytics">Analytique</a>
      <a href="/artist/payouts.html" class="active" data-i18n="payouts">Paiements</a>
      <a href="/artist/upload-album.html" data-i18n="uploadAlbum">Televerser un album</a>
      <a href="/artist/upload-track.html" data-i18n="uploadTrack">Televerser un morceau</a>
      <a href="/settings.html" data-i18n="settings">Parametres</a>
    </nav>
  </header>

  <!-- MAIN -->
  <main class="admin-main">

    <h1 data-i18n="artistPayoutsHeading">Paiements artiste</h1>

    <!-- SEARCH -->
    <input 
      type="text"
      id="searchPayout"
        data-i18n="searchPayoutPlaceholder"
        placeholder="Rechercher un paiement..."
      class="admin-search"
    >

    <!-- TABLE -->
    <table class="neon-table">
      <thead>
        <tr>
          <th>ID</th>
          <th data-i18n="amountLabel">Amount</th>
          <th data-i18n="dateLabel">Date</th>
          <th data-i18n="status">Status</th>
        </tr>
      </thead>

      <tbody id="payout-list"></tbody>
    </table>

  </main>

<script type="module">
  import { initLang } from "/js/lang.js";
  import { requireRole } from "/js/auth.js";

initLang();
import { supabase } from "/js/supabase.js";
import { translate } from "/js/lang.js";

  const user = requireRole("artist");
  if(!user) throw new Error(translate("artistAccountRequired"));

/* =========================
   STATE
========================= */
let payouts = [];

/* =========================
   LOAD PAYOUTS
========================= */
async function loadPayouts(){

  try {

    const { data, error } = await supabase
      .from("payouts")
      .select("*")
        .eq("artist", user.name)
      .order("created_at", { ascending: false });

    if(error){
      console.error(error);
      alert(translate("payoutLoadFailed"));
      return;
    }

    payouts = data || [];
    render(payouts);

  } catch(err){
    console.error(err);
  }
}

/* =========================
   RENDER TABLE
========================= */
function render(data){

  const tbody = document.getElementById("payout-list");

  if(!data.length){
    tbody.innerHTML = `
      <tr>
          <td colspan="4" style="text-align:center;">${translate("noPayoutsFound")}</td>
      </tr>
    `;
    return;
  }

  let html = "";

  data.forEach(p => {

    html += `
      <tr>
        <td>${p.id}</td>
        <td>${p.amount} XAF</td>
        <td>${new Date(p.created_at).toLocaleDateString()}</td>

        <td>
          <span class="status status-${p.status}">
            ${p.status}
          </span>
        </td>
      </tr>
    `;
  });

  tbody.innerHTML = html;
}

/* =========================
   SEARCH
========================= */
document.getElementById("searchPayout").addEventListener("input", e => {

  const q = e.target.value.toLowerCase();

  const filtered = payouts.filter(p =>
      String(p.id).toLowerCase().includes(q) ||
      String(p.status || "").toLowerCase().includes(q)
  );

  render(filtered);
});

/* INIT */
loadPayouts();

</script>

</body>
</html>

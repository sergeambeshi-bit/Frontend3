<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JENGU Admin – Payouts</title>

  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/theme-afro.css">
</head>

<body class="dark-theme admin-panel">

  <!-- HEADER -->
  <header class="admin-header">
    <img src="../assets/logo.png" class="logo">

    <nav>
      <a href="/artist/dashboard.html">Dashboard</a>
      <a href="/artist/catalog.html">Catalog</a>
      <a href="/artist/analytics.html">Analytics</a>
      <a href="/artist/payouts.html" class="active">Payouts</a>
      <a href="/artist/upload-album.html">Upload Album</a>
      <a href="/artist/upload-track.html">Upload Track</a>
    </nav>
  </header>

  <!-- MAIN -->
  <main class="admin-main">

    <h1>Artist Payouts</h1>

    <!-- SEARCH -->
    <input 
      type="text"
      id="searchPayout"
      placeholder="Search artist..."
      class="admin-search"
    >

    <!-- TABLE -->
    <table class="neon-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Artist</th>
          <th>Amount</th>
          <th>Date</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="payout-list"></tbody>
    </table>

  </main>

<script type="module">
import { initLang } from "/js/lang.js";

initLang();
import { supabase } from "/js/supabase.js";

/* =========================
   STATE
========================= */
let payouts = [];

/* =========================
   LOAD PAYOUTS
========================= */
async function loadPayouts(){

  try {

    const { data, error } = await supabase
      .from("payouts")
      .select("*")
      .order("created_at", { ascending: false });

    if(error){
      console.error(error);
      alert("Failed to load payouts ❌");
      return;
    }

    payouts = data || [];
    render(payouts);

  } catch(err){
    console.error(err);
  }
}

/* =========================
   RENDER TABLE
========================= */
function render(data){

  const tbody = document.getElementById("payout-list");

  if(!data.length){
    tbody.innerHTML = `
      <tr>
        <td colspan="6" style="text-align:center;">No payouts found</td>
      </tr>
    `;
    return;
  }

  let html = "";

  data.forEach(p => {

    html += `
      <tr>
        <td>${p.id}</td>
        <td>${p.artist}</td>
        <td>${p.amount} XAF</td>
        <td>${new Date(p.created_at).toLocaleDateString()}</td>

        <td>
          <span class="status status-${p.status}">
            ${p.status}
          </span>
        </td>

        <td>
          ${
            p.status === "requested"
            ? `<button class="btn btn-neon-outline mark-paid" data-id="${p.id}">
                Mark Paid
               </button>`
            : `<span style="color:#aaa;">Completed</span>`
          }
        </td>
      </tr>
    `;
  });

  tbody.innerHTML = html;
}

/* =========================
   MARK AS PAID
========================= */
document.addEventListener("click", async (e)=>{

  if(e.target.classList.contains("mark-paid")){

    const id = e.target.dataset.id;

    const confirmAction = confirm("Mark this payout as paid?");
    if(!confirmAction) return;

    e.target.innerText = "Processing...";
    e.target.disabled = true;

    try {

      const { error } = await supabase
        .from("payouts")
        .update({ status: "paid" })
        .eq("id", id);

      if(error){
        console.error(error);
        alert("Update failed ❌");
        return;
      }

      alert("Payout marked as paid ✅");

      loadPayouts();

    } catch(err){
      console.error(err);
      alert("Error occurred ❌");
    }
  }

});

/* =========================
   SEARCH
========================= */
document.getElementById("searchPayout").addEventListener("input", e => {

  const q = e.target.value.toLowerCase();

  const filtered = payouts.filter(p =>
    p.artist.toLowerCase().includes(q)
  );

  render(filtered);
});

/* INIT */
loadPayouts();

</script>

</body>
</html>

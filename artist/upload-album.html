<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n-title="uploadAlbumPageTitle">Publier un album - JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
<script src="/js/artist-dashboard.js" defer></script>
<script src="/js/premium-experience.js" defer></script>
</head>

<body class="has-topbar-clearance artist-premium-page" data-i18n-title="uploadAlbumPageTitle">

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">

  <div class="menu-header">
    <img src="/assets/logo.png" class="menu-logo">
  </div>

  <!-- MAIN -->
  <a href="/index.html" data-i18n="home" data-icon="🏠">Accueil</a>
  <a href="/browse.html" data-i18n="browse" data-icon="🔍">Parcourir</a>
  <a href="/genres.html" data-i18n="genres" data-icon="🎵">Genres</a>
  <a href="/charts.html" data-i18n="charts" data-icon="📊">Charts</a>

  <hr>

  <!-- ARTIST -->
  <a href="/artist/dashboard.html" data-i18n="dashboard" data-icon="📈">Dashboard</a>
  <a href="/artist/catalog.html" data-i18n="catalog" data-icon="🎶">Catalogue</a>
  <a href="/artist/upload-track.html" data-i18n="uploadTrack" data-icon="⬆">Televerser</a>
  <a href="/artist/upload-album.html" data-i18n="uploadAlbum" data-icon="💿">Televerser</a>
  <a href="/artist/upload-merch.html" data-i18n="uploadMerch" data-icon="🛍">Televerser du merch</a>
  <a href="/settings.html" data-i18n="settings" data-icon="⚙">Paramètres</a>

</div>

<!-- HEADER -->
<div class="topbar">
  <span class="menu" id="menuBtn">☰</span>
  <h3 data-i18n="uploadAlbum">Televerser</h3>
  <span></span>
</div>

<!-- FORM -->
<section class="section">

  <form id="upload-album-form" class="upload-form">

    <label data-i18n="uploadAlbumTitleLabel">Titre de l’album</label>
    <input type="text" name="title" placeholder="Ex: Afro Vibes Vol.1" data-i18n-placeholder="albumNamePlaceholder">

    <label data-i18n="uploadAlbumTracksLabel">Fichiers audio (ZIP ou multiples)</label>
    <input type="file" name="tracks" multiple>

    <label data-i18n="uploadAlbumCoverLabel">Image de couverture</label>
    <input type="file" name="cover">

    <label data-i18n="uploadAlbumGenreLabel">Genre</label>
    <select name="genre" required>
      <option value="" data-i18n="uploadAlbumGenreSelectPrompt">Choisir un genre</option>
      <option value="mboko" data-i18n="genreMboko">Mboko</option>
      <option value="makossa" data-i18n="genreMakossa">Makossa</option>
      <option value="bikutsi" data-i18n="genreBikutsi">Bikutsi</option>
      <option value="afropop" data-i18n="genreAfropop">Afropop</option>
      <option value="afrobeat" data-i18n="genreAfrobeat">Afrobeat</option>
      <option value="ndombolo" data-i18n="genreNdombolo">Ndombolo</option>
      <option value="rnb" data-i18n="genreRnBAfro">RnB Afro</option>
      <option value="drill" data-i18n="genreDrill">Drill</option>
      <option value="gospel" data-i18n="genreGospelCam">Gospel Camer</option>
    </select>

    <label data-i18n="uploadAlbumPriceLabel">Price (XAF)</label>
<input type="number" name="price" min="1000" max="2000" value="1500">

    <button type="submit" class="btn-primary" data-i18n="uploadAlbumSubmit">
      Publier l’album
    </button>

  </form>

</section>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <a href="/index.html" class="nav-item" data-icon="🏠" data-i18n-aria="home" aria-label="Home"></a>
  <a href="/browse.html" class="nav-item" data-icon="🔍" data-i18n-aria="browse" aria-label="Browse"></a>
  <a href="/genres.html" class="nav-item" data-icon="🎵" data-i18n-aria="genres" aria-label="Genres"></a>
  <a href="/user/library.html" class="nav-item" data-icon="📚" data-i18n-aria="library" aria-label="Library"></a>
  <a href="/user/purchases.html" class="nav-item" data-icon="💰" data-i18n-aria="purchases" aria-label="Purchases"></a>
</div>
<script type="module">
import { initLang, translate } from "/js/lang.js";
import { requireRole } from "/js/auth.js";
import { saveUpload } from "/js/store.js";

initLang();

  const user = requireRole("artist");
  if(!user){
    throw new Error(translate("artistAccountRequired"));
  }

/* 💿 FORM */
document.getElementById("upload-album-form").addEventListener("submit", e => {
  e.preventDefault();

  const form = e.target;

  // ✅ GENRE VALIDATION
  if(!form.genre.value){
    alert(translate("selectGenre"));
    return;
  }

  const genre = form.genre.value;

  // ✅ PRICE VALIDATION (ALBUM RANGE)
  let price = Number(form.price.value);

  if(price < 1000 || price > 2000){
    alert(translate("albumPriceRange"));
    return;
  }

  const album = {
    name: form.title.value,
    artist: user.name,
    genre: genre, // ✅ NOW INCLUDED
    type: "album",
    price: price,
    cover: "/assets/covers/cover2.png"
  };

  saveUpload(album);

  alert(translate("albumUploadedSuccess"));

  form.reset();
});
</script>

</body>
</html>

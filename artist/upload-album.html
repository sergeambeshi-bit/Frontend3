<!-- frontend/artist/upload-album.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Album</title>
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/theme-afro.css">
<script src="../js/artist-dashboard.js" defer></script>
</head>
<body>
<header><h1>Upload New Album</h1></header>
<main>
    <form id="upload-album-form">
        <label>Album Title</label>
        <input type="text" name="title">
        <label>Tracks (zip)</label>
        <input type="file" name="tracks" multiple>
        <label>Cover</label>
        <input type="file" name="cover">
        <button type="submit">Upload</button>
    </form>
</main>
</body>
</html>

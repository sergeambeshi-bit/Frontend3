<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Album – JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
<script src="/js/artist-dashboard.js" defer></script>
</head>

<body>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">

  <div class="menu-header">
    <img src="/assets/logo.png" class="menu-logo">
  </div>

  <!-- MAIN -->
  <a href="/pages/index.html">🏠 Accueil</a>
  <a href="/pages/browse.html">🔍 Parcourir</a>
  <a href="/pages/genres.html">🎵 Genres</a>
  <a href="/pages/charts.html">📊 Charts</a>

  <hr>

  <!-- ARTIST -->
  <a href="/artist/dashboard.html">📈 Dashboard</a>
  <a href="/artist/catalog.html">🎶 Catalogue</a>
  <a href="/artist/upload-track.html">⬆ Upload Track</a>
  <a href="/artist/upload-album.html">💿 Upload Album</a>

</div>

<!-- HEADER -->
<div class="topbar">
  <span class="menu" id="menuBtn">☰</span>
  <h3>Upload Album</h3>
  <span></span>
</div>

<!-- FORM -->
<section class="section">

  <form id="upload-album-form" class="upload-form">

    <label>Titre de l’album</label>
    <input type="text" name="title" placeholder="Ex: Afro Vibes Vol.1">

    <label>Fichiers audio (ZIP ou multiples)</label>
    <input type="file" name="tracks" multiple>

    <label>Image de couverture</label>
    <input type="file" name="cover">

    <label>Price (XAF)</label>
<input type="number" name="price" min="1000" max="2000" value="1500">

    <button type="submit" class="btn-primary">
      Publier l’album
    </button>

  </form>

</section>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <a href="/index.html" class="nav-item">🏠</a>
  <a href="/browse.html" class="nav-item">🔍</a>
  <a href="/genres.html" class="nav-item">🎵</a>
  <a href="/library.html" class="nav-item">📚</a>
  <a href="/purchases.html" class="nav-item">💰</a>
</div>
<script type="module">
import { getCurrentUser } from "/js/auth.js";
import { saveUpload } from "/js/store.js";

const user = getCurrentUser();

/* 🔐 PROTECT */
if(!user){
  window.location.href = "/user/login.html";
}

if(user.role !== "artist"){
  alert("Artist account required");
  window.location.href = "/";
}

/* 💿 FORM */
document.getElementById("upload-album-form").addEventListener("submit", e => {
  e.preventDefault();

  const form = e.target;

  // ✅ GENRE VALIDATION
  if(!form.genre.value){
    alert("Please select a genre");
    return;
  }

  const genre = form.genre.value;

  // ✅ PRICE VALIDATION (ALBUM RANGE)
  let price = Number(form.price.value);

  if(price < 1000 || price > 2000){
    alert("Album price must be between 1000–2000 XAF");
    return;
  }

  const album = {
    name: form.title.value,
    artist: user.name,
    genre: genre, // ✅ NOW INCLUDED
    type: "album",
    price: price,
    cover: "/assets/covers/cover2.png"
  };

  saveUpload(album);

  alert("Album uploaded successfully ✅");

  form.reset();
});
</script>

</body>
</html>

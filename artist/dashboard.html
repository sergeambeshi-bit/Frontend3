<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Artiste – JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
<script src="/js/artist-dashboard.js" defer></script>
</head>

<body>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">

  <div class="menu-header">
    <img src="/assets/logo.png" class="menu-logo">
  </div>

  <!-- MAIN -->
  <a href="/pages/index.html">🏠 Accueil</a>
  <a href="/pages/browse.html">🔍 Parcourir</a>
  <a href="/pages/genres.html">🎵 Genres</a>
  <a href="/pages/charts.html">📊 Charts</a>

  <hr>

  <!-- ARTIST -->
  <a href="/artist/dashboard.html">📈 Dashboard</a>
  <a href="/artist/catalog.html">🎶 Catalogue</a>
  <a href="/artist/upload-track.html">⬆ Upload Track</a>
  <a href="/artist/upload-album.html">💿 Upload Album</a>

</div>

<!-- HEADER -->
<div class="topbar">
  <span class="menu" id="menuBtn">☰</span>
  <h3>Dashboard</h3>
  <span></span>
</div>

<!-- DASHBOARD -->
<section class="section">

  <!-- STATS -->
  <div class="stats-grid">

    <div class="stat-card">
      <h2>12.4K</h2>
      <p>Streams</p>
    </div>

    <div class="stat-card">
      <h2>320</h2>
      <p>Ventes</p>
    </div>

    <div class="stat-card">
      <h2>85K XAF</h2>
      <p>Revenus</p>
    </div>

  </div>

</section>

<!-- QUICK ACTIONS -->
<section class="section">

  <h3>Actions rapides</h3>

  <div class="actions">

    <a href="/artist/upload-track.html" class="action-btn">
      ⬆ Upload Track
    </a>

    <a href="/artist/upload-album.html" class="action-btn">
      💿 Upload Album
    </a>

    <a href="/artist/catalog.html" class="action-btn">
      🎶 Voir Catalogue
    </a>

  </div>

</section>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <a href="/pages/index.html" class="nav-item">🏠</a>
  <a href="/pages/browse.html" class="nav-item">🔍</a>
  <a href="/pages/genres.html" class="nav-item">🎵</a>
  <a href="/user/library.html" class="nav-item">📚</a>
  <a href="/user/purchases.html" class="nav-item">💰</a>
</div>

<script type="module">
import { getCurrentUser } from "/js/auth.js";
import { getArtistEarnings } from "/js/store.js";

const user = getCurrentUser();

if(!user){
  window.location.href = "/user/login.html";
}

if(user.role !== "artist"){
  alert("Artist account required");
  window.location.href = "/";
}

/* =========================
   LOAD EARNINGS
========================= */
const stats = getArtistEarnings(user.name);

document.getElementById("artist-stats").innerHTML = `
  <div class="stats-grid">
    <div class="stat-card">
      <h2>${stats.total} XAF</h2>
      <p>Total Earnings</p>
    </div>

    <div class="stat-card">
      <h2>${stats.sales}</h2>
      <p>Total Sales</p>
    </div>

    <div class="stat-card">
      <h2>--</h2>
      <p>Streams</p>
    </div>
  </div>

  <div class="actions">
    <a href="/artist/upload-track.html" class="action-btn">Upload Track</a>
    <a href="/artist/catalog.html" class="action-btn">My Catalog</a>
    <a href="/artist/payouts.html" class="action-btn">Payouts</a>
    <a href="/artist/analytics.html" class="action-btn">Analytics</a>
  </div>
`;
</script>

</body>
</html>

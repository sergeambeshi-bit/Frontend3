<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Artiste – JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
</head>

<body>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">

  <div class="menu-header">
    <img src="/assets/logo.png" class="menu-logo">
  </div>

  <a href="/">🏠 Accueil</a>
  <a href="/browse.html">🔍 Parcourir</a>
  <a href="/genres.html">🎵 Genres</a>
  <a href="/charts.html">📊 Charts</a>

  <hr>

  <a href="/artist/dashboard.html">📈 Dashboard</a>
  <a href="/artist/catalog.html">🎶 Catalogue</a>
  <a href="/artist/upload-track.html">⬆ Upload Track</a>
  <a href="/artist/upload-album.html">💿 Upload Album</a>

</div>

<!-- HEADER -->
<div class="topbar">
  <span class="menu" id="menuBtn">☰</span>
  <h3>Dashboard</h3>
  <span></span>
</div>

<!-- EARNINGS -->
<section class="section">
  <h3>💰 Earnings</h3>

  <div id="earningsBox" class="card" style="padding:20px;">
    <h2 id="totalEarnings">Loading...</h2>
    <button id="withdrawBtn" class="btn-primary">Withdraw</button>
  </div>
</section>

<!-- PAYOUT HISTORY -->
<section class="section">
  <h3>📤 Payout History</h3>
  <div id="payoutList"></div>
</section>

<!-- QUICK ACTIONS -->
<section class="section">
  <h3>Actions rapides</h3>

  <div class="actions">
    <a href="/artist/upload-track.html" class="action-btn">⬆ Upload Track</a>
    <a href="/artist/upload-album.html" class="action-btn">💿 Upload Album</a>
    <a href="/artist/catalog.html" class="action-btn">🎶 Voir Catalogue</a>
  </div>
</section>

<script type="module">
import { initLang } from "/js/lang.js";

initLang();
import { getCurrentUser } from "/js/auth.js";
import { supabase } from "/js/supabase.js";

const user = getCurrentUser();

if(!user) location.href="/user/login.html";

async function load(){

  const { data: tracks } = await supabase
    .from("tracks")
    .select("id")
    .eq("artist", user.name);

  if(!tracks.length){
    document.getElementById("totalEarnings").innerText="0 XAF";
    return;
  }

  const ids = tracks.map(t=>t.id);

  const { data: purchases } = await supabase
    .from("purchases")
    .select("*")
    .in("track_id", ids);

  let total = purchases.reduce((s,p)=>s+p.price,0);

  document.getElementById("totalEarnings").innerText = total+" XAF";
}

document.getElementById("withdrawBtn").onclick = async ()=>{

  const amount = parseInt(document.getElementById("totalEarnings").innerText);

  if(!amount){
    alert("No earnings");
    return;
  }

  await supabase.from("payouts").insert([{
    artist: user.name,
    amount,
    status: "requested"
  }]);

  alert("Withdrawal requested");
};

load();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Artiste – JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
</head>

<body>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">
  <div class="menu-header">
    <img src="/assets/logo.png" class="menu-logo">
  </div>

  <a href="/">🏠 Accueil</a>
  <a href="/browse.html">🔍 Parcourir</a>
  <a href="/genres.html">🎵 Genres</a>
  <a href="/charts.html">📊 Charts</a>

  <hr>

  <a href="/artist/dashboard.html">📈 Dashboard</a>
  <a href="/artist/catalog.html">🎶 Catalogue</a>
  <a href="/artist/upload-track.html">⬆ Upload Track</a>
  <a href="/artist/upload-album.html">💿 Upload Album</a>
</div>

<!-- HEADER -->
<div class="topbar">
  <span class="menu" id="menuBtn">☰</span>
  <h3>Dashboard</h3>
  <span></span>
</div>

<!-- EARNINGS -->
<section class="section">
  <h3>💰 Earnings</h3>

  <div id="earningsBox" class="card" style="padding:20px;">
    <h2 id="totalEarnings">Loading...</h2>
    <button id="withdrawBtn" class="btn-primary">Withdraw</button>
  </div>
</section>

<!-- PAYOUT HISTORY -->
<section class="section">
  <h3>📤 Payout History</h3>
  <div id="payoutList"></div>
</section>

<!-- QUICK ACTIONS -->
<section class="section">
  <h3>Actions rapides</h3>

  <div class="actions">
    <a href="/artist/upload-track.html" class="action-btn">⬆ Upload Track</a>
    <a href="/artist/upload-album.html" class="action-btn">💿 Upload Album</a>
    <a href="/artist/catalog.html" class="action-btn">🎶 Voir Catalogue</a>
  </div>
</section>

<script type="module">
import { getCurrentUser } from "/js/auth.js";
import { supabase } from "/js/supabase.js";

/* =========================
   AUTH
========================= */
const user = getCurrentUser();

if(!user){
  window.location.href = "/user/login.html";
}

if(user.role !== "artist"){
  alert("Artist account required");
  window.location.href = "/";
}

/* =========================
   MENU
========================= */
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");

menuBtn.onclick = ()=> sideMenu.classList.toggle("open");

document.addEventListener("click",(e)=>{
  if(!sideMenu.contains(e.target) && !menuBtn.contains(e.target)){
    sideMenu.classList.remove("open");
  }
});

/* =========================
   LOAD EARNINGS
========================= */
async function loadEarnings(){

  document.getElementById("totalEarnings").innerText = "Loading...";

  try {

    const { data: tracks, error: trackError } = await supabase
      .from("tracks")
      .select("id")
      .eq("artist", user.name);

    if(trackError){
      console.error(trackError);
      throw new Error("Track fetch failed");
    }

    if(!tracks?.length){
      document.getElementById("totalEarnings").innerText = "0 XAF";
      renderPayouts([]);
      return;
    }

    const trackIds = tracks.map(t => t.id);

    const { data: purchases, error: purchaseError } = await supabase
      .from("purchases")
      .select("*")
      .in("track_id", trackIds);

    if(purchaseError){
      console.error(purchaseError);
      throw new Error("Purchase fetch failed");
    }

    const total = purchases.reduce((sum, p) => sum + (p.price || 0), 0);

    document.getElementById("totalEarnings").innerText =
      total + " XAF";

    await loadPayoutHistory();

  } catch(err){
    console.error(err);
    document.getElementById("totalEarnings").innerText = "Error";
  }
}

/* =========================
   LOAD PAYOUT HISTORY
========================= */
async function loadPayoutHistory(){

  const { data, error } = await supabase
    .from("payouts")
    .select("*")
    .eq("artist", user.name)
    .order("created_at", { ascending: false });

  if(error){
    console.error(error);
    return;
  }

  renderPayouts(data || []);
}

/* =========================
   RENDER PAYOUT HISTORY
========================= */
function renderPayouts(list){

  const container = document.getElementById("payoutList");

  if(!list.length){
    container.innerHTML = "<p>No payouts yet</p>";
    return;
  }

  container.innerHTML = list.map(p => `
    <div class="card" style="margin-bottom:10px;">
      <b>${p.amount} XAF</b>
      <p>Status: ${p.status}</p>
      <small>${new Date(p.created_at).toLocaleString()}</small>
    </div>
  `).join("");
}

/* =========================
   WITHDRAW
========================= */
document.getElementById("withdrawBtn").onclick = async ()=>{

  const btn = document.getElementById("withdrawBtn");

  if(btn.disabled) return;

  const confirmWithdraw = confirm("Withdraw all earnings?");
  if(!confirmWithdraw) return;

  btn.innerText = "Processing...";
  btn.disabled = true;

  try {

    const amount = parseInt(
      document.getElementById("totalEarnings").innerText
    );

    if(!amount){
      alert("No earnings yet");
      return;
    }

    // prevent duplicate payout
    const { data: existing } = await supabase
      .from("payouts")
      .select("id")
      .eq("artist", user.name)
      .eq("status", "requested");

    if(existing?.length){
      alert("You already have a pending payout");
      return;
    }

    const { error } = await supabase
      .from("payouts")
      .insert([
        {
          artist: user.name,
          amount,
          status: "requested"
        }
      ]);

    if(error){
      console.error(error);
      alert("Withdrawal failed ❌");
      return;
    }

    alert("Withdrawal requested ✅");

    await loadEarnings();

  } catch(err){
    console.error(err);
    alert("Error occurred ❌");
  }

  btn.innerText = "Withdraw";
  btn.disabled = false;
};

/* INIT */
loadEarnings();

</script>

</body>
</html>

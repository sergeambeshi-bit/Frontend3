<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription artiste - JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
<script src="/js/premium-experience.js" defer></script>
<style>
  .artist-signup-wrap {
    max-width: 540px;
    margin: 0 auto;
    padding: 28px 16px 52px;
  }

  .artist-signup-card {
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 18px;
    background: rgba(11, 16, 24, 0.72);
    padding: 22px;
  }

  .artist-signup-note {
    margin: 0 0 16px;
    color: #b8c5dd;
    font-size: 14px;
    line-height: 1.55;
  }

  .artist-role-chip {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    border: 1px solid rgba(1, 212, 171, 0.42);
    border-radius: 999px;
    padding: 6px 12px;
    color: #90ffeb;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.04em;
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  .artist-input-group {
    display: grid;
    gap: 12px;
    margin: 4px 0 12px;
    padding: 0 2px;
  }

  .artist-input {
    width: 100%;
    max-width: 100%;
    box-sizing: border-box;
  }

  @media (max-width: 520px) {
    .artist-input-group {
      gap: 10px;
      margin: 2px 0 10px;
      padding: 0;
    }
  }
</style>
<script src="/js/performance-lite.js" defer></script>
</head>

<body class="has-topbar-clearance artist-premium-page" data-i18n-title="artistSignupTitle">

<div id="sideMenu" class="side-menu">
  <div class="menu-header">
    <img loading="lazy" decoding="async" src="/assets/logo.png" class="menu-logo" alt="JENGU logo">
  </div>
  <a href="/index.html" data-i18n="home">Accueil</a>
  <a href="/browse.html" data-i18n="browse">Parcourir</a>
  <a href="/genres.html" data-i18n="genres">Genres</a>
  <a href="/charts.html" data-i18n="charts">Charts</a>
  <a href="/artist/signup.html" data-i18n="artistSignupTitle">Inscription artiste</a>
  <a href="/user/login.html" data-i18n="login">Connexion</a>
</div>

<div class="topbar">
  <span class="menu" id="menuBtn">☰</span>
  <h3 data-i18n="artistSignupTitle">Inscription artiste</h3>
  <span></span>
</div>

<main class="artist-signup-wrap">
  <section class="artist-signup-card">
    <div class="artist-role-chip" data-i18n="artistSignupOnly">Compte artiste uniquement</div>
    <h2 style="margin:0 0 8px;" data-i18n="createYourArtistAccount">Créez votre compte artiste</h2>
    <p class="artist-signup-note">
      <span data-i18n="artistSignupNote">Cette inscription est réservée aux artistes qui veulent publier et vendre leurs sorties sur JENGU.</span>
    </p>

    <form id="artistSignupForm">
      <div class="artist-input-group">
        <input type="text" id="name" class="artist-input" placeholder="Nom de l'artiste" data-i18n-placeholder="artistName" required>
        <input type="email" id="email" class="artist-input" placeholder="E-mail" data-i18n-placeholder="email" required>
        <input type="password" id="password" class="artist-input" placeholder="Mot de passe" data-i18n-placeholder="password" required>
      </div>
      <button class="btn-primary" style="width:100%; margin-top:8px;" type="submit" data-i18n="artistSignupJoin">Rejoindre</button>
    </form>

    <p style="text-align:center; margin-top:14px;">
      <span data-i18n="artistSignupAlreadyHaveAccount">Vous avez déjà un compte ?</span>
      <a href="/user/login.html" style="color:#01d4ab;" data-i18n="login">Connexion</a>
    </p>
  </section>
</main>

<script type="module">
import { supabase } from "/js/supabase.js";
import { initLang, applyLang, translate } from "/js/lang.js";

initLang();
applyLang();

const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");

if (menuBtn && sideMenu) {
  menuBtn.addEventListener("click", () => {
    sideMenu.classList.toggle("open");
  });

  document.addEventListener("click", (event) => {
    if (!sideMenu.contains(event.target) && !menuBtn.contains(event.target)) {
      sideMenu.classList.remove("open");
    }
  });
}

document.getElementById("artistSignupForm").addEventListener("submit", async (event) => {
  event.preventDefault();

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signUp({
    email,
    password,
    options: {
      data: {
        name,
        role: "artist"
      }
    }
  });

  if (error) {
    alert(error.message);
    return;
  }

  alert(translate("roleArtistAccountCreated") || "Artist account created successfully.");
  window.location.href = "/user/login.html";
});
</script>

</body>
</html>

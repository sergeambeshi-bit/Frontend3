<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Track – JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
<script src="/js/artist-dashboard.js" defer></script>
</head>

<body>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">

  <div class="menu-header">
    <img src="/assets/logo.png" class="menu-logo">
  </div>

  <a href="/pages/index.html">🏠 Accueil</a>
  <a href="/pages/browse.html">🔍 Parcourir</a>
  <a href="/pages/genres.html">🎵 Genres</a>
  <a href="/pages/charts.html">📊 Charts</a>

  <hr>

  <a href="/artist/dashboard.html">📈 Dashboard</a>
  <a href="/artist/catalog.html">🎶 Catalogue</a>
  <a href="/artist/upload-track.html">⬆ Upload Track</a>
  <a href="/artist/upload-album.html">💿 Upload Album</a>

</div>

<!-- HEADER -->
<div class="topbar">
  <span class="menu" id="menuBtn">☰</span>
  <h3>Upload Track</h3>
  <span></span>
</div>

<!-- FORM -->
<section class="section">

  <form id="upload-track-form" class="upload-form">

    <label>Titre du morceau</label>
    <input type="text" name="title" placeholder="Ex: Mboko Anthem">

    <label>Fichier audio</label>
    <input type="file" name="track">

    <label>Image de couverture</label>
    <input type="file" name="cover">

    <button type="submit" class="btn-primary">
      Publier le morceau
    </button>

  </form>

</section>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <a href="/pages/index.html" class="nav-item">🏠</a>
  <a href="/pages/browse.html" class="nav-item">🔍</a>
  <a href="/pages/genres.html" class="nav-item">🎵</a>
  <a href="/user/library.html" class="nav-item">📚</a>
  <a href="/user/purchases.html" class="nav-item">💰</a>
</div>

<script>
/* MENU */
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");

menuBtn.addEventListener("click", () => {
  sideMenu.classList.toggle("open");
});

document.addEventListener("click", (e) => {
  if (!sideMenu.contains(e.target) && !menuBtn.contains(e.target)) {
    sideMenu.classList.remove("open");
  }
});

/* ACTIVE NAV */
const currentPath = window.location.pathname;
document.querySelectorAll(".nav-item").forEach(link => {
  if(currentPath.includes(link.getAttribute("href"))){
    link.classList.add("active");
  }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Publier un morceau - JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
<script src="/js/artist-dashboard.js" defer></script>
<script src="/js/premium-experience.js" defer></script>
</head>

<body class="has-topbar-clearance artist-premium-page" data-i18n-title="uploadTrackPageTitle">

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">

  <div class="menu-header">
    <img src="/assets/logo.png" class="menu-logo">
  </div>

  <a href="/index.html" data-i18n="home">Accueil</a>
  <a href="/browse.html" data-i18n="browse">Parcourir</a>
  <a href="/genres.html" data-i18n="genres">Genres</a>
  <a href="/charts.html" data-i18n="charts">Charts</a>

  <hr>

  <a href="/artist/dashboard.html" data-i18n="dashboard">Dashboard</a>
  <a href="/artist/catalog.html" data-i18n="catalog">Catalogue</a>
  <a href="/artist/upload-track.html" data-i18n="uploadTrack">Televerser un morceau</a>
  <a href="/artist/upload-album.html" data-i18n="uploadAlbum">Televerser un album</a>
  <a href="/artist/upload-merch.html" data-i18n="uploadMerch">Televerser du merch</a>
  <a href="/settings.html" data-i18n="settings">Paramètres</a>

</div>

<!-- HEADER -->
<div class="topbar">
  <span class="menu" id="menuBtn">☰</span>
  <h3 data-i18n="uploadTrack">Televerser un morceau</h3>
  <span></span>
</div>

<!-- UPGRADE BANNER -->
<div class="upgrade-banner" id="upgradeBanner" role="note" aria-label="Upgrade to Pro">
  <span class="upgrade-banner-icon">⭐</span>
  <div class="upgrade-banner-body">
    <p class="upgrade-banner-title" data-i18n="upgradeBannerUploadTitle">On Free plan? You keep 85% of each sale</p>
    <p class="upgrade-banner-sub" data-i18n="upgradeBannerUploadSub">Upgrade to Pro and keep up to 92% &mdash; plus featured placement and promo tools.</p>
  </div>
  <a href="/artist-pricing.html" class="upgrade-banner-cta" data-i18n="upgradeBannerCta">View Pro Plan &rarr;</a>
  <button class="upgrade-banner-dismiss" id="upgradeBannerDismiss" aria-label="Dismiss upgrade banner">&times;</button>
</div>

<!-- FORM -->
<section class="section">

  <form id="upload-track-form" class="upload-form">

    <label data-i18n="trackTitleLabel">Titre du morceau</label>
    <input type="text" name="title" placeholder="Ex: Mboko Anthem" data-i18n-placeholder="trackTitlePlaceholder" required>

    <label data-i18n="trackAudioLabel">Fichier audio</label>
    <input type="file" name="track" accept="audio/*" required>

    <label data-i18n="trackCoverLabel">Image de couverture</label>
    <input type="file" name="cover" accept="image/*">

    <!-- 🎵 GENRE -->
    <label data-i18n="genreLabel">Genre</label>
    <select name="genre" required>
      <option value="" data-i18n="chooseGenre">Choisir un genre</option>
      <option value="mboko">Mboko</option>
      <option value="makossa">Makossa</option>
      <option value="bikutsi">Bikutsi</option>
      <option value="afropop">Afropop</option>
      <option value="afrobeat">Afrobeat</option>
      <option value="ndombolo">Ndombolo</option>
      <option value="rnb">RnB Afro</option>
      <option value="drill">Drill</option>
      <option value="gospel">Gospel Camer</option>
    </select>

    <!-- 💰 PRICE -->
    <label data-i18n="trackPriceLabel">Prix (XAF)</label>
    <input type="number" name="price" min="100" max="300" value="300" required>

    <button type="submit" class="btn-primary" data-i18n="uploadTrackSubmit">
      Publier le morceau
    </button>

  </form>

</section>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <a href="/index.html" class="nav-item">🏠</a>
  <a href="/browse.html" class="nav-item">🔍</a>
  <a href="/genres.html" class="nav-item">🎵</a>
  <a href="/user/library.html" class="nav-item">📚</a>
  <a href="/user/purchases.html" class="nav-item">💰</a>
</div>

<script type="module">
import { initLang } from "/js/lang.js";

initLang();
  import { requireRole } from "/js/auth.js";
  import { translate } from "/js/lang.js";
import { saveUpload } from "/js/store.js";

  const user = requireRole("artist");
  if(!user){
    throw new Error(translate("artistAccountRequired"));
  }

/* 🎵 FORM */
document.getElementById("upload-track-form").addEventListener("submit", e => {
  e.preventDefault();

  const form = e.target;

  // ✅ FIXED PRICE LOGIC (TRACK RANGE)
  let price = Number(form.price.value);

  if(price < 100 || price > 300){
    alert(translate("trackPriceRange"));
    return;
  }

  const track = {
    name: form.title.value,
    artist: user.name, // ✅ correct
    genre: form.genre?.value || "unknown",
    price: price, // ✅ correct placement
    cover: "/assets/covers/cover1.png",
    type: "track"
  };

  saveUpload(track);

  alert(translate("trackUploadedSuccess"));

  form.reset();
});

// Upgrade banner dismiss
(function() {
  var banner = document.getElementById('upgradeBanner');
  var dismiss = document.getElementById('upgradeBannerDismiss');
  if (!banner || !dismiss) return;
  if (localStorage.getItem('upgradeBannerDismissed') === '1') {
    banner.style.display = 'none';
  }
  dismiss.addEventListener('click', function() {
    banner.style.display = 'none';
    localStorage.setItem('upgradeBannerDismissed', '1');
  });
}());
</script>

</body>
</html>

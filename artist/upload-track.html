<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Track – JENGU</title>

<link rel="stylesheet" href="/styles/app.css">
<script src="/js/artist-dashboard.js" defer></script>
</head>

<body>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">

  <div class="menu-header">
    <img src="/assets/logo.png" class="menu-logo">
  </div>

  <a href="/index.html" data-i18n="home">Accueil</a>
  <a href="/browse.html" data-i18n="browse">Parcourir</a>
  <a href="/genres.html" data-i18n="genres">Genres</a>
  <a href="/charts.html" data-i18n="charts">Charts</a>

  <hr>

  <a href="/artist/dashboard.html" data-i18n="dashboard">Dashboard</a>
  <a href="/artist/catalog.html" data-i18n="catalog">Catalogue</a>
  <a href="/artist/upload-track.html" data-i18n="uploadTrack">Upload Track</a>
  <a href="/artist/upload-album.html" data-i18n="uploadAlbum">Upload Album</a>

</div>

<!-- HEADER -->
<div class="topbar">
  <span class="menu" id="menuBtn">☰</span>
  <h3 data-i18n="uploadTrack">Upload Track</h3>
  <span></span>
</div>

<!-- FORM -->
<section class="section">

  <form id="upload-track-form" class="upload-form">

    <label>Titre du morceau</label>
    <input type="text" name="title" placeholder="Ex: Mboko Anthem" required>

    <label>Fichier audio</label>
    <input type="file" name="track" accept="audio/*" required>

    <label>Image de couverture</label>
    <input type="file" name="cover" accept="image/*">

    <!-- 🎵 GENRE -->
    <label>Genre</label>
    <select name="genre" required>
      <option value="">Choisir un genre</option>
      <option value="mboko">Mboko</option>
      <option value="makossa">Makossa</option>
      <option value="bikutsi">Bikutsi</option>
      <option value="afropop">Afropop</option>
      <option value="afrobeat">Afrobeat</option>
      <option value="ndombolo">Ndombolo</option>
      <option value="rnb">RnB Afro</option>
      <option value="drill">Drill</option>
      <option value="gospel">Gospel Camer</option>
    </select>

    <!-- 💰 PRICE -->
    <label>Prix (XAF)</label>
    <input type="number" name="price" min="100" max="300" value="300" required>

    <button type="submit" class="btn-primary">
      Publier le morceau
    </button>

  </form>

</section>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <a href="/index.html" class="nav-item">🏠</a>
  <a href="/browse.html" class="nav-item">🔍</a>
  <a href="/genres.html" class="nav-item">🎵</a>
  <a href="/user/library.html" class="nav-item">📚</a>
  <a href="/user/purchases.html" class="nav-item">💰</a>
</div>

<script type="module">
import { initLang } from "/js/lang.js";

initLang();
import { getCurrentUser } from "/js/auth.js";
import { saveUpload } from "/js/store.js";

const user = getCurrentUser();

/* 🔐 PROTECT PAGE */
if(!user){
  window.location.href = "/user/login.html";
}

if(user.role !== "artist"){
  alert("Artist account required");
  window.location.href = "/";
}

/* 🎵 FORM */
document.getElementById("upload-track-form").addEventListener("submit", e => {
  e.preventDefault();

  const form = e.target;

  // ✅ FIXED PRICE LOGIC (TRACK RANGE)
  let price = Number(form.price.value);

  if(price < 100 || price > 300){
    alert("Track price must be between 100–300 XAF");
    return;
  }

  const track = {
    name: form.title.value,
    artist: user.name, // ✅ correct
    genre: form.genre?.value || "unknown",
    price: price, // ✅ correct placement
    cover: "/assets/covers/cover1.png",
    type: "track"
  };

  saveUpload(track);

  alert("Track uploaded successfully ✅");

  form.reset();
});
</script>

</body>
</html>
